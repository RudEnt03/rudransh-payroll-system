<!DOCTYPE html>
<html>
<head>
  <title>Attendance System</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<h2>Employee Attendance</h2>

<input type="text" id="mobile" placeholder="Enter Mobile / Emp Code"><br><br>

<button onclick="markIn()">IN Punch</button>
<button onclick="markOut()">OUT Punch</button>

<br><br>
<button onclick="downloadExcel()">Download Monthly Report</button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwoYUdvxjasCQHNKceQWlH2WClOV0p_-IpJn440V7gIQsvHjcVosWWNScxVL0hPgb4FEQ/exec";

const employees = {
  "9999999999": {
    name: "Test User",
    empCode: "E001",
    project: "RDC",
    lat: 28.4595,
    lon: 77.0266
  }
};

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) +
            Math.cos(φ1)*Math.cos(φ2) *
            Math.sin(Δλ/2)*Math.sin(Δλ/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function markIn() {
  processPunch("IN");
}

function markOut() {
  processPunch("OUT");
}

function processPunch(type) {

  let mobile = document.getElementById("mobile").value;

  if (!employees[mobile]) {
    alert("Invalid user");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {

    let userLat = pos.coords.latitude;
    let userLon = pos.coords.longitude;

    let emp = employees[mobile];

    let distance = getDistance(userLat, userLon, emp.lat, emp.lon);

    if (distance > 20) {
      alert("Outside allowed location");
      return;
    }

    let now = new Date();

    let payload = {
      date: now.toISOString(),
      mobile: mobile,
      empCode: emp.empCode,
      name: emp.name,
      project: emp.project
    };

    if (type === "IN") {
      payload.inTime = now.toISOString();
      localStorage.setItem("inTime", now.toISOString());
    } else {
      let inTime = localStorage.getItem("inTime");
      payload.outTime = now.toISOString();
      payload.hours = (new Date(payload.outTime) - new Date(inTime)) / (1000*60*60);
    }

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    }).then(() => alert(type + " recorded"));

  });

}

function downloadExcel() {
  fetch(SCRIPT_URL + "?action=report")
    .then(res => res.json())
    .then(data => generateExcel(data));
}

function generateExcel(data) {

  let wb = XLSX.utils.book_new();

  let ws_data = [];

  ws_data.push(data.headers);

  data.rows.forEach(row => {
    ws_data.push(row);
  });

  let ws = XLSX.utils.aoa_to_sheet(ws_data);

  XLSX.utils.book_append_sheet(wb, ws, "Attendance");

  XLSX.writeFile(wb, "Monthly_Attendance.xlsx");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payroll Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Segoe UI;margin:0;background:#eef2f7;}
header{background:linear-gradient(90deg,#4e73df,#36b9cc);color:white;padding:18px;display:flex;justify-content:space-between;align-items:center;}
.container{padding:20px;}
input,select{padding:8px;margin:6px;}
button{padding:6px 12px;border:none;border-radius:4px;background:#4e73df;color:white;cursor:pointer}
table{width:100%;border-collapse:collapse;background:white;margin-top:20px}
th{background:#4e73df;color:white;padding:10px}
td{padding:10px;border-bottom:1px solid #eee;text-align:center}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" style="text-align:center;margin-top:120px">

<h2>Payroll Login</h2>

<select id="role">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select>

<br>

<input id="empCode" placeholder="Employee Code">

<br>

<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<div id="loginMsg" style="color:red"></div>

</div>

<!-- ADMIN DASHBOARD -->
<div id="dashboard" style="display:none">

<header>

<h2>Payroll Dashboard</h2>

</header>

<div class="container">

<input type="file" id="file">

<table>

<thead>

<tr>

<th>Emp Code</th>
<th>Name</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>

</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<!-- EMPLOYEE PANEL -->
<div id="empPanel" style="display:none;text-align:center;margin-top:120px">

<h2>Employee Payslip</h2>

<select id="empMonth"></select>

<br><br>

<button onclick="viewEmpPayslip()">View Payslip</button>

</div>

<!-- PAYSLIP -->
<div id="modal" style="display:none;text-align:center">

<h2>Payslip</h2>

<div id="psBody"></div>

</div>

<script>

let employees = JSON.parse(localStorage.getItem("payroll_data")||"[]")
let currentEmp=""

function rupee(v){return "₹"+Number(v).toLocaleString("en-IN")}

function login(){

const role=document.getElementById("role").value
const code=document.getElementById("empCode").value.trim()
const pwd=document.getElementById("password").value

if(role=="admin"){

if(pwd!="Rud@03"){

document.getElementById("loginMsg").innerText="Invalid Admin Password"

return

}

document.getElementById("loginPage").style.display="none"
document.getElementById("dashboard").style.display="block"

render(employees)

}else{

if(code!=pwd){

document.getElementById("loginMsg").innerText="Password must equal Emp Code"

return

}

let records=employees.filter(e=>

String(e.code).trim().toUpperCase()==code.toUpperCase()

)

if(records.length==0){

document.getElementById("loginMsg").innerText="No payslip found for this emp."

return

}

currentEmp=code

document.getElementById("loginPage").style.display="none"
document.getElementById("empPanel").style.display="block"

populateEmpMonths(records)

}

}

function populateEmpMonths(records){

let dropdown=document.getElementById("empMonth")

dropdown.innerHTML=""

let months=[...new Set(records.map(e=>e.month))]

months.forEach(m=>{

dropdown.innerHTML+=`<option value="${m}">${m}</option>`

})

}

function viewEmpPayslip(){

let month=document.getElementById("empMonth").value

let emp=employees.find(e=>

e.code==currentEmp && e.month==month

)

if(!emp) return

document.getElementById("modal").style.display="block"

document.getElementById("psBody").innerHTML=

`Emp Code : ${emp.code}<br>
Name : ${emp.name}<br>
Month : ${emp.month}<br>
Gross : ${rupee(emp.gross)}<br>
Net : ${rupee(emp.net)}`

}

document.getElementById("file").addEventListener("change",e=>{

const reader=new FileReader()

reader.onload=function(evt){

const data=new Uint8Array(evt.target.result)

const wb=XLSX.read(data,{type:'array'})

employees=[]

wb.SheetNames.forEach(name=>{

const sheet=wb.Sheets[name]

const rows=XLSX.utils.sheet_to_json(sheet)

rows.forEach(r=>{

let record={}

for(let k in r) record[k.trim().toLowerCase()]=r[k]

let month=record['month']

if(typeof month==="number"){

month=XLSX.SSF.format("mmm-yy",month)

}

employees.push({

code:(record['emp code']||"").toString().trim().toUpperCase(),

name:record['name']||"",

month:month,

gross:Number(record['gross']||0),

net:Number(record['net in hand']||0)

})

})

})

localStorage.setItem("payroll_data",JSON.stringify(employees))

render(employees)

}

reader.readAsArrayBuffer(e.target.files[0])

})

function render(data){

let tb=document.getElementById("tbody")

tb.innerHTML=""

data.forEach(e=>{

tb.innerHTML+=

`<tr>

<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.month}</td>
<td>${rupee(e.gross)}</td>
<td>${rupee(e.net)}</td>

</tr>`

})

}

</script>

</body>
</html>

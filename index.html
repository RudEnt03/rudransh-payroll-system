<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payroll Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}

header{
background:linear-gradient(90deg,#4e73df,#36b9cc);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.controls{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

input{
padding:8px;
}

.cards{
display:flex;
gap:15px;
margin-bottom:20px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
color:#4e73df;
}

.card p{
font-size:22px;
font-weight:bold;
margin-top:8px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

th{
background:#4e73df;
color:white;
padding:10px;
cursor:pointer;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f1f3f9;
}

button{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
background:#1cc88a;
}

.view{
background:#36b9cc;
}

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.payslip{
background:white;
width:700px;
margin:40px auto;
padding:25px;
border-radius:8px;
}

.psHeader{
text-align:center;
border-bottom:3px solid #4e73df;
margin-bottom:15px;
padding-bottom:10px;
}

.company{
font-size:20px;
font-weight:bold;
}

.row{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.section{
font-weight:bold;
border-bottom:2px solid #ddd;
margin-top:10px;
}

.net{
font-size:18px;
font-weight:bold;
color:#4e73df;
}

.footer{
text-align:center;
margin-top:15px;
}

.dark{
background:#1f2933;
color:white;
}

.dark table{background:#2c3e50;color:white;}
.dark th{background:#111827;}
.dark .card{background:#2c3e50;}

</style>
</head>

<body>

<header>
<h2>Payroll Dashboard</h2>
<button onclick="toggleTheme()">Theme</button>
</header>

<div class="container">

<div class="controls">
<input type="file" id="file">
<input type="text" id="search" placeholder="Search employee">
</div>

<div class="cards">
<div class="card"><h3>Total Employees</h3><p id="cEmp">0</p></div>
<div class="card"><h3>Total Gross</h3><p id="cGross">0</p></div>
<div class="card"><h3>Total Net</h3><p id="cNet">0</p></div>
</div>

<table>
<thead>
<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Project</th>
<th>Location</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
<th>Payslip</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<div id="modal">

<div class="payslip">

<div class="psHeader">
<div class="company">Rudransh Enterprises</div>
Salary Payslip
</div>

<div id="psBody"></div>

<div class="footer">
<button onclick="window.print()">Print</button>
<button onclick="window.print()">Download PDF</button>
<button onclick="closePS()">Close</button>
</div>

</div>

</div>

<script>

let employees=[];

// Function to format Indian Rupee with commas
function rupee(v){
  return "₹"+Math.round(v).toLocaleString("en-IN");
}

document.getElementById("file").addEventListener("change",e=>{

const reader=new FileReader();

reader.onload=function(evt){

const data=new Uint8Array(evt.target.result);
const wb=XLSX.read(data,{type:'array'});

employees=[];

wb.SheetNames.forEach(name=>{

const sheet=wb.Sheets[name];
const rows=XLSX.utils.sheet_to_json(sheet);

let parts=name.split("_");
let project=parts[0]||"";
let location=parts[1]||"";

rows.forEach(r=>{

employees.push({

code:r["Emp Code"],
name:r["Name"],
designation:r["Designation"],
month:XLSX.SSF.format("mmm-yy", r["Month"]),
basic:r["Basic"]||0,
hra:r["HRA"]||0,
allow:r["Allowance"]||0,
bonus:r["Bonus"]||0,
gross:r["Gross"]||0,
pf:r["PF@12%"]||0,
esi:r["ESI@.75%"]||0,
lwf:r["LWF"]||0,
advance:r["Advance Paid"]||0,
net:r["Net In Hand"]||0,
project:project,
location:location

});

});

});

render(employees);

};

reader.readAsArrayBuffer(e.target.files[0]);

});

function render(data){

let tb=document.getElementById("tbody");
tb.innerHTML="";

let gross=0;
let net=0;

data.forEach(e=>{

gross+=Number(e.gross);
net+=Number(e.net);

tb.innerHTML+=`
<tr>
<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.project}</td>
<td>${e.location}</td>
<td>${e.month}</td>
<td>${rupee(e.gross)}</td>
<td>${rupee(e.net)}</td>
<td><button class="view" onclick='showPS(${JSON.stringify(e)})'>View</button></td>
</tr>`;

});

document.getElementById("cEmp").innerText=data.length;
document.getElementById("cGross").innerText=rupee(gross);
document.getElementById("cNet").innerText=rupee(net);

}

document.getElementById("search").addEventListener("keyup",function(){

let v=this.value.toLowerCase();

let f=employees.filter(e=>e.code.toLowerCase().includes(v)||e.name.toLowerCase().includes(v));

render(f);

});

function showPS(e){

document.getElementById("modal").style.display="block";

document.getElementById("psBody").innerHTML=`

<div class="row"><b>Emp Code</b><span>${e.code}</span></div>
<div class="row"><b>Name</b><span>${e.name}</span></div>
<div class="row"><b>Designation</b><span>${e.designation}</span></div>
<div class="row"><b>Project</b><span>${e.project}</span></div>
<div class="row"><b>Location</b><span>${e.location}</span></div>
<div class="row"><b>Month</b><span>${e.month}</span></div>

<div class="section">Earnings</div>
<div class="row"><span>Basic</span><span>${rupee(e.basic)}</span></div>
<div class="row"><span>HRA</span><span>${rupee(e.hra)}</span></div>
<div class="row"><span>Allowance</span><span>${rupee(e.allow)}</span></div>
<div class="row"><span>Bonus</span><span>${rupee(e.bonus)}</span></div>
<div class="row"><b>Gross</b><b>${rupee(e.gross)}</b></div>

<div class="section">Deductions</div>
<div class="row"><span>PF</span><span>${rupee(e.pf)}</span></div>
<div class="row"><span>ESI</span><span>${rupee(e.esi)}</span></div>
<div class="row"><span>LWF</span><span>${rupee(e.lwf)}</span></div>
<div class="row"><span>Advance</span><span>${rupee(e.advance)}</span></div>

<div class="section"></div>
<div class="row net"><span>Net Pay</span><span>${rupee(e.net)}</span></div>

`;

}

function closePS(){
document.getElementById("modal").style.display="none";
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>

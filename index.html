<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudransh Payroll System</title>

<script src="xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{font-family:Segoe UI;margin:0;background:#eef2f7;}

.logoCircle{
width:90px;height:90px;border-radius:50%;
object-fit:cover;display:block;margin:0 auto 15px;
}

/* LOGIN SAME */
#loginPage{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;flex-direction:column;
}

#loginBox{
background:white;padding:30px;width:300px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);text-align:center;
}

#loginBox input,#loginBox select{
width:100%;margin-bottom:10px;padding:8px;
}

/* ORIGINAL UI */
header{
background:linear-gradient(90deg,#4e73df,#36b9cc);
color:white;padding:18px;
display:flex;justify-content:space-between;align-items:center;
}

.container{padding:20px;}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.cards{display:flex;gap:15px;margin-bottom:20px;}

.card{
flex:1;background:white;padding:20px;border-radius:8px;
text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

table{width:100%;border-collapse:collapse;background:white;}
th{background:#4e73df;color:white;padding:10px;}
td{padding:10px;border-bottom:1px solid #eee;text-align:center;}

button{
padding:6px 12px;border:none;border-radius:4px;
cursor:pointer;color:white;background:#36b9cc;
}

.view{background:#1cc88a;}

#modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);overflow:auto;
}

/* 🔴 A4 PERFECT */
.payslip{
background:white;
width:794px;   /* A4 width px */
min-height:1123px; /* A4 height px */
margin:20px auto;
padding:25px;
box-sizing:border-box;
}

.psTable{width:100%;border-collapse:collapse;}
.psTable td,.psTable th{border:2px solid #000;padding:8px;}

.left{text-align:left;}
.right{text-align:right;}
.center{text-align:center;}

.net{font-size:20px;font-weight:bold;text-align:center;margin-top:10px;}
.footer{text-align:center;margin-top:15px;font-size:12px;}

@media print{
body *{visibility:hidden;}
.payslip, .payslip *{visibility:visible;}
.payslip{position:absolute;left:0;top:0;}
}
</style>
</head>

<body>

<div id="loginPage">
<div id="loginBox">
<img src="logo.png" class="logoCircle">
<h3>Login</h3>

<select id="role" onchange="if(this.value==='admin'){empCode.value='Admin'}else{empCode.value=''}">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select>

<input id="empCode" placeholder="Employee Code">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<div style="font-size:12px;margin-top:10px;">© 2026 Rudransh Enterprises</div>
<div id="msg" style="color:red"></div>
</div>
</div>

<div id="dashboard" style="display:none">
<header><h2>Payroll Dashboard</h2></header>

<div class="container">

<div style="text-align:center;margin-bottom:10px;">
<img src="logo.png" class="logoCircle" style="width:70px;height:70px;">
</div>

<div class="controls">
<select id="monthFilter"><option value="all">All Months</option></select>
<select id="projectFilter"><option value="all">All Projects</option></select>
<button onclick="applyFilter()">Filter</button>
</div>

<div class="cards">
<div class="card">Total Employees<p id="cEmp">0</p></div>
<div class="card">Total Gross<p id="cGross">0</p></div>
<div class="card">Total Net<p id="cNet">0</p></div>
</div>

<table>
<thead>
<tr>
<th>Emp Code</th><th>Name</th><th>Project</th>
<th>Month</th><th>Gross</th><th>Net</th><th>Payslip</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>
</div>

<div id="modal">
<div class="payslip" id="payslipArea">
<div id="psBody"></div>

<div class="footer">
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="closePS()">Close</button>
</div>
</div>
</div>

<script>
const files=[
"data1.xlsx",
"data2.xlsx"
];

const base="https://raw.githubusercontent.com/RudEnt03/rudransh-payroll-system/main/";

let employees=[],months=new Set(),projects=new Set();

function rupee(v){return "₹"+Math.round(Number(v||0)).toLocaleString("en-IN");}

async function loadExcel(){
employees=[];

for(const f of files){
const r=await fetch(base+f);
const data=await r.arrayBuffer();
const wb=XLSX.read(data,{type:"array"});

wb.SheetNames.forEach(sheetName=>{
const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);

rows.forEach(r=>{
let rec={};
for(let k in r){rec[k.trim().toLowerCase()]=r[k];}

let m=rec["month"];
if(typeof m==="number"){m=XLSX.SSF.format("mmm-yy",m);}

months.add(m);projects.add(sheetName);

employees.push({
code:rec["emp code"]||"",
name:rec["name"]||"",
designation:rec["designation"]||"",
uan:rec["uan no"]||"",
esi_no:rec["esi no"]||"",
mdays:rec["m days"]||"",
pdays:rec["p days"]||"",
month:m||"",
projectLocation:sheetName,
basic:rec["basic"],
hra:rec["hra"],
allow:rec["allowance"],
bonus:rec["bonus"],
attendance:rec["attendance incentive"],
gross:rec["gross"],
pf:rec["pf@12%"],
esi:rec["esi@.75%"],
lwf:rec["lwf"],
advance:rec["advance paid"],
net:rec["net in hand"]
});
});
});
}

populateFilters();
render(employees);
}

function populateFilters(){
monthFilter.innerHTML='<option value="all">All Months</option>';
projectFilter.innerHTML='<option value="all">All Projects</option>';

months.forEach(m=>monthFilter.innerHTML+=`<option>${m}</option>`);
projects.forEach(p=>projectFilter.innerHTML+=`<option>${p}</option>`);
}

function applyFilter(){
render(employees.filter(e=>
(monthFilter.value=="all"||e.month==monthFilter.value)&&
(projectFilter.value=="all"||e.projectLocation==projectFilter.value)
));
}

function render(data){
tbody.innerHTML="";
let g=0,n=0;

data.forEach(e=>{
g+=+e.gross;n+=+e.net;

tbody.innerHTML+=`
<tr>
<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.projectLocation}</td>
<td>${e.month}</td>
<td>${rupee(e.gross)}</td>
<td>${rupee(e.net)}</td>
<td><button onclick='showPS(${JSON.stringify(e)})'>View</button></td>
</tr>`;
});

cEmp.innerText=data.length;
cGross.innerText=rupee(g);
cNet.innerText=rupee(n);
}

/* ✅ ORIGINAL PAYSLIP EXACT */
function showPS(e){
modal.style.display="block";

psBody.innerHTML=`
<table class="psTable">
<tr>
<td class="center" style="width:150px">
<img src="logo.png" height="70">
</td>
<td class="center">
<b style="font-size:20px">Rudransh Enterprises</b><br>
Office Address: Shop No- 4,5,6,7, Idgha Road, Bholanath Nagar Market, Delhi-110032
</td>
</tr>
<tr>
<td colspan="2" class="center">
<b>Salary Slip for ${e.month}</b>
</td>
</tr>
</table>

<br>

<table class="psTable">
<tr>
<td class="left">Employee Name</td>
<td class="left">${e.name}</td>
<td class="left">Employee Code</td>
<td class="left">${e.code}</td>
</tr>
<tr>
<td class="left">Designation</td>
<td class="left">${e.designation}</td>
<td class="left">Project & Location</td>
<td class="left">${e.projectLocation}</td>
</tr>
<tr>
<td class="left">UAN No</td>
<td class="left">${e.uan}</td>
<td class="left">ESI No</td>
<td class="left">${e.esi_no}</td>
</tr>
<tr>
<td class="left">M Days</td>
<td class="left">${e.mdays}</td>
<td class="left">P Days</td>
<td class="left">${e.pdays}</td>
</tr>
</table>

<br>

<table class="psTable">
<tr>
<th class="left">Earnings</th>
<th class="right">Amount</th>
<th class="left">Deductions</th>
<th class="right">Amount</th>
</tr>
<tr>
<td class="left">Basic</td>
<td class="right">${rupee(e.basic)}</td>
<td class="left">PF</td>
<td class="right">${rupee(e.pf)}</td>
</tr>
<tr>
<td class="left">HRA</td>
<td class="right">${rupee(e.hra)}</td>
<td class="left">ESI</td>
<td class="right">${rupee(e.esi)}</td>
</tr>
<tr>
<td class="left">Allowance</td>
<td class="right">${rupee(e.allow)}</td>
<td class="left">LWF</td>
<td class="right">${rupee(e.lwf)}</td>
</tr>
<tr>
<td class="left">Bonus</td>
<td class="right">${rupee(e.bonus)}</td>
<td class="left">Advance</td>
<td class="right">${rupee(e.advance)}</td>
</tr>
<tr>
<td class="left">Attendance Incentive</td>
<td class="right">${rupee(e.attendance)}</td>
<td></td>
<td></td>
</tr>
<tr>
<td class="left"><b>Gross</b></td>
<td class="right"><b>${rupee(e.gross)}</b></td>
<td></td>
<td></td>
</tr>
</table>

<div class="net">NET PAY ${rupee(e.net)}</div>
`;
}

/* ✅ PERFECT PDF */
function downloadPDF(){
html2pdf().set({
margin:0,
filename:'Payslip.pdf',
image:{type:'jpeg',quality:1},
html2canvas:{scale:2},
jsPDF:{unit:'px',format:[794,1123],orientation:'portrait'}
}).from(document.getElementById("payslipArea")).save();
}

function closePS(){modal.style.display="none";}

async function login(){
await loadExcel();

if(role.value==="admin"){
if(password.value!=="Rud@03"){msg.innerText="Invalid";return;}
loginPage.style.display="none";
dashboard.style.display="block";
}else{
if(empCode.value!==password.value){msg.innerText="Invalid";return;}
alert("Employee login OK");
}
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1f2937;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

input{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#e5e7eb;
}

.summary{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.summary div{
background:white;
padding:15px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
min-width:150px;
}

.login{
width:320px;
margin:140px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

.payslip{
width:700px;
margin:auto;
padding:20px;
font-family:Arial;
}

.payslip table{
width:100%;
border-collapse:collapse;
}

.payslip td,.payslip th{
border:1px solid #333;
padding:6px;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="login">

<h3>Payroll Login</h3>

<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>

<!-- MAIN APP -->

<div id="app" style="display:none">

<header>Payroll Dashboard</header>

<div class="container">

<div class="card">

<input type="file" id="excelFile">

<button onclick="importExcel()">Import Excel</button>

<input id="searchBox" placeholder="Search Employee" onkeyup="searchEmployee()">

<button onclick="bulkPrint()">Bulk Print Payslip</button>

</div>

<div class="summary">

<div>Total Employees<br><b id="empCount">0</b></div>
<div>Total Gross<br><b id="grossSum">0</b></div>
<div>Total PF<br><b id="pfSum">0</b></div>
<div>Total ESI<br><b id="esiSum">0</b></div>

</div>

<div class="card">

<table id="empTable">

<thead>

<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Project</th>
<th>Location</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
<th>Payslip</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<script>

let employees=[]
let project=""
let location=""

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user==="Rudransh" && pass==="Rud@03"){

document.getElementById("loginPage").style.display="none"
document.getElementById("app").style.display="block"

}else{

alert("Invalid Login")

}

}

function importExcel(){

let file=document.getElementById("excelFile").files[0]

if(!file){

alert("Select Excel File")

return

}

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:"array"})

let sheetName=workbook.SheetNames[0]

let split=sheetName.split("-")

project=split[0]||""
location=split[1]||""

let sheet=workbook.Sheets[sheetName]

let json=XLSX.utils.sheet_to_json(sheet)

employees=[]

json.forEach(r=>{

employees.push({

code:r["Emp Code"],
name:r["Name"],
month:convertDate(r["Month"]),
basic:Number(r["Basic"])||0,
hra:Number(r["HRA"])||0,
allowance:Number(r["Allowance"])||0,
gross:Number(r["Gross"])||0,
pf:Number(r["PF@12%"])||0,
esi:Number(r["ESI@.75%"])||0,
net:Number(r["Net In Hand"])||0,
project:project,
location:location

})

})

render()

}

reader.readAsArrayBuffer(file)

}

function convertDate(serial){

if(typeof serial==="number"){

let date=new Date((serial-25569)*86400*1000)

return date.toLocaleString("default",{month:"long",year:"numeric"})

}

return serial

}

function render(){

let tbody=document.querySelector("#empTable tbody")

tbody.innerHTML=""

let gross=0
let pf=0
let esi=0

employees.forEach((e,i)=>{

gross+=e.gross
pf+=e.pf
esi+=e.esi

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.project}</td>
<td>${e.location}</td>
<td>${e.month}</td>
<td>${e.gross}</td>
<td>${e.net}</td>
<td><button onclick="showPayslip(${i})">View</button></td>

`

tbody.appendChild(tr)

})

document.getElementById("empCount").innerText=employees.length
document.getElementById("grossSum").innerText=gross
document.getElementById("pfSum").innerText=pf
document.getElementById("esiSum").innerText=esi

}

function showPayslip(i){

let e=employees[i]

let w=window.open()

w.document.write(`

<div class="payslip">

<h2 style="text-align:center">Salary Payslip</h2>

<table>

<tr>
<td><b>Employee</b></td>
<td>${e.name}</td>
<td><b>Code</b></td>
<td>${e.code}</td>
</tr>

<tr>
<td><b>Project</b></td>
<td>${e.project}</td>
<td><b>Location</b></td>
<td>${e.location}</td>
</tr>

<tr>
<td><b>Month</b></td>
<td>${e.month}</td>
<td></td>
<td></td>
</tr>

</table>

<br>

<table>

<tr>
<th>Earnings</th>
<th>Amount</th>
<th>Deductions</th>
<th>Amount</th>
</tr>

<tr>
<td>Basic</td>
<td>${e.basic}</td>
<td>PF</td>
<td>${e.pf}</td>
</tr>

<tr>
<td>HRA</td>
<td>${e.hra}</td>
<td>ESI</td>
<td>${e.esi}</td>
</tr>

<tr>
<td>Allowance</td>
<td>${e.allowance}</td>
<td></td>
<td></td>
</tr>

<tr>
<th>Gross</th>
<th>${e.gross}</th>
<th>Net Pay</th>
<th>${e.net}</th>
</tr>

</table>

<br>

<button onclick="window.print()">Print</button>

</div>

`)

}

function bulkPrint(){

employees.forEach((e,i)=>showPayslip(i))

}

function searchEmployee(){

let text=document.getElementById("searchBox").value.toLowerCase()

let rows=document.querySelectorAll("#empTable tbody tr")

rows.forEach(r=>{

r.style.display=r.innerText.toLowerCase().includes(text)?"":"none"

})

}

</script>

</body>
</html>

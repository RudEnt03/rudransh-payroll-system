
#payslip{margin-top:20px;}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="container" id="loginPage">
<h2>Login</h2>
<select id="role">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select><br>
<input id="empCode" placeholder="Employee Code"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<div id="loginMsg" style="color:red"></div>
</div>

<!-- ADMIN DASHBOARD -->
<div class="container" id="adminDash">
<h2>Admin Dashboard</h2>
<input type="file" id="excelFile">
<table>
<thead>
<tr>
<th>Emp Code</th><th>Name</th><th>Designation</th><th>Month</th><th>Gross</th><th>Net</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- EMPLOYEE PANEL -->
<div class="container" id="empPanel">
<h2>Employee Payslip</h2>
<select id="empMonth"></select><br><br>
<button onclick="showPayslip()">Generate Payslip</button>
<div id="payslip"></div>
</div>

<script>
// ===== STORAGE =====
let employees = JSON.parse(localStorage.getItem("payroll_data") || "[]");
let currentEmp = "";

// ===== LOGIN =====
function login(){
    const role = document.getElementById("role").value;
    const code = document.getElementById("empCode").value.trim();
    const pwd = document.getElementById("password").value;
    const ua = navigator.userAgent;

    if(role === "admin"){
        if(pwd!=="Rud@03"){ document.getElementById("loginMsg").innerText="Wrong admin password"; return; }
        document.getElementById("loginPage").style.display="none";
        document.getElementById("adminDash").style.display="block";
        renderTable(employees);
    } else {
        if(!/Mobi|Android|iPhone/i.test(ua)){
            document.getElementById("loginMsg").innerText="Employee login only on mobile!";
            return;
        }
        if(!code){ document.getElementById("loginMsg").innerText="Enter Employee Code"; return; }
        if(pwd !== code){ document.getElementById("loginMsg").innerText="Password must match Employee Code"; return; }

        // Filter employee records from stored data
        const empRecords = employees.filter(e=>e.code === code);
        if(empRecords.length === 0){
            document.getElementById("loginMsg").innerText="No payslip found for this employee.";
            return;
        }

        currentEmp = code;
        document.getElementById("loginPage").style.display="none";
        document.getElementById("empPanel").style.display="block";

        // Populate month dropdown
        const months = [...new Set(empRecords.map(e=>e.month))].sort((a,b)=>{
            const parseDate = str=>{
                const [m,y] = str.split('-');
                return new Date(`${m} 1, 20${y}`);
            };
            return parseDate(a)-parseDate(b);
        });
        const dd = document.getElementById("empMonth");
        dd.innerHTML="";
        months.forEach(m=>{
            const opt = document.createElement("option");
            opt.value=m;
            opt.textContent=m;
            dd.appendChild(opt);
        });

        // Auto-show first month if only one
        if(months.length===1){ dd.selectedIndex=0; showPayslip(); }
    }
}

// ===== SHOW EMP PAYSLIP =====
function showPayslip(){
    const month = document.getElementById("empMonth").value;
    const emp = employees.find(e=>e.code===currentEmp && e.month===month);
    if(!emp){ document.getElementById("payslip").innerHTML="<span style='color:red'>Payslip not found!</span>"; return; }
    document.getElementById("payslip").innerHTML = `
<h3>Payslip</h3>
Employee Code: ${emp.code}<br>
Name: ${emp.name}<br>
Designation: ${emp.designation}<br>
Month: ${emp.month}<br>
Gross Salary: ₹${Number(emp.gross).toLocaleString("en-IN")}<br>
Net Salary: ₹${Number(emp.net).toLocaleString("en-IN")}
`;
}

// ===== ADMIN EXCEL IMPORT =====
document.getElementById("excelFile").addEventListener("change",e=>{
    const reader = new FileReader();
    reader.onload = function(evt){
        const data = new Uint8Array(evt.target.result);
        const wb = XLSX.read(data,{type:"array"});
        employees=[];
        wb.SheetNames.forEach(name=>{
            const sheet = wb.Sheets[name];
            const rows = XLSX.utils.sheet_to_json(sheet);
            rows.forEach(r=>{
                let rec={};
                for(let k in r){ rec[k.trim().toLowerCase()]=r[k]; }
                let month=rec['month'];
                if(typeof month==="number"){ month=XLSX.SSF.format("mmm-yy",month); }
                employees.push({
                    code:(rec['emp code']||"").toString(),
                    name:rec['name']||"",
                    designation:rec['designation']||"",
                    month:month||"",
                    gross:Number(rec['gross']||0),
                    net:Number(rec['net in hand']||0)
                });
            });
        });
        localStorage.setItem("payroll_data",JSON.stringify(employees));
        renderTable(employees);
    };
    reader.readAsArrayBuffer(e.target.files[0]);
});

// ===== ADMIN TABLE RENDER =====
function renderTable(data){
    const tb=document.getElementById("tbody");
    tb.innerHTML="";
    data.forEach(e=>{
        tb.innerHTML+=`<tr>
<td>${e.code}</td><td>${e.name}</td><td>${e.designation}</td><td>${e.month}</td><td>₹${Number(e.gross).toLocaleString("en-IN")}</td><td>₹${Number(e.net).toLocaleString("en-IN")}</td>
</tr>`;
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}
h2{
    text-align:center;
}
.card{
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
}
th{
    background:#2c3e50;
    color:white;
}
button{
    padding:6px 12px;
    background:#2c3e50;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}
button:hover{
    background:#34495e;
}
.hidden{
    display:none;
}
</style>
</head>

<body>

<h2>Rudransh Enterprise Payroll System</h2>

<div class="card" id="dashboardCard">
    <input type="file" id="excelFile" accept=".xlsx,.xls">
    <button onclick="importExcel()">Import Excel</button>

    <table id="employeeTable">
        <tr>
            <th>Emp Code</th>
            <th>Name</th>
            <th>Designation</th>
            <th>UAN</th>
            <th>ESI</th>
            <th>Action</th>
        </tr>
    </table>
</div>

<div class="card hidden" id="payslipCard">
    <button onclick="goBack()">⬅ Back</button>
    <h3>Payslip</h3>
    <div id="payslipContent"></div>
</div>

<script>

function importExcel(){

    const fileInput = document.getElementById("excelFile");

    if(!fileInput.files.length){
        alert("Please select Excel file");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type:"array"});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        localStorage.setItem("payrollData", JSON.stringify(json));

        loadEmployees();
    };

    reader.readAsArrayBuffer(fileInput.files[0]);
}

function loadEmployees(){

    const data = JSON.parse(localStorage.getItem("payrollData")) || [];
    const table = document.getElementById("employeeTable");

    table.innerHTML = `
        <tr>
            <th>Emp Code</th>
            <th>Name</th>
            <th>Designation</th>
            <th>UAN</th>
            <th>ESI</th>
            <th>Action</th>
        </tr>`;

    data.forEach(emp=>{

        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${emp["Emp Code"] || ""}</td>
        <td>${emp["Name"] || ""}</td>
        <td>${emp["Designation"] || ""}</td>
        <td>${emp["UAN No"] || ""}</td>
        <td>${emp["ESI No"] || ""}</td>
        <td><button onclick="viewPayslip('${emp["Emp Code"]}')">View</button></td>
        `;

        table.appendChild(row);
    });
}

function viewPayslip(code){

    const data = JSON.parse(localStorage.getItem("payrollData")) || [];
    const emp = data.find(e => e["Emp Code"] == code);

    if(!emp) return;

    let html = `
    <table>
        <tr><td><b>Emp Code</b></td><td>${emp["Emp Code"]}</td></tr>
        <tr><td><b>Name</b></td><td>${emp["Name"]}</td></tr>
        <tr><td><b>Designation</b></td><td>${emp["Designation"]}</td></tr>
        <tr><td><b>Month</b></td><td>${emp["Month"]}</td></tr>
        <tr><td><b>M Days</b></td><td>${emp["M Days"]}</td></tr>
        <tr><td><b>P Days</b></td><td>${emp["P Days"]}</td></tr>
        <tr><td><b>Basic</b></td><td>${emp["Basic"]}</td></tr>
        <tr><td><b>HRA</b></td><td>${emp["HRA"]}</td></tr>
        <tr><td><b>Allowance</b></td><td>${emp["Allowance"]}</td></tr>
        <tr><td><b>Leave</b></td><td>${emp["Leave"]}</td></tr>
        <tr><td><b>Bonus</b></td><td>${emp["Bonus"]}</td></tr>
        <tr><td><b>Gross</b></td><td>${emp["Gross"]}</td></tr>
        <tr><td><b>PF@12%</b></td><td>${emp["PF@12%"]}</td></tr>
        <tr><td><b>ESI@.75%</b></td><td>${emp["ESI@.75%"]}</td></tr>
        <tr><td><b>LWF</b></td><td>${emp["LWF"]}</td></tr>
        <tr><td><b>OT Amt</b></td><td>${emp["OT Amt"]}</td></tr>
        <tr><td><b>Total In Hand</b></td><td>${emp["Total In Hand"]}</td></tr>
        <tr><td><b>Advance Paid</b></td><td>${emp["Advance Paid"]}</td></tr>
        <tr><td><b>Net In Hand</b></td><td>${emp["Net In Hand"]}</td></tr>
    </table>`;

    document.getElementById("dashboardCard").classList.add("hidden");
    document.getElementById("payslipCard").classList.remove("hidden");
    document.getElementById("payslipContent").innerHTML = html;
}

function goBack(){
    document.getElementById("dashboardCard").classList.remove("hidden");
    document.getElementById("payslipCard").classList.add("hidden");
}

window.onload = loadEmployees;

</script>

</body>
</html>

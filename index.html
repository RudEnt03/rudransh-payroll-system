<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System v6</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>

body{
background:#0d1b2a;
font-family:Segoe UI;
color:white;
margin:0;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,#0f4c81,#1a936f);
}

.grid{
display:grid;
grid-template-columns:300px 200px 300px 250px;
gap:15px;
padding:20px;
}

.panel{
background:#1b263b;
padding:15px;
border-radius:10px;
}

button{
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.loginBtn{background:#2ecc71;color:white;}
.blue{background:#3498db;color:white;}
.orange{background:#e67e22;color:white;}
.purple{background:#9b59b6;color:white;}
.red{background:#e74c3c;color:white;}

.preview{
background:white;
color:black;
padding:15px;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:6px;
border-bottom:1px solid #ccc;
}

.net{
color:green;
font-weight:bold;
font-size:22px;
text-align:right;
}

</style>
</head>

<body>

<header>
RUDRANSH PAYROLL SYSTEM v6 – ULTIMATE
<span style="float:right;font-size:14px">Enterprise Edition ©2026</span>
</header>

<div class="grid">

<div class="panel">

<h3>ADMIN LOGIN</h3>

<input id="user" placeholder="admin"><br><br>
<input id="pass" type="password"><br>

<button class="loginBtn" onclick="login()">LOGIN & BIND DEVICE</button>

<p id="device"></p>

</div>


<div class="panel">

<h3>MONTH VIEW</h3>

<div id="months"></div>

</div>


<div class="panel">

<h3>QUICK ACTIONS</h3>

<button class="blue" onclick="downloadZip()">Download All Payslips</button>

<button class="orange">Generate PF / ESI / TDS</button>

<button class="purple">Reports Dashboard</button>

<button class="red" onclick="logout()">Logout</button>

</div>


<div class="panel">

<h3>SYSTEM STATS</h3>

<p>Total Employees : <span id="empCount">0</span></p>
<p>Payslips Generated : <span id="payslipCount">0</span></p>
<p>ZIP Downloads : <span id="zipCount">0</span></p>
<p>Last Update : <span id="updateTime"></span></p>

</div>


<div class="panel">

<h3>UPLOADS</h3>

<input type="file" id="excel"><br><br>

<button onclick="loadExcel()">Upload Payroll Excel</button>

<input type="file" id="logo"><br><br>

<select id="monthSelect"></select>

<input id="empCode" placeholder="Enter Emp Code">

<button class="loginBtn" onclick="generate()">Generate Payslip</button>

</div>


<div class="panel" style="grid-column: span 3">

<h3>SAMPLE PDF PREVIEW</h3>

<div id="preview" class="preview"></div>

</div>

</div>


<script>

let payroll=[]
let payslipCount=0
let zipCount=0

function login(){

if(user.value=="admin" && pass.value=="Rud@03"){

localStorage.device="bound"

device.innerHTML="Device Bound : ✔ Yes"

}else{

alert("Invalid Login")

}

}

function logout(){

location.reload()

}

function loadExcel(){

let file=document.getElementById("excel").files[0]

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:'array'})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

payroll=XLSX.utils.sheet_to_json(sheet)

empCount.innerText=payroll.length

updateTime.innerText=new Date().toLocaleTimeString()

}

reader.readAsArrayBuffer(file)

}

function generate(){

let code=empCode.value

let emp=payroll.find(e=>e["Emp Code"]==code)

if(!emp){alert("Employee not found");return}

let html=`
<h2>RUDRANSH ENTERPRISES</h2>

<table>

<tr><td>Basic</td><td>₹${emp.Basic}</td></tr>
<tr><td>HRA</td><td>₹${emp.HRA}</td></tr>
<tr><td>Allowance</td><td>₹${emp.Allowance}</td></tr>
<tr><td>Bonus</td><td>₹${emp.Bonus}</td></tr>

</table>

<hr>

<table>

<tr><td>PF</td><td>₹${emp["PF@12%"]}</td></tr>
<tr><td>ESI</td><td>₹${emp["ESI@.75%"]}</td></tr>

</table>

<div class="net">NET IN HAND ₹${emp["Net In Hand"]}</div>
`

preview.innerHTML=html

payslipCount++

payslipCountEl.innerText=payslipCount

}

function downloadZip(){

let zip=new JSZip()

let promises=[]

payroll.forEach(emp=>{

let html=preview.innerHTML

let blob=new Blob([html],{type:"text/html"})

zip.file(emp["Emp Code"]+".html",blob)

})

zip.generateAsync({type:"blob"}).then(function(content){

saveAs(content,"Payslips.zip")

})

zipCount++

}

</script>

</body>
</html>

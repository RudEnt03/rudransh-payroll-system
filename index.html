<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Enterprises Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef1f5;
margin:0;
}

.card{
width:350px;
background:#fff;
margin:120px auto;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:90%;
padding:8px;
margin:8px;
}

button{
padding:8px 15px;
margin:5px;
background:#22b573;
border:none;
color:#fff;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#19965d;
}

#adminDashboard{
display:none;
padding:30px;
}

#employeePortal{
display:none;
padding:30px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#f0f0f0;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div class="card" id="loginPage">

<h2>Employee Login</h2>

<input id="empCode" placeholder="Employee Code">

<input id="empPass" placeholder="Password">

<br>

<button onclick="employeeLogin()">Login</button>

<br><br>

<button onclick="showAdminLogin()">Admin Login</button>

</div>


<!-- ADMIN LOGIN -->

<div class="card" id="adminLogin" style="display:none">

<h2>Admin Login</h2>

<input id="adminUser" placeholder="Username">

<input id="adminPass" placeholder="Password">

<br>

<button onclick="adminLogin()">Login</button>

<button onclick="backLogin()">Back</button>

</div>


<!-- ADMIN DASHBOARD -->

<div id="adminDashboard">

<h2>Admin Dashboard</h2>

<input type="file" id="excelFile">

<button onclick="importExcel()">Import Excel</button>

<table id="employeeTable">

<thead>

<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Designation</th>
<th>Basic</th>
<th>HRA</th>
<th>Allowance</th>
<th>Gross</th>
<th>PF</th>
<th>ESI</th>
<th>Net</th>
<th>Payslip</th>
</tr>

</thead>

<tbody></tbody>

</table>

<br><br>

<h3>Admin Control Panel</h3>

<input id="resetCode" placeholder="Employee Code">

<button onclick="resetDevice()">Reset Employee Device</button>

</div>


<!-- EMPLOYEE PORTAL -->

<div id="employeePortal">

<h2>Employee Portal</h2>

<div id="payslip"></div>

</div>


<script>

let employees=[];


/* LOGIN NAVIGATION */

function showAdminLogin(){

document.getElementById("loginPage").style.display="none";
document.getElementById("adminLogin").style.display="block";

}

function backLogin(){

document.getElementById("loginPage").style.display="block";
document.getElementById("adminLogin").style.display="none";

}


/* ADMIN LOGIN */

function adminLogin(){

let u=document.getElementById("adminUser").value;
let p=document.getElementById("adminPass").value;

if(u==="Rudransh" && p==="Rud@03"){

document.getElementById("adminLogin").style.display="none";
document.getElementById("adminDashboard").style.display="block";

}else{

alert("Invalid Login");

}

}


/* EMPLOYEE LOGIN */

function employeeLogin(){

let code=document.getElementById("empCode").value;

let emp=employees.find(e=>e.code==code);

if(!emp){

alert("Employee Not Found");
return;

}

document.getElementById("loginPage").style.display="none";
document.getElementById("employeePortal").style.display="block";

generatePayslip(emp);

}


/* EXCEL IMPORT */

function importExcel(){

let file=document.getElementById("excelFile").files[0];

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let workbook=XLSX.read(data,{type:'array'});

let sheet=workbook.Sheets[workbook.SheetNames[0]];

let json=XLSX.utils.sheet_to_json(sheet);

employees=[];

json.forEach(r=>{

let emp={

code:r["Emp Code"],
name:r["Name"],
des:r["Designation"],
basic:Number(r["Basic"]),
hra:Number(r["HRA"]),
allow:Number(r["Allowance"]),
gross:Number(r["Gross"]),
pf:Number(r["PF@12%"]),
esi:Number(r["ESI@.75%"]),
net:Number(r["Net In Hand"])

};

employees.push(emp);

});

renderTable();

};

reader.readAsArrayBuffer(file);

}


/* TABLE */

function renderTable(){

let tbody=document.querySelector("#employeeTable tbody");

tbody.innerHTML="";

employees.forEach(e=>{

let row=`<tr>

<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.des}</td>
<td>${e.basic}</td>
<td>${e.hra}</td>
<td>${e.allow}</td>
<td>${e.gross}</td>
<td>${e.pf}</td>
<td>${e.esi}</td>
<td>${e.net}</td>

<td>

<button onclick='generatePayslip(${JSON.stringify(e)})'>

View

</button>

</td>

</tr>`;

tbody.innerHTML+=row;

});

}


/* PAYSLIP */

function generatePayslip(emp){

let html=

`<h3>${emp.name}</h3>

<p>Employee Code : ${emp.code}</p>

<table>

<tr><td>Basic</td><td>${emp.basic}</td></tr>
<tr><td>HRA</td><td>${emp.hra}</td></tr>
<tr><td>Allowance</td><td>${emp.allow}</td></tr>
<tr><td>Gross</td><td>${emp.gross}</td></tr>
<tr><td>PF</td><td>${emp.pf}</td></tr>
<tr><td>ESI</td><td>${emp.esi}</td></tr>
<tr><td><b>Net In Hand</b></td><td><b>${emp.net}</b></td></tr>

</table>`;

document.getElementById("payslip").innerHTML=html;

}


/* RESET DEVICE */

function resetDevice(){

let code=document.getElementById("resetCode").value;

alert("Device Reset For "+code);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#eef1f6;
}

header{
background:#0b3c5d;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

button{
background:#1976d2;
border:none;
padding:10px 14px;
color:white;
cursor:pointer;
margin:4px;
}

button:hover{
background:#0d47a1;
}

input,select{
padding:6px;
margin:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
font-size:13px;
}

th{
background:#e8edf3;
}

.footer{
text-align:center;
background:#0b3c5d;
color:white;
padding:12px;
font-size:12px;
margin-top:40px;
}

</style>
</head>

<body>

<header>Rudransh Payroll System</header>

<div class="container">

<div class="card" id="loginBox">

<h3>Login</h3>

<select id="role" onchange="roleChange()">
<option>Employee</option>
<option>Admin</option>
</select>

<br>

User ID
<input id="userid">

<br>

Password
<input type="password" id="password">

<br><br>

<button onclick="login()">Login</button>

</div>


<div id="adminPanel" style="display:none">

<div class="card">

<h3>Admin Panel</h3>

Upload Payroll Excel
<input type="file" id="excelFile">

<br><br>

Upload Company Logo
<input type="file" id="logoFile">

<br><br>

Select Month
<select id="monthList"></select>

<br><br>

<button onclick="viewDB()">View Payroll</button>
<button onclick="generateAllPayslips()">Bulk Payslips</button>
<button onclick="generatePF()">PF ECR</button>
<button onclick="generateESI()">ESI Return</button>
<button onclick="removeMonth()">Remove Month</button>

</div>

<div class="card">

<h3>Payroll Database</h3>

<input placeholder="Search employee" id="search" onkeyup="searchEmp()">

<table id="payrollTable"></table>

</div>

</div>


<div id="empPanel" style="display:none">

<div class="card">

<h3>Employee Portal</h3>

<button onclick="downloadPayslip()">Download Payslip</button>

</div>

</div>

</div>

<div class="footer">
© 2026 Rudransh Enterprises. All rights reserved.
</div>

<script>

let payrollDB=JSON.parse(localStorage.getItem("payrollDB")||"{}")
let logoData=localStorage.getItem("companyLogo")||""

function roleChange(){

let r=document.getElementById("role").value

if(r=="Admin"){
document.getElementById("userid").value="Admin"
document.getElementById("userid").disabled=true
}else{
document.getElementById("userid").disabled=false
document.getElementById("userid").value=""
}

}

function login(){

let role=document.getElementById("role").value
let id=document.getElementById("userid").value
let pass=document.getElementById("password").value

if(role=="Admin"){

if(pass==="Rud@03"){
document.getElementById("loginBox").style.display="none"
document.getElementById("adminPanel").style.display="block"
loadMonths()
}else{
alert("Wrong Password")
}

}else{

let device=localStorage.getItem("deviceBind")

if(!device){
localStorage.setItem("deviceBind",id)
}else if(device!=id){
alert("Device already bound with another employee")
return
}

document.getElementById("loginBox").style.display="none"
document.getElementById("empPanel").style.display="block"

}

}

document.getElementById("logoFile").addEventListener("change",function(){

let reader=new FileReader()

reader.onload=function(e){
logoData=e.target.result
localStorage.setItem("companyLogo",logoData)
}

reader.readAsDataURL(this.files[0])

})


document.getElementById("excelFile").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)
let workbook=XLSX.read(data,{type:'array'})

workbook.SheetNames.forEach(sheet=>{

let rows=XLSX.utils.sheet_to_json(workbook.Sheets[sheet])

let parts=sheet.split("-")
let project=parts[0]
let location=parts.slice(1).join("-")

rows.forEach(r=>{
r.Project=project
r.Location=location
})

let month=rows[0].Month

if(!payrollDB[month]) payrollDB[month]=[]

payrollDB[month]=payrollDB[month].concat(rows)

})

localStorage.setItem("payrollDB",JSON.stringify(payrollDB))

loadMonths()

}

reader.readAsArrayBuffer(this.files[0])

})


function loadMonths(){

let list=document.getElementById("monthList")
list.innerHTML=""

Object.keys(payrollDB).forEach(m=>{
let o=document.createElement("option")
o.text=m
list.add(o)
})

}

function viewDB(){

let m=document.getElementById("monthList").value
let data=payrollDB[m]
let table=document.getElementById("payrollTable")

table.innerHTML=""

if(!data) return

let head="<tr>"
Object.keys(data[0]).forEach(k=>{head+="<th>"+k+"</th>"})
head+="</tr>"

table.innerHTML=head

data.forEach(r=>{

let row="<tr>"
Object.values(r).forEach(v=>{row+="<td>"+v+"</td>"})
row+="</tr>"

table.innerHTML+=row

})

}

function money(v){

if(!v || v==0 || isNaN(v)) return ""

return "₹"+Number(v).toLocaleString("en-IN")

}

function createPayslip(emp,month){

const {jsPDF}=window.jspdf
let doc=new jsPDF()

if(logoData) doc.addImage(logoData,'PNG',10,10,30,15)

doc.setFontSize(18)
doc.text("Rudransh Enterprises",70,20)

doc.setFontSize(13)
doc.text("Employee Payslip",85,30)

doc.setFontSize(11)

doc.text("Month : "+month,20,45)
doc.text("Emp Code : "+emp["Emp Code"],20,55)
doc.text("Employee : "+emp.Name,20,65)

doc.text("Project : "+emp.Project,120,55)
doc.text("Location : "+emp.Location,120,65)

doc.text("UAN : "+(emp["UAN No"]||""),20,75)
doc.text("ESI : "+(emp["ESI No"]||""),120,75)

doc.autoTable({
startY:90,
head:[["EARNINGS","Amount","DEDUCTIONS","Amount"]],
body:[
["Basic",money(emp.Basic),"PF",money(emp.PF)],
["HRA",money(emp.HRA),"ESI",money(emp.ESI)],
["Allowance",money(emp.Allowance),"LWF",money(emp.LWF)],
["Bonus",money(emp.Bonus),"Advance",money(emp.Advance)]
]
})

doc.text("Gross : "+money(emp.Gross),20,160)

doc.setFontSize(14)
doc.text("NET PAY : "+money(emp["Net In Hand"]),20,180)

doc.setFontSize(9)
doc.text("Computer generated payslip – signature not required",20,260)

doc.text("© 2026 Rudransh Enterprises. All rights reserved.",45,285)

doc.save(emp["Emp Code"]+"_"+month+".pdf")

}

function generateAllPayslips(){

let m=document.getElementById("monthList").value

payrollDB[m].forEach(e=>createPayslip(e,m))

}

function downloadPayslip(){

let emp=localStorage.getItem("deviceBind")
let month=Object.keys(payrollDB).slice(-1)[0]

let data=payrollDB[month].find(e=>e["Emp Code"]==emp)

createPayslip(data,month)

}

function generatePF(){

let m=document.getElementById("monthList").value

let txt=""

payrollDB[m].forEach(e=>{
txt+=e["UAN No"]+"#~#"+e.Name+"#~#"+e.PF+"\n"
})

downloadFile(txt,"PF_ECR.txt")

}

function generateESI(){

let m=document.getElementById("monthList").value

let ws=XLSX.utils.json_to_sheet(payrollDB[m])
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"ESI")

XLSX.writeFile(wb,"ESI_Return.xlsx")

}

function removeMonth(){

let m=document.getElementById("monthList").value

delete payrollDB[m]

localStorage.setItem("payrollDB",JSON.stringify(payrollDB))

loadMonths()

document.getElementById("payrollTable").innerHTML=""

}

function downloadFile(data,name){

let blob=new Blob([data])
let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download=name
a.click()

}

function searchEmp(){

let val=document.getElementById("search").value.toLowerCase()

let rows=document.querySelectorAll("#payrollTable tr")

rows.forEach((r,i)=>{

if(i==0) return

r.style.display=r.innerText.toLowerCase().includes(val)?"":"none"

})

}

</script>

</body>
</html>

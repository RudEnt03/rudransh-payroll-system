<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RUDRANSH PAYROLL SYSTEM v6 - Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Excel reader -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- PDF exporter -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; }
header { background:#003366; color:#fff; padding:15px; text-align:center; font-size:22px; }
section { padding:20px; }
input, button { padding:8px; font-size:14px; }
button { cursor:pointer; }
#loginBox, #dashboard, #payslipView { display:none; }
table { border-collapse:collapse; width:100%; margin-top:10px; }
th, td { border:1px solid #000; padding:6px; text-align:center; }
.footerNote { font-size:11px; color:#555; text-align:center; margin-top:10px; }
</style>
</head>
<body>

<header>RUDRANSH PAYROLL SYSTEM v6 - Ultimate</header>

<section id="loginBox">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>
    <button onclick="doLogin()">Login</button>
</section>

<section id="importBox">
    <h2>Import Excel Payroll Sheet</h2>
    <input type="file" id="excelFile" accept=".xlsx, .xls"><br><br>
    <button onclick="loadExcel()">Load Sheet</button>
</section>

<section id="dashboard">
    <h2>Employee Dashboard</h2>
    <table id="empTable">
        <thead>
            <tr><th>ID</th><th>Name</th><th>Project</th><th>Action</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</section>

<section id="payslipView">
    <button onclick="backToDash()">← Back to Dashboard</button>
    <div id="payslipPreview"></div>
    <button onclick="downloadPayslipPDF()">Download PDF</button>
</section>

<script>
// === DATA STORAGE ===
let payrollData = [];
let currentUser = null;

// === LOGIN SYSTEM ===
function doLogin() {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();

    // Hardcoded — change as needed
    if (u === "admin" && p === "admin123") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("importBox").style.display = "block";
        return;
    }
    alert("Invalid credentials!");
}

// === EXCEL LOAD ===
function loadExcel() {
    const fileInput = document.getElementById("excelFile");
    if (!fileInput.files.length) return alert("Select Excel file");
    const reader = new FileReader();
    reader.onload = function(e) {
        const data = e.target.result;
        const wb = XLSX.read(data, { type:"binary" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        payrollData = XLSX.utils.sheet_to_json(sheet, { defval:"" });
        alert("Excel loaded: " + payrollData.length + " records");
        showDashboard();
    };
    reader.readAsBinaryString(fileInput.files[0]);
}

// === DASHBOARD ===
function showDashboard() {
    document.getElementById("importBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    const tbody = document.getElementById("empTable").querySelector("tbody");
    tbody.innerHTML = "";
    payrollData.forEach((e, i) => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${e.ID || i+1}</td>
            <td>${e.Name}</td>
            <td>${e.Project}</td>
            <td><button onclick='viewPayslip(${i})'>View Payslip</button></td>`;
        tbody.appendChild(row);
    });
}

// === PAYSLIP PREVIEW ===
function viewPayslip(idx) {
    const emp = payrollData[idx];
    document.getElementById("dashboard").style.display = "none";
    const container = document.getElementById("payslipPreview");
    container.innerHTML = `
<div style="padding:10px; border:1px solid #000;">
    <h2 style="text-align:center;">Payslip for: ${emp.Name}</h2>

    <table>
        <tr>
            <td><strong>Employee ID</strong></td><td>${emp.ID}</td>
            <td><strong>Project</strong></td><td>${emp.Project}</td>
        </tr>
        <tr>
            <td><strong>UAN</strong></td><td>${emp.UAN}</td>
            <td><strong>ESI</strong></td><td>${emp.ESI}</td>
        </tr>
        <tr>
            <td><strong>M Days</strong></td><td>${emp.MDays}</td>
            <td><strong>P Days</strong></td><td>${emp.PDays}</td>
        </tr>
    </table>

    <table>
        <tr><th>EARNINGS</th><th>AMOUNT</th></tr>
        <tr><td>Basic</td><td>${emp.Basic}</td></tr>
        <tr><td>HRA</td><td>${emp.HRA}</td></tr>
        <tr><td>Allowance</td><td>${emp.Allowance}</td></tr>
        <tr><td>Bonus</td><td>${emp.Bonus}</td></tr>
        <tr><th>GROSS</th><th>${emp.Gross}</th></tr>
    </table>

    <table>
        <tr><th>DEDUCTIONS</th><th>AMOUNT</th></tr>
        <tr><td>PF</td><td>${emp.PF}</td></tr>
        <tr><td>ESI</td><td>${emp.ESI_Deduction}</td></tr>
        <tr><td>Advance</td><td>${emp.Advance}</td></tr>
        <tr><th>TOTAL DEDUCTIONS</th><th>${emp.TotalDeductions}</th></tr>
    </table>

    <h3 style="text-align:center;">Net Pay: ${emp.NetPay}</h3>
    <div class="footerNote">This is a computer generated payslip. No signature required.</div>
</div>`;
    document.getElementById("payslipView").style.display = "block";
}

// === VIEW SWITCHING ===
function backToDash() {
    document.getElementById("payslipView").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
}

// === PDF DOWNLOAD ===
function downloadPayslipPDF() {
    const element = document.getElementById("payslipPreview");
    const opt = {
        margin: [0.2,0.2,0.2,0.2],
        filename: 'Payslip.pdf',
        image: { type:'jpeg', quality:1 },
        html2canvas: { scale:2, scrollY:0 },
        jsPDF: { unit:'in', format:'a4', orientation:'portrait' },
        pagebreak:{ mode:['css','legacy'] }
    };
    html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>

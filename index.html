<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}
h2{
    text-align:center;
}
.card{
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}
th{
    background:#2c3e50;
    color:white;
}
button{
    padding:6px 12px;
    background:#2c3e50;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}
button:hover{
    background:#34495e;
}
.hidden{
    display:none;
}
</style>
</head>

<body>

<h2>Rudransh Enterprise Payroll System</h2>

<div class="card" id="dashboardCard">
    <input type="file" id="excelFile" accept=".xlsx,.xls">
    <button onclick="importExcel()">Import Excel</button>

    <table id="employeeTable"></table>
</div>

<div class="card hidden" id="payslipCard">
    <button onclick="goBack()">⬅ Back</button>
    <h3>Payslip</h3>
    <div id="payslipContent"></div>
</div>

<script>

function importExcel(){

    const fileInput = document.getElementById("excelFile");

    if(!fileInput.files.length){
        alert("Please select Excel file");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type:"array"});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet, {defval:""});

        localStorage.setItem("payrollData", JSON.stringify(json));

        loadEmployees();
    };

    reader.readAsArrayBuffer(fileInput.files[0]);
}

function loadEmployees(){

    const data = JSON.parse(localStorage.getItem("payrollData")) || [];
    const table = document.getElementById("employeeTable");

    table.innerHTML = `
    <tr>
        <th>Emp Code</th>
        <th>Name</th>
        <th>Designation</th>
        <th>UAN</th>
        <th>ESI</th>
        <th>Action</th>
    </tr>`;

    if(data.length === 0) return;

    const keys = Object.keys(data[0]);

    const empKey = keys.find(k => k.toLowerCase().includes("emp"));
    const nameKey = keys.find(k => k.toLowerCase().includes("name"));
    const desKey = keys.find(k => k.toLowerCase().includes("design"));
    const uanKey = keys.find(k => k.toLowerCase().includes("uan"));
    const esiKey = keys.find(k => k.toLowerCase().includes("esi"));

    data.forEach(emp=>{

        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${emp[empKey] || ""}</td>
        <td>${emp[nameKey] || ""}</td>
        <td>${emp[desKey] || ""}</td>
        <td>${emp[uanKey] || ""}</td>
        <td>${emp[esiKey] || ""}</td>
        <td><button onclick="viewPayslip('${emp[empKey]}')">View</button></td>
        `;

        table.appendChild(row);
    });
}

function viewPayslip(code){

    const data = JSON.parse(localStorage.getItem("payrollData")) || [];
    const emp = data.find(e => Object.values(e).includes(code));

    if(!emp) return;

    let html = "<table>";

    Object.keys(emp).forEach(key=>{

        let value = emp[key];

        if(typeof value === "number"){
            value = Math.floor(value);
        }

        html += `
        <tr>
            <td><b>${key}</b></td>
            <td>${value}</td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById("dashboardCard").classList.add("hidden");
    document.getElementById("payslipCard").classList.remove("hidden");
    document.getElementById("payslipContent").innerHTML = html;
}

function goBack(){
    document.getElementById("dashboardCard").classList.remove("hidden");
    document.getElementById("payslipCard").classList.add("hidden");
}

window.onload = loadEmployees;

</script>

</body>
</html>

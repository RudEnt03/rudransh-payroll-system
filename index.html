<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudransh Payroll System</title>
<script src="xlsx.full.min.js"></script>

<style>
body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}

/* HEADER */
header{
background:linear-gradient(90deg,#4e73df,#36b9cc);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* LOGIN PAGE */
#loginPage{
position:fixed;
width:100%;
height:100%;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* LOGIN BOX */
#loginBox{
background:white;
padding:30px;
width:300px;
box-shadow:0 3px 12px rgba(0,0,0,0.2);
border-radius:14px;
}

/* LOGO CROPPING (ONLY RE PART) */
.logoBox{
width:100%;
height:70px;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:15px;
}

.logoBox img{
height:120px;
transform:translateY(-20px); /* adjust this to focus RE */
}

/* INPUT */
#loginBox input,#loginBox select{
width:100%;
margin-bottom:10px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* BUTTON */
button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
background:#36b9cc;
width:100%;
font-weight:bold;
}

/* COPYRIGHT */
#copyright{
margin-top:10px;
font-size:12px;
color:#555;
text-align:center;
}

/* MOBILE */
@media (max-width:480px){
#loginPage{background:white;}

#loginBox{
width:100%;
height:100%;
border-radius:0;
box-shadow:none;
display:flex;
flex-direction:column;
justify-content:center;
}

.logoBox{
height:90px;
}

.logoBox img{
height:150px;
transform:translateY(-30px);
}
}

/* DASHBOARD + REST (UNCHANGED) */
.container{padding:20px;}

.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}

.cards{display:flex;gap:15px;margin-bottom:20px;}

.card{
flex:1;
background:white;
padding:20px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

table{width:100%;border-collapse:collapse;background:white;}

th{background:#4e73df;color:white;padding:10px;}

td{padding:10px;border-bottom:1px solid #eee;text-align:center;}

.view{background:#1cc88a;}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.payslip{
background:white;
width:900px;
margin:40px auto;
padding:25px;
}

.psTable{
width:100%;
border-collapse:collapse;
}

.psTable td,.psTable th{
border:2px solid #000;
padding:8px;
}

.net{
font-size:20px;
font-weight:bold;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div id="loginBox">

    <!-- LOGO -->
    <div class="logoBox">
      <img src="logo.png">
    </div>

    <h3 style="text-align:center;">Login</h3>

    <select id="role" onchange="if(this.value==='admin'){document.getElementById('empCode').value='Admin';}else{document.getElementById('empCode').value='';}">
      <option value="emp">Employee</option>
      <option value="admin">Admin</option>
    </select>

    <input id="empCode" placeholder="Employee Code">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="copyright">
      © 2026 Rudransh Enterprises
    </div>

    <div id="msg" style="color:red"></div>

  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<header><h2>Payroll Dashboard</h2></header>

<div class="container">

<div class="controls">
<select id="monthFilter"><option value="all">All Months</option></select>
<select id="projectFilter"><option value="all">All Projects</option></select>
<button onclick="applyFilter()">Filter</button>
</div>

<div class="cards">
<div class="card">Total Employees <p id="cEmp">0</p></div>
<div class="card">Total Gross <p id="cGross">0</p></div>
<div class="card">Total Net <p id="cNet">0</p></div>
</div>

<table>
<thead>
<tr>
<th>Emp Code</th><th>Name</th><th>Project</th>
<th>Month</th><th>Gross</th><th>Net</th><th>Payslip</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>
</div>

<!-- MODAL -->
<div id="modal">
<div class="payslip">
<div id="psBody"></div>
<button onclick="closePS()">Close</button>
</div>
</div>

<script>
const USER="RudEnt03";
const REPO="rudransh-payroll-system";

let employees=[], months=new Set(), projects=new Set();

function rupee(v){
return "₹"+Math.round(Number(v||0)).toLocaleString("en-IN");
}

async function loadExcel(){
employees=[];
const res=await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents`);
const files=await res.json();
const excels=files.filter(f=>f.name.endsWith(".xlsx"));

for(const f of excels){
const r=await fetch(f.download_url);
const data=await r.arrayBuffer();
const wb=XLSX.read(data,{type:"array"});

wb.SheetNames.forEach(sheet=>{
const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheet]);

rows.forEach(r=>{
let rec={};
for(let k in r){rec[k.trim().toLowerCase()]=r[k];}

let m=rec["month"];
if(typeof m==="number"){m=XLSX.SSF.format("mmm-yy",m);}

months.add(m);
projects.add(sheet);

employees.push({
code:rec["emp code"]||"",
name:rec["name"]||"",
month:m||"",
projectLocation:sheet,
gross:rec["gross"],
net:rec["net in hand"]
});
});
});
}
populateFilters();
render(employees);
}

function login(){
const role=document.getElementById("role").value;
const code=document.getElementById("empCode").value.trim();
const pwd=document.getElementById("password").value;

loadExcel().then(()=>{
if(role==="admin"){
if(pwd!=="Rud@03"){msg.innerText="Invalid admin password"; return;}
loginPage.style.display="none";
dashboard.style.display="block";
}else{
if(code!==pwd){msg.innerText="Password must equal Emp Code"; return;}
showMonthSelection(code);
}
});
}

function showMonthSelection(code){
const empMonths=[...new Set(employees.filter(e=>e.code===code).map(e=>e.month))];

loginPage.innerHTML=`
<div id="loginBox">

<div class="logoBox">
<img src="logo.png">
</div>

<h3 style="text-align:center;">Select Month</h3>

<select id='empMonth'>
${empMonths.map(m=>`<option>${m}</option>`).join('')}
</select>

<br><br>

<button onclick='showEmpPayslip("${code}")'>View Payslip</button>

<div id="copyright">© 2026 Rudransh Enterprises</div>

</div>
`;
}

function showEmpPayslip(code){
const m=document.getElementById("empMonth").value;
const emp=employees.find(e=>e.code===code && e.month===m);
if(!emp){alert("Payslip not found"); return;}
showPS(emp);
}

function showPS(e){
modal.style.display="block";
psBody.innerHTML=`<h3>${e.name}</h3><p>Net: ${rupee(e.net)}</p>`;
}

function closePS(){modal.style.display="none";}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f6fb;
}

header{
background:#0c2d48;
color:white;
padding:16px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:6px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
margin-bottom:20px;
}

button{
background:#1976d2;
border:none;
padding:10px 14px;
color:white;
cursor:pointer;
margin:4px;
}

button:hover{
background:#0d47a1;
}

input,select{
padding:6px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:6px;
font-size:13px;
}

th{
background:#e9eef5;
}

.footer{
background:#0c2d48;
color:white;
text-align:center;
padding:12px;
font-size:12px;
margin-top:30px;
}

</style>
</head>

<body>

<header>Rudransh Payroll System</header>

<div class="container">

<div class="card" id="loginBox">

<h3>Login</h3>

<select id="role" onchange="roleChange()">
<option>Employee</option>
<option>Admin</option>
</select>

<br>

User ID
<input id="userid">

<br>

Password
<input type="password" id="password">

<br><br>

<button onclick="login()">Login</button>

</div>


<div id="adminPanel" style="display:none">

<div class="card">

<h3>Admin Panel</h3>

Upload Payroll Excel
<input type="file" id="excelFile">

<br><br>

Upload Company Logo
<input type="file" id="logoFile">

<br><br>

Select Month
<select id="monthList"></select>

<br>

Employee Code
<input id="empSearch">

<br><br>

<button onclick="viewDB()">View Payroll</button>
<button onclick="singlePayslip()">Generate Payslip</button>
<button onclick="bulkPayslip()">Bulk Payslips</button>
<button onclick="generatePF()">PF ECR</button>
<button onclick="generateESI()">ESI Return</button>
<button onclick="removeMonth()">Remove Month</button>

</div>

<div class="card">

<h3>Payroll Data</h3>

<table id="payrollTable"></table>

</div>

</div>


<div id="empPanel" style="display:none">

<div class="card">

<h3>Employee Portal</h3>

<button onclick="employeePayslip()">Download Payslip</button>

</div>

</div>

</div>

<div class="footer">
© 2026 Rudransh Enterprises. All rights reserved.
</div>

<script>

let payrollDB=JSON.parse(localStorage.getItem("payrollDB")||"{}")
let logoData=localStorage.getItem("companyLogo")||""

function roleChange(){

let r=document.getElementById("role").value

if(r=="Admin"){
document.getElementById("userid").value="Admin"
document.getElementById("userid").disabled=true
}else{
document.getElementById("userid").value=""
document.getElementById("userid").disabled=false
}

}

function login(){

let role=document.getElementById("role").value
let id=document.getElementById("userid").value
let pass=document.getElementById("password").value

if(role=="Admin"){

if(pass==="Rud@03"){
document.getElementById("loginBox").style.display="none"
document.getElementById("adminPanel").style.display="block"
loadMonths()
}else{
alert("Wrong Password")
}

}else{

let device=localStorage.getItem("deviceBind")

if(!device){
localStorage.setItem("deviceBind",id)
}else if(device!=id){
alert("Device already bound")
return
}

document.getElementById("loginBox").style.display="none"
document.getElementById("empPanel").style.display="block"

}

}

function parseMonth(v){

if(typeof v==="number"){

let d=XLSX.SSF.parse_date_code(v)
let date=new Date(d.y,d.m-1,d.d)

return date.toLocaleString('en',{month:'short'})+"-"+String(date.getFullYear()).slice(-2)

}

return v

}

document.getElementById("logoFile").addEventListener("change",function(){

let reader=new FileReader()

reader.onload=function(e){
logoData=e.target.result
localStorage.setItem("companyLogo",logoData)
}

reader.readAsDataURL(this.files[0])

})

document.getElementById("excelFile").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)
let wb=XLSX.read(data,{type:'array'})

wb.SheetNames.forEach(sheet=>{

let rows=XLSX.utils.sheet_to_json(wb.Sheets[sheet])

if(rows.length==0) return

let parts=sheet.split("-")
let project=parts[0]
let location=parts.slice(1).join("-")

rows.forEach(r=>{

r.Project=project
r.Location=location
r.Month=parseMonth(r.Month)

})

let m=rows[0].Month

if(!payrollDB[m]) payrollDB[m]=[]

payrollDB[m]=payrollDB[m].concat(rows)

})

localStorage.setItem("payrollDB",JSON.stringify(payrollDB))

loadMonths()

}

reader.readAsArrayBuffer(this.files[0])

})

function loadMonths(){

let list=document.getElementById("monthList")
list.innerHTML=""

Object.keys(payrollDB).forEach(m=>{

let o=document.createElement("option")
o.text=m
list.add(o)

})

}

function viewDB(){

let m=document.getElementById("monthList").value
let data=payrollDB[m]

let table=document.getElementById("payrollTable")

table.innerHTML=""

if(!data) return

let head="<tr>"

Object.keys(data[0]).forEach(k=>{
head+="<th>"+k+"</th>"
})

head+="</tr>"

table.innerHTML=head

data.forEach(r=>{

let row="<tr>"

Object.values(r).forEach(v=>{
row+="<td>"+v+"</td>"
})

row+="</tr>"

table.innerHTML+=row

})

}

function money(v){

if(!v||isNaN(v)||v==0) return ""

return "₹"+Number(v).toLocaleString("en-IN")

}

function createPayslip(emp,month){

const {jsPDF}=window.jspdf
let doc=new jsPDF()

if(logoData) doc.addImage(logoData,'PNG',10,10,30,15)

doc.setFontSize(18)
doc.text("Rudransh Enterprises",70,20)

doc.setFontSize(12)
doc.text("Employee Payslip",85,30)

doc.text("Month : "+month,20,45)
doc.text("Emp Code : "+emp["Emp Code"],20,55)
doc.text("Name : "+emp.Name,20,65)

doc.text("Project : "+emp.Project,120,55)
doc.text("Location : "+emp.Location,120,65)

doc.text("UAN : "+(emp["UAN No"]||""),20,75)
doc.text("ESI : "+(emp["ESI No"]||""),120,75)

doc.setFontSize(11)

let y=95

doc.text("EARNINGS",20,y)
doc.text("DEDUCTIONS",120,y)

y+=10

doc.text("Basic "+money(emp.Basic),20,y)
doc.text("PF "+money(emp.PF),120,y)

y+=10

doc.text("HRA "+money(emp.HRA),20,y)
doc.text("ESI "+money(emp.ESI),120,y)

y+=10

doc.text("Allowance "+money(emp.Allowance),20,y)
doc.text("LWF "+money(emp.LWF),120,y)

y+=10

doc.text("Bonus "+money(emp.Bonus),20,y)
doc.text("Advance "+money(emp.Advance),120,y)

doc.text("Gross : "+money(emp.Gross),20,170)

doc.setFontSize(14)
doc.text("NET PAY : "+money(emp["Net In Hand"]),20,190)

doc.setFontSize(9)
doc.text("Computer generated payslip – signature not required",20,270)

doc.text("© 2026 Rudransh Enterprises. All rights reserved.",45,285)

doc.save(emp["Emp Code"]+"_"+month+".pdf")

}

function singlePayslip(){

let m=document.getElementById("monthList").value
let emp=document.getElementById("empSearch").value

let data=payrollDB[m].find(e=>e["Emp Code"]==emp)

createPayslip(data,m)

}

function bulkPayslip(){

let m=document.getElementById("monthList").value

payrollDB[m].forEach(e=>{
createPayslip(e,m)
})

}

function employeePayslip(){

let emp=localStorage.getItem("deviceBind")
let m=Object.keys(payrollDB).slice(-1)[0]

let data=payrollDB[m].find(e=>e["Emp Code"]==emp)

createPayslip(data,m)

}

function generatePF(){

let m=document.getElementById("monthList").value

let txt=""

payrollDB[m].forEach(e=>{
txt+=e["UAN No"]+"#~#"+e.Name+"#~#"+e.PF+"\n"
})

let blob=new Blob([txt])

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="PF_ECR.txt"
a.click()

}

function generateESI(){

let m=document.getElementById("monthList").value

let ws=XLSX.utils.json_to_sheet(payrollDB[m])
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"ESI")

XLSX.writeFile(wb,"ESI_Return.xlsx")

}

function removeMonth(){

let m=document.getElementById("monthList").value

delete payrollDB[m]

localStorage.setItem("payrollDB",JSON.stringify(payrollDB))

loadMonths()

}

</script>

</body>
</html>

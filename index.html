<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0b1c2d;
    color:white;
}
.header{
    background:#000814;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#d4af37;
}
.container{
    padding:20px;
}
.card{
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    margin:15px 0;
}
button{
    background:#d4af37;
    border:none;
    padding:8px 15px;
    cursor:pointer;
    border-radius:5px;
    font-weight:bold;
}
button:hover{
    background:#b8962e;
}
input,select{
    padding:8px;
    margin:5px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th{
    background:#001f3f;
    color:#d4af37;
    padding:8px;
}
td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}
.hidden{
    display:none;
}
.payslip{
    background:white;
    color:black;
    padding:20px;
}
.flex{
    display:flex;
    justify-content:space-between;
}
.section{
    width:48%;
}
.net{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    background:#d4af37;
    padding:10px;
    margin-top:15px;
}
.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="header">RUDRANSH PAYROLL SYSTEM</div>

<div class="container">

<!-- ROLE SELECTION -->
<div id="rolePage">
    <div class="card" style="text-align:center">
        <h3>Select Login</h3>
        <button onclick="showAdminLogin()">Admin Login</button>
        <button onclick="showEmpLogin()">Employee Login</button>
    </div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="hidden">
    <div class="card">
        <h3>Admin Login</h3>
        <input id="adminId" placeholder="Admin ID"><br>
        <input id="adminPass" type="password" placeholder="Password"><br>
        <button onclick="adminLogin()">Login</button>
    </div>
</div>

<!-- EMP LOGIN -->
<div id="empLogin" class="hidden">
    <div class="card">
        <h3>Employee Login (Android Only)</h3>
        <input id="empId" placeholder="Employee Code"><br>
        <input id="empPass" placeholder="Password"><br>
        <button onclick="empLogin()">Login</button>
    </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminDash" class="hidden">
    <div class="card">
        <h3>Admin Dashboard</h3>
        <input type="file" onchange="importExcel(event)">
        <button onclick="logout()">Logout</button>
        <button onclick="resetBinding()">Reset All Binding</button>

        <table id="empTable">
            <thead>
                <tr>
                    <th>Select</th>
                    <th>Emp Code</th>
                    <th>Name</th>
                    <th>Designation</th>
                    <th>UAN</th>
                    <th>ESI</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- EMP DASHBOARD -->
<div id="empDash" class="hidden">
    <div class="card">
        <h3>Employee Dashboard</h3>
        <button onclick="logout()">Logout</button>
        <div id="empPayslipArea"></div>
    </div>
</div>

</div>

<script>
let employees = [];
let currentEmp = null;

function showAdminLogin(){
    hideAll();
    adminLoginPage=true;
    document.getElementById("adminLogin").classList.remove("hidden");
}

function showEmpLogin(){
    hideAll();
    document.getElementById("empLogin").classList.remove("hidden");
}

function hideAll(){
    document.getElementById("rolePage").classList.add("hidden");
    document.getElementById("adminLogin").classList.add("hidden");
    document.getElementById("empLogin").classList.add("hidden");
    document.getElementById("adminDash").classList.add("hidden");
    document.getElementById("empDash").classList.add("hidden");
}

function adminLogin(){
    let id=document.getElementById("adminId").value;
    let pass=document.getElementById("adminPass").value;
    if(id==="Admin" && pass==="Rud@03"){
        hideAll();
        document.getElementById("adminDash").classList.remove("hidden");
    }else{
        alert("Invalid Admin Credentials");
    }
}

function empLogin(){
    let id=document.getElementById("empId").value;
    let pass=document.getElementById("empPass").value;

    let ua = navigator.userAgent.toLowerCase();
    if(!ua.includes("android")){
        alert("Employee login allowed only in Android mobile");
        return;
    }

    if(id!==pass){
        alert("ID & Password must be same (Employee Code)");
        return;
    }

    let device = localStorage.getItem("deviceBind");
    if(device && device!==id){
        alert("Another Employee already bound to this device");
        return;
    }

    let emp = employees.find(e=>e.code===id);
    if(!emp){
        alert("Employee not found");
        return;
    }

    localStorage.setItem("deviceBind",id);
    currentEmp=emp;
    hideAll();
    document.getElementById("empDash").classList.remove("hidden");
    showPayslip(emp,"empPayslipArea");
}

function logout(){
    location.reload();
}

function resetBinding(){
    localStorage.removeItem("deviceBind");
    alert("All Device Binding Reset");
}

function importExcel(event){
    let file=event.target.files[0];
    let reader=new FileReader();
    reader.onload=function(e){
        let lines=e.target.result.split("\n");
        employees=[];
        for(let i=1;i<lines.length;i++){
            let cols=lines[i].split(",");
            if(cols.length>5){
                employees.push({
                    code:cols[1],
                    name:cols[2],
                    desig:cols[3],
                    uan:cols[4],
                    esi:cols[5],
                    basic:Math.round(cols[9]||0),
                    hra:Math.round(cols[10]||0),
                    allow:Math.round(cols[11]||0),
                    bonus:Math.round(cols[13]||0),
                    pf:Math.round(cols[15]||0),
                    esid:Math.round(cols[16]||0),
                    net:Math.round(cols[20]||0)
                });
            }
        }
        renderTable();
    };
    reader.readAsText(file);
}

function renderTable(){
    let tbody=document.querySelector("#empTable tbody");
    tbody.innerHTML="";
    employees.forEach(emp=>{
        let row=`
        <tr>
            <td><input type="checkbox"></td>
            <td>${emp.code}</td>
            <td>${emp.name}</td>
            <td>${emp.desig}</td>
            <td>${emp.uan}</td>
            <td>${emp.esi}</td>
            <td><button onclick='viewEmp("${emp.code}")'>View</button></td>
        </tr>`;
        tbody.innerHTML+=row;
    });
}

function viewEmp(code){
    let emp=employees.find(e=>e.code===code);
    let win=window.open("");
    win.document.write(generatePayslipHTML(emp));
    win.print();
}

function showPayslip(emp,area){
    document.getElementById(area).innerHTML=generatePayslipHTML(emp);
}

function generatePayslipHTML(emp){
    return `
    <div class='payslip'>
        <h3 style='text-align:center'>Payslip</h3>
        <p><b>Employee Code:</b> ${emp.code}</p>
        <p><b>Name:</b> ${emp.name}</p>
        <p><b>Designation:</b> ${emp.desig}</p>
        <p><b>UAN:</b> ${emp.uan} | <b>ESI:</b> ${emp.esi}</p>

        <div class='flex'>
            <div class='section'>
                <h4>Earnings</h4>
                Basic: ${emp.basic}<br>
                HRA: ${emp.hra}<br>
                Allowance: ${emp.allow}<br>
                Bonus: ${emp.bonus}
            </div>
            <div class='section'>
                <h4>Deductions</h4>
                PF: ${emp.pf}<br>
                ESI: ${emp.esid}
            </div>
        </div>

        <div class='net'>
            Net Salary: ${emp.net}
        </div>

        <div class='footer'>
            Computer Generated – No Signature Required
        </div>
    </div>`;
}
</script>

</body>
</html>

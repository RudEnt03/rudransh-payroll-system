<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#eef2f7}
header{background:#4e73df;color:white;padding:15px}
.container{padding:20px}
input,select,button{padding:8px;margin:5px}
table{width:100%;border-collapse:collapse;background:white}
th{background:#4e73df;color:white;padding:10px}
td{padding:10px;text-align:center;border-bottom:1px solid #eee}

#loginPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#eef2f7;
display:flex;
align-items:center;
justify-content:center
}

#loginBox{
background:white;
padding:25px;
border-radius:8px;
width:300px
}
</style>
</head>

<body>

<div id="loginPage">
<div id="loginBox">

<h3>Login</h3>

<select id="role">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select>

<input id="empCode" placeholder="Employee Code">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>
</div>

<div id="dashboard" style="display:none">

<header>
<h2>Payroll Dashboard</h2>
</header>

<div class="container">

<input type="file" id="file">

<table>
<thead>
<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<script>

let employees = JSON.parse(localStorage.getItem("payroll_data") || "[]")
let currentEmp = null

function login(){

const role=document.getElementById("role").value
const code=document.getElementById("empCode").value.trim()
const pwd=document.getElementById("password").value

if(role==="admin"){

if(pwd!=="Rud@03"){
alert("Wrong admin password")
return
}

document.getElementById("loginPage").style.display="none"
document.getElementById("dashboard").style.display="block"

render(employees)

}else{

if(pwd!==code){
alert("Password must match employee code")
return
}

currentEmp=code

showEmployeePanel(code)

}

}

function showEmployeePanel(code){

document.getElementById("loginPage").style.display="none"

document.body.innerHTML=`
<div style="padding:30px;text-align:center">

<h3>Select Month</h3>

<select id="empMonth">
<option value="">Select Month</option>
</select>

<br><br>

<button onclick="generateEmpPayslip()">Generate Payslip</button>

</div>
`

populateEmpMonths(code)

}

function populateEmpMonths(code){

const dropdown=document.getElementById("empMonth")

const empData = employees.filter(e =>
e.code &&
e.code !== "N/A" &&
String(e.code).trim().toUpperCase() === String(code).trim().toUpperCase()
)

const months=[...new Set(
empData
.map(e=>e.month)
.filter(m=>m && m!=="N/A")
)]

dropdown.innerHTML='<option value="">Select Month</option>'

months.forEach(m=>{
dropdown.innerHTML+=`<option value="${m}">${m}</option>`
})

}

function generateEmpPayslip(){

const month=document.getElementById("empMonth").value

const emp=employees.find(e=>

String(e.code).trim().toUpperCase()===String(currentEmp).trim().toUpperCase()

&& e.month===month

)

if(!emp){
alert("Payslip not found")
return
}

alert("Payslip generated for "+emp.name+" ("+month+")")

}

document.getElementById("file").addEventListener("change",e=>{

const reader=new FileReader()

reader.onload=function(evt){

const data=new Uint8Array(evt.target.result)
const wb=XLSX.read(data,{type:'array'})

wb.SheetNames.forEach(name=>{

const sheet=wb.Sheets[name]
const rows=XLSX.utils.sheet_to_json(sheet)

rows.forEach(r=>{

let record={}
for(let k in r) record[k.trim().toLowerCase()]=r[k]

let monthValue=record['month']

if(typeof monthValue==='number'){

const parsed=XLSX.SSF.parse_date_code(monthValue)

if(parsed){

const date=new Date(parsed.y,parsed.m-1)

monthValue=date.toLocaleString('en-US',{month:'short',year:'2-digit'})

}

}

employees.push({

code:record['emp code']||"N/A",
name:record['name']||"N/A",
month:monthValue||"N/A",
gross:Number(record['gross']||0),
net:Number(record['net in hand']||0)

})

})

})

localStorage.setItem("payroll_data",JSON.stringify(employees))

render(employees)

}

reader.readAsArrayBuffer(e.target.files[0])

})

function render(data){

let tb=document.getElementById("tbody")
tb.innerHTML=""

data.forEach(e=>{

tb.innerHTML+=`

<tr>
<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.month}</td>
<td>${e.gross}</td>
<td>${e.net}</td>
</tr>

`

})

}

</script>

</body>
</html>

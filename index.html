<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudransh Payroll System</title>
<script src="xlsx.full.min.js"></script>
<style>
body{
  font-family:Segoe UI;
  margin:0;
  background:#eef2f7;
}
header{
  background:linear-gradient(90deg,#4e73df,#36b9cc);
  color:white;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.container{padding:20px;}
.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}
input,select{padding:8px;}
.cards{
  display:flex;
  gap:15px;
  margin-bottom:20px;
}
.card{
  flex:1;
  background:white;
  padding:20px;
  border-radius:8px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
table{
  width:100%;
  border-collapse:collapse;
  background:white;
}
th{
  background:#4e73df;
  color:white;
  padding:10px;
}
td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}
button{
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  color:white;
  background:#36b9cc;
}
.view{background:#1cc88a;}
#modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  overflow:auto;
}
.payslip{
  background:white;
  width:900px;
  margin:40px auto;
  padding:25px;
  position:relative;
}
.psHeader{border:2px solid #000;}
.psTable{width:100%; border-collapse:collapse;}
.psTable td,.psTable th{border:2px solid #000; padding:8px;}
.left{text-align:left;}
.right{text-align:right;}
.center{text-align:center;}
.net{
  font-size:20px;
  font-weight:bold;
  text-align:center;
  margin-top:10px;
}
.footer{
  text-align:center;
  margin-top:15px;
  font-size:12px;
}
#loginPage{
  position:fixed;
  width:100%;
  height:100%;
  background:#eef2f7;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
#loginBox{
  background:white;
  padding:30px;
  width:300px;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}
#loginBox input,#loginBox select{
  width:100%;
  margin-bottom:10px;
  padding:8px;
}
#copyright{
  margin-top:10px;
  font-size:12px;
  color:#555;
  text-align:center;
}
@media (max-width:480px){
  html,body{height:100%; margin:0; padding:0;}
  #loginBox{
    width:100%;
    height:100%;
    border-radius:0;
    box-shadow:none;
    box-sizing:border-box;
  }
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div id="loginBox">
    <h3>Login</h3>
    <select id="role" onchange="autoFillAdmin()">
      <option value="emp">Employee</option>
      <option value="admin">Admin</option>
    </select>
    <input id="empCode" placeholder="Employee Code">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="copyright">
      © 2026 Rudransh Enterprises. All Rights Reserved.
    </div>
    <div id="msg" style="color:red"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<header><h2>Payroll Dashboard</h2></header>
<div class="container">
<div class="controls">
  <select id="monthFilter"><option value="all">All Months</option></select>
  <select id="projectFilter"><option value="all">All Projects</option></select>
  <button onclick="applyFilter()">Filter</button>
</div>
<div class="cards">
  <div class="card">Total Employees<p id="cEmp">0</p></div>
  <div class="card">Total Gross<p id="cGross">0</p></div>
  <div class="card">Total Net<p id="cNet">0</p></div>
</div>
<table>
<thead>
<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Project & Location</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
<th>Payslip</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="payslip" id="payslipBox">
    <div id="psBody"></div>
    <div class="footer">
      Note: This is a Computer Generated Slip and does not require signature
      <br><br>
      <button onclick="window.print()">Print</button>
      <button onclick="closePS()">Close</button>
    </div>
  </div>
</div>

<script>
const USER="RudEnt03";
const REPO="rudransh-payroll-system";
let employees=[];
let months=new Set();
let projects=new Set();

function rupee(v){return "₹"+Math.round(Number(v||0)).toLocaleString("en-IN");}

async function loadExcel(){
  employees=[];
  const api=`https://api.github.com/repos/${USER}/${REPO}/contents`;
  const res=await fetch(api);
  const files=await res.json();
  const excels=files.filter(f=>f.name.endsWith(".xlsx"));
  for(const f of excels){
    const r=await fetch(f.download_url);
    const data=await r.arrayBuffer();
    const wb=XLSX.read(data,{type:"array"});
    wb.SheetNames.forEach(sheetName=>{
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);
      rows.forEach(r=>{
        let rec={};
        for(let k in r){rec[k.trim().toLowerCase()]=r[k];}
        let m=rec["month"];
        if(typeof m==="number"){m=XLSX.SSF.format("mmm-yy",m);}
        months.add(m);
        projects.add(sheetName);
        employees.push({
          code:rec["emp code"]||"",
          name:rec["name"]||"",
          designation:rec["designation"]||"",
          uan:rec["uan no"]||"",
          esi_no:rec["esi no"]||"",
          mdays:rec["m days"]||"",
          pdays:rec["p days"]||"",
          month:m||"",
          projectLocation:sheetName,
          basic:rec["basic"],
          hra:rec["hra"],
          allow:rec["allowance"],
          bonus:rec["bonus"],
          attendance:rec["attendance incentive"],
          gross:rec["gross"],
          pf:rec["pf@12%"],
          esi:rec["esi@.75%"],
          lwf:rec["lwf"],
          advance:rec["advance paid"],
          net:rec["net in hand"]
        });
      });
    });
  }
  populateFilters();
  render(employees);
}

function populateFilters(){
  const mSel=document.getElementById("monthFilter");
  const pSel=document.getElementById("projectFilter");
  months.forEach(m=>{mSel.innerHTML+=`<option value="${m}">${m}</option>`;});
  projects.forEach(p=>{pSel.innerHTML+=`<option value="${p}">${p}</option>`;});
}

function applyFilter(){
  const m=document.getElementById("monthFilter").value;
  const p=document.getElementById("projectFilter").value;
  let data=employees.filter(e=>(m=="all"||e.month==m)&&(p=="all"||e.projectLocation==p));
  render(data);
}

function render(data){
  let tb=document.getElementById("tbody");
  tb.innerHTML="";
  let g=0,n=0;
  data.forEach(e=>{
    g+=Number(e.gross); n+=Number(e.net);
    tb.innerHTML+=`<tr>
<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.projectLocation}</td>
<td>${e.month}</td>
<td>${rupee(e.gross)}</td>
<td>${rupee(e.net)}</td>
<td><button class="view" onclick='showPS(${JSON.stringify(e)})'>View</button></td>
</tr>`;
  });
  document.getElementById("cEmp").innerText=data.length;
  document.getElementById("cGross").innerText=rupee(g);
  document.getElementById("cNet").innerText=rupee(n);
}

function showPS(e){
  document.getElementById("modal").style.display="block";
  document.getElementById("psBody").innerHTML=`
<table class="psTable">
<tr>
<td class="center" style="width:150px"><img src="logo.png" height="70"></td>
<td class="center"><b style="font-size:20px">Rudransh Enterprises</b><br>
Office Address: Shop No- 4,5,6,7, Idgha Road, Bholanath Nagar Market, Delhi-110032</td>
</tr>
<tr><td colspan="2" class="center"><b>Salary Slip for ${e.month}</b></td></tr>
</table>

<br>

<table class="psTable">
<tr><td class="left">Employee Name</td><td class="left">${e.name}</td>
<td class="left">Employee Code</td><td class="left">${e.code}</td></tr>
<tr><td class="left">Designation</td><td class="left">${e.designation}</td>
<td class="left">Project & Location</td><td class="left">${e.projectLocation}</td></tr>
<tr><td class="left">UAN No</td><td class="left">${e.uan}</td>
<td class="left">ESI No</td><td class="left">${e.esi_no}</td></tr>
<tr><td class="left">M Days</td><td class="left">${e.mdays}</td>
<td class="left">P Days</td><td class="left">${e.pdays}</td></tr>
</table>

<br>

<table class="psTable">
<tr><th class="left">Earnings</th><th class="right">Amount</th>
<th class="left">Deductions</th><th class="right">Amount</th></tr>
<tr><td class="left">Basic</td><td class="right">${rupee(e.basic)}</td>
<td class="left">PF</td><td class="right">${rupee(e.pf)}</td></tr>
<tr><td class="left">HRA</td><td class="right">${rupee(e.hra)}</td>
<td class="left">ESI</td><td class="right">${rupee(e.esi)}</td></tr>
<tr><td class="left">Allowance</td><td class="right">${rupee(e.allow)}</td>
<td class="left">LWF</td><td class="right">${rupee(e.lwf)}</td></tr>
<tr><td class="left">Bonus</td><td class="right">${rupee(e.bonus)}</td>
<td class="left">Advance</td><td class="right">${rupee(e.advance)}</td></tr>
<tr><td class="left">Attendance Incentive</td><td class="right">${rupee(e.attendance)}</td><td></td><td></td></tr>
<tr><td class="left"><b>Gross</b></td><td class="right"><b>${rupee(e.gross)}</b></td><td></td><td></td></tr>
</table>

<div class="net">NET PAY ${rupee(e.net)}</div>
`;
}

function closePS(){document.getElementById("modal").style.display="none";}

async function login(){
  const role=document.getElementById("role").value;
  const code=document.getElementById("empCode").value.trim();
  const pwd=document.getElementById("password").value;

  await loadExcel();

  if(role==="admin"){
    document.getElementById("empCode").value="Admin";
    if(pwd!=="Rud@03"){
      document.getElementById("msg").innerText="Invalid admin password"; return;
    }
    document.getElementById("loginPage").style.display="none";
    document.getElementById("dashboard").style.display="block";
  } else {
    const ua=navigator.userAgent;
    if(!/Android|iPhone|Mobile/i.test(ua)){
      document.getElementById("msg").innerText="Employee login mobile only"; return;
    }
    if(code!==pwd){document.getElementById("msg").innerText="Password must equal Emp Code"; return;}

    const empMonths=[...new Set(employees.filter(e=>e.code===code).map(e=>e.month))];
    let html="<div id='loginPage'><div id='loginBox'><h3>Select Month</h3><select id='empMonth'>";
    empMonths.forEach(m=>{html+=`<option value="${m}">${m}</option>`;});
    html+="</select><br><br><button onclick='showEmpPayslip(\""+code+"\")'>View Payslip</button>";
    html+="<div id='copyright'>© 2026 Rudransh Enterprises. All Rights Reserved.</div></div></div>";

    document.getElementById("psBody").innerHTML=html;
    document.getElementById("modal").style.display="block";
    document.getElementById("loginPage").style.display="none";
  }
}

function showEmpPayslip(code){
  const m=document.getElementById("empMonth").value;
  const emp=employees.find(e=>e.code===code && e.month===m);
  if(!emp){alert("Payslip not found"); return;}
  showPS(emp);
}

// Auto-fill Admin ID
function autoFillAdmin(){
  const role=document.getElementById("role").value;
  if(role==="admin"){document.getElementById("empCode").value="Admin";}
  else{document.getElementById("empCode").value="";}
}
</script>

</body>
</html>

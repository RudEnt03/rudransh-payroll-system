<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

button{
padding:10px 18px;
margin:5px;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
}

table,th,td{
border:1px solid #ccc;
}

th,td{
padding:8px;
text-align:center;
}

.logo{
height:60px;
}

</style>
</head>

<body>

<header>

<img src="" id="logo" class="logo">

<h2>RUDRANSH PAYROLL SYSTEM</h2>
<p>Employee Payslip Dashboard</p>

</header>

<div class="container">

<h3>Admin Panel</h3>

<input type="file" id="excelFile">

<br>

<label>Select Month</label>

<select id="monthSelect"></select>

<br>

<button onclick="uploadExcel()">Upload Excel</button>

<button onclick="replaceMonth()">Replace Month Data</button>

<button onclick="removeMonth()">Remove Month Data</button>

<button onclick="generateAllPayslips()">Bulk Payslip Generator</button>

<button onclick="downloadZip()">Download All Payslips ZIP</button>

<button onclick="exportPF()">Export PF Return</button>

<button onclick="exportESI()">Export ESI Return</button>

<h3>Payroll Dashboard</h3>

<table id="salaryTable"></table>

</div>

<script>

let payrollData={}

function loadMonths(){

let months=JSON.parse(localStorage.getItem("months")||"[]")

let select=document.getElementById("monthSelect")

select.innerHTML=""

months.forEach(m=>{
let opt=document.createElement("option")
opt.text=m
opt.value=m
select.appendChild(opt)
})

}

loadMonths()

function uploadExcel(){

let file=document.getElementById("excelFile").files[0]

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:'array'})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let json=XLSX.utils.sheet_to_json(sheet)

let month=document.getElementById("monthSelect").value

if(!month){
alert("Select Month First")
return
}

localStorage.setItem("salary_"+month,JSON.stringify(json))

let months=JSON.parse(localStorage.getItem("months")||"[]")

if(!months.includes(month)){

months.push(month)
localStorage.setItem("months",JSON.stringify(months))

}

alert("Data Stored Successfully")

showDashboard()

}

reader.readAsArrayBuffer(file)

}

function showDashboard(){

let month=document.getElementById("monthSelect").value

let data=JSON.parse(localStorage.getItem("salary_"+month)||"[]")

let table=document.getElementById("salaryTable")

if(data.length==0)return

let keys=Object.keys(data[0])

let html="<tr>"

keys.forEach(k=>html+="<th>"+k+"</th>")

html+="</tr>"

data.forEach(r=>{

html+="<tr>"

keys.forEach(k=>{

html+="<td>"+r[k]+"</td>"

})

html+="</tr>"

})

table.innerHTML=html

}

document.getElementById("monthSelect").onchange=showDashboard

function replaceMonth(){

uploadExcel()

}

function removeMonth(){

let month=document.getElementById("monthSelect").value

localStorage.removeItem("salary_"+month)

alert("Month Data Removed")

showDashboard()

}

async function generatePayslip(emp){

const {jsPDF}=window.jspdf

let pdf=new jsPDF()

pdf.text("RUDRANSH PAYROLL SYSTEM",20,20)

pdf.text("Employee Payslip",20,30)

pdf.text("Month : "+document.getElementById("monthSelect").value,20,40)

let y=60

Object.keys(emp).forEach(k=>{

pdf.text(k+" : "+emp[k],20,y)
y+=10

})

return pdf

}

async function generateAllPayslips(){

let month=document.getElementById("monthSelect").value

let data=JSON.parse(localStorage.getItem("salary_"+month)||"[]")

for(let emp of data){

let pdf=await generatePayslip(emp)

pdf.save(emp["Emp Code"]+"_Payslip.pdf")

}

}

async function downloadZip(){

let zip=new JSZip()

let month=document.getElementById("monthSelect").value

let data=JSON.parse(localStorage.getItem("salary_"+month)||"[]")

for(let emp of data){

let pdf=await generatePayslip(emp)

let blob=pdf.output("blob")

zip.file(emp["Emp Code"]+".pdf",blob)

}

zip.generateAsync({type:"blob"}).then(function(content){

let a=document.createElement("a")

a.href=URL.createObjectURL(content)

a.download="Payslips_"+month+".zip"

a.click()

})

}

function exportPF(){

let month=document.getElementById("monthSelect").value

let data=JSON.parse(localStorage.getItem("salary_"+month)||"[]")

let pf=data.map(e=>({

UAN:e.UAN,
Name:e.Name,
PF:e.PF

}))

downloadCSV(pf,"PF_Return_"+month+".csv")

}

function exportESI(){

let month=document.getElementById("monthSelect").value

let data=JSON.parse(localStorage.getItem("salary_"+month)||"[]")

let esi=data.map(e=>({

IP:e.ESI_Number,
Name:e.Name,
ESI:e.ESI

}))

downloadCSV(esi,"ESI_Return_"+month+".csv")

}

function downloadCSV(data,filename){

let csv=""

let keys=Object.keys(data[0])

csv+=keys.join(",")+"\n"

data.forEach(r=>{

csv+=keys.map(k=>r[k]).join(",")+"\n"

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download=filename

a.click()

}

</script>

</body>
</html>

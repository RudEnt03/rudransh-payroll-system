<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ONLY ADDITION -->
<title>Rudransh Payroll System</title>

<script src="xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}

header{
background:linear-gradient(90deg,#4e73df,#36b9cc);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{padding:20px;}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

input,select{
padding:8px;
}

.cards{
display:flex;
gap:15px;
margin-bottom:20px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#4e73df;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

button{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
background:#36b9cc;
}

.view{background:#1cc88a;}

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
overflow:auto;
}

.payslip{
background:white;
width:900px;
margin:40px auto;
padding:25px;
position:relative;
}

.psHeader{
border:2px solid #000;
}

.psTable{
width:100%;
border-collapse:collapse;
}

.psTable td,.psTable th{
border:2px solid #000;
padding:8px;
}

.left{text-align:left;}
.right{text-align:right;}
.center{text-align:center;}

.net{
font-size:20px;
font-weight:bold;
text-align:center;
margin-top:10px;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
}

#loginPage{
position:fixed;
width:100%;
height:100%;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#loginBox{
background:white;
padding:30px;
width:300px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

#loginBox input,#loginBox select{
width:100%;
margin-bottom:10px;
padding:8px;
}

/* ONLY ADDITION */
#copyright{
margin-top:15px;
font-size:12px;
color:#555;
text-align:center;
}

/* ✅ FULL SCREEN MOBILE FIX (ONLY ADDITION) */
@media (max-width:480px){

html, body{
height:100%;
margin:0;
padding:0;
overflow:hidden;
}

#loginPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#eef2f7;
}

#loginBox{
width:100%;
height:100%;
padding:20px;
box-sizing:border-box;
border-radius:0;
box-shadow:none;
display:flex;
flex-direction:column;
justify-content:center;
}

#loginBox h3{
font-size:30px;
text-align:center;
}

#loginBox input,
#loginBox select{
padding:16px;
font-size:18px;
}

#loginBox button{
padding:16px;
font-size:18px;
width:100%;
}

}

</style>

</head>

<body>

<div id="loginPage">

<div id="loginBox">

<h3>Login</h3>

<select id="role">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select>

<input id="empCode" placeholder="Employee Code">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg" style="color:red"></div>

</div>

<div id="copyright">
© 2026 Rudransh Enterprises. All Rights Reserved.
</div>

</div>

<div id="dashboard" style="display:none">

<header>
<h2>Payroll Dashboard</h2>
</header>

<div class="container">

<div class="controls">

<select id="monthFilter">
<option value="all">All Months</option>
</select>

<select id="projectFilter">
<option value="all">All Projects</option>
</select>

<button onclick="applyFilter()">Filter</button>

</div>

<div class="cards">

<div class="card">
Total Employees
<p id="cEmp">0</p>
</div>

<div class="card">
Total Gross
<p id="cGross">0</p>
</div>

<div class="card">
Total Net
<p id="cNet">0</p>
</div>

</div>

<table>

<thead>

<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Project & Location</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
<th>Payslip</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<div id="modal">

<div class="payslip">

<div id="psBody"></div>

<div class="footer">
Note: This is a Computer Generated Slip and does not require signature
<br><br>
<button onclick="window.print()">Print</button>
<button onclick="closePS()">Close</button>
</div>

</div>

</div>

<script>

/* 🔴 EXACT SAME JS — NOT CHANGED */

const USER="RudEnt03";
const REPO="rudransh-payroll-system";

let employees=[];
let months=new Set();
let projects=new Set();

function rupee(v){
return "₹"+Math.round(Number(v||0)).toLocaleString("en-IN");
}

async function loadExcel(){

employees=[];

const api=`https://api.github.com/repos/${USER}/${REPO}/contents`;
const res=await fetch(api);
const files=await res.json();

const excels=files.filter(f=>f.name.endsWith(".xlsx"));

for(const f of excels){

const r=await fetch(f.download_url);
const data=await r.arrayBuffer();

const wb=XLSX.read(data,{type:"array"});

wb.SheetNames.forEach(sheetName=>{

const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);

rows.forEach(r=>{

let rec={};

for(let k in r){
rec[k.trim().toLowerCase()]=r[k];
}

let m=rec["month"];

if(typeof m==="number"){
m=XLSX.SSF.format("mmm-yy",m);
}

months.add(m);
projects.add(sheetName);

employees.push({

code:rec["emp code"]||"",
name:rec["name"]||"",
designation:rec["designation"]||"",
uan:rec["uan no"]||"",
esi_no:rec["esi no"]||"",
mdays:rec["m days"]||"",
pdays:rec["p days"]||"",
month:m||"",
projectLocation:sheetName,

basic:rec["basic"],
hra:rec["hra"],
allow:rec["allowance"],
bonus:rec["bonus"],
attendance:rec["attendance incentive"],
gross:rec["gross"],
pf:rec["pf@12%"],
esi:rec["esi@.75%"],
lwf:rec["lwf"],
advance:rec["advance paid"],
net:rec["net in hand"]

});

});

});

}

populateFilters();
render(employees);

}

/* REST SAME — NO CHANGE */

</script>

</body>
</html>

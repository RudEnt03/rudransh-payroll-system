<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:#0c2d48;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px 14px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#0d47a1;
}

input,select{
padding:6px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:6px;
font-size:13px;
}

th{
background:#e8eef7;
}

.footer{
background:#0c2d48;
color:white;
text-align:center;
padding:10px;
font-size:12px;
}

</style>

</head>

<body>

<header>Rudransh Payroll System</header>

<div class="container">

<div class="card" id="loginBox">

<h3>Login</h3>

<select id="role" onchange="roleChange()">
<option>Employee</option>
<option>Admin</option>
</select>

<br>

User ID
<input id="userid">

<br>

Password
<input type="password" id="password">

<br><br>

<button onclick="login()">Login</button>

</div>



<div id="adminPanel" style="display:none">

<div class="card">

<h3>Admin Dashboard</h3>

Upload Payroll Excel
<input type="file" id="excelFile">

<br>

Upload Company Logo
<input type="file" id="logoFile">

<br>

Select Month
<select id="monthList"></select>

<br>

Employee Code
<input id="empSearch">

<br>

<button onclick="viewDB()">View Payroll</button>
<button onclick="singlePayslip()">Generate Payslip</button>
<button onclick="bulkPayslip()">Bulk Payslips</button>
<button onclick="generatePF()">PF ECR</button>
<button onclick="generateESI()">ESI Return</button>
<button onclick="removeMonth()">Remove Month</button>

</div>

<div class="card">

<h3>Payroll Data</h3>
<table id="payrollTable"></table>

</div>

</div>



<div id="empPanel" style="display:none">

<div class="card">

<h3>Employee Portal</h3>

<button onclick="employeePayslip()">Download Payslip</button>

</div>

</div>

</div>

<div class="footer">
© 2026 Rudransh Enterprises. All rights reserved.
</div>

<script>

let payrollDB=JSON.parse(localStorage.getItem("payrollDB")||"{}")
let logoData=localStorage.getItem("companyLogo")||""

let col={
emp:"Emp Code",
name:"Name",
designation:"Designation",
uan:"UAN No",
esino:"ESI No",
month:"Month",
mdays:"M Days",
pdays:"P Days",
basic:"Basic",
hra:"HRA",
allow:"Allowance",
leave:"Leave",
bonus:"Bonus",
gross:"Gross",
pf:"PF@12%",
esi:"ESI@.75%",
lwf:"LWF",
total:"Total In Hand",
advance:"Advance Paid",
net:"Net In Hand"
}

function roleChange(){

let r=document.getElementById("role").value

if(r=="Admin"){
document.getElementById("userid").value="Admin"
document.getElementById("userid").disabled=true
}else{
document.getElementById("userid").value=""
document.getElementById("userid").disabled=false
}

}

function login(){

let role=document.getElementById("role").value
let id=document.getElementById("userid").value
let pass=document.getElementById("password").value

if(role=="Admin"){

if(pass==="Rud@03"){

document.getElementById("loginBox").style.display="none"
document.getElementById("adminPanel").style.display="block"

loadMonths()

}else{
alert("Wrong password")
}

}else{

let device=localStorage.getItem("deviceBind")

if(!device){
localStorage.setItem("deviceBind",id)
}else if(device!=id){
alert("Device already bound to another employee")
return
}

document.getElementById("loginBox").style.display="none"
document.getElementById("empPanel").style.display="block"

}

}

document.getElementById("logoFile").addEventListener("change",function(){

let reader=new FileReader()

reader.onload=function(e){

logoData=e.target.result
localStorage.setItem("companyLogo",logoData)

}

reader.readAsDataURL(this.files[0])

})

document.getElementById("excelFile").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)
let wb=XLSX.read(data,{type:'array'})

wb.SheetNames.forEach(sheet=>{

let rows=XLSX.utils.sheet_to_json(wb.Sheets[sheet],{defval:""})

if(rows.length==0) return

let parts=sheet.split("-")

let project=parts[0]
let location=parts.slice(1).join("-")

rows.forEach(r=>{

let m=r[col.month]

if(typeof m==="number"){

let d=XLSX.SSF.parse_date_code(m)
let date=new Date(d.y,d.m-1,d.d)

m=date.toLocaleString('en',{month:'short'})+"-"+String(date.getFullYear()).slice(-2)

}

r.Month=m
r.Project=project
r.Location=location

})

let m=rows[0].Month

if(!payrollDB[m]) payrollDB[m]=[]

payrollDB[m]=payrollDB[m].concat(rows)

})

localStorage.setItem("payrollDB",JSON.stringify(payrollDB))

loadMonths()

}

reader.readAsArrayBuffer(this.files[0])

})

function loadMonths(){

let list=document.getElementById("monthList")

list.innerHTML=""

Object.keys(payrollDB).forEach(m=>{

let o=document.createElement("option")
o.text=m
list.add(o)

})

}

function viewDB(){

let m=document.getElementById("monthList").value
let data=payrollDB[m]

let table=document.getElementById("payrollTable")

table.innerHTML=""

if(!data) return

let head="<tr>"

Object.keys(data[0]).forEach(k=>{
head+="<th>"+k+"</th>"
})

head+="</tr>"

table.innerHTML=head

data.forEach(r=>{

let row="<tr>"

Object.values(r).forEach(v=>{
row+="<td>"+v+"</td>"
})

row+="</tr>"

table.innerHTML+=row

})

}

function money(v){

if(!v||isNaN(v)||v==0) return ""

return "₹"+Number(v).toLocaleString("en-IN")

}

function createPayslip(emp,month){

const {jsPDF}=window.jspdf
let doc=new jsPDF()

if(logoData){
doc.addImage(logoData,'PNG',10,10,30,15)
}

doc.setFontSize(18)
doc.text("Rudransh Enterprises",70,20)

doc.setFontSize(12)
doc.text("Employee Payslip",85,30)

doc.text("Month : "+month,20,45)

doc.text("Emp Code : "+emp[col.emp],20,55)
doc.text("Name : "+emp[col.name],20,65)

doc.text("Project : "+emp.Project,120,55)
doc.text("Location : "+emp.Location,120,65)

doc.text("UAN : "+emp[col.uan],20,75)
doc.text("ESI : "+emp[col.esino],120,75)

doc.text("Basic "+money(emp[col.basic]),20,100)
doc.text("HRA "+money(emp[col.hra]),20,110)
doc.text("Allowance "+money(emp[col.allow]),20,120)
doc.text("Bonus "+money(emp[col.bonus]),20,130)

doc.text("PF "+money(emp[col.pf]),120,100)
doc.text("ESI "+money(emp[col.esi]),120,110)
doc.text("LWF "+money(emp[col.lwf]),120,120)
doc.text("Advance "+money(emp[col.advance]),120,130)

doc.text("Gross : "+money(emp[col.gross]),20,160)

doc.setFontSize(14)
doc.text("NET PAY : "+money(emp[col.net]),20,190)

doc.setFontSize(9)
doc.text("Computer generated payslip – signature not required",20,270)

doc.text("© 2026 Rudransh Enterprises. All rights reserved.",45,285)

doc.save(emp[col.emp]+"_"+month+".pdf")

}

function singlePayslip(){

let m=document.getElementById("monthList").value
let emp=document.getElementById("empSearch").value

let data=payrollDB[m].find(e=>e[col.emp]==emp)

createPayslip(data,m)

}

function bulkPayslip(){

let m=document.getElementById("monthList").value

payrollDB[m].forEach(e=>{
createPayslip(e,m)
})

}

function employeePayslip(){

let emp=localStorage.getItem("deviceBind")
let m=Object.keys(payrollDB).slice(-1)[0]

let data=payrollDB[m].find(e=>e[col.emp]==emp)

createPayslip(data,m)

}

function generatePF(){

let m=document.getElementById("monthList").value

let txt=""

payrollDB[m].forEach(e=>{
txt+=e[col.uan]+"#~#"+e[col.name]+"#~#"+e[col.pf]+"\n"
})

let blob=new Blob([txt])
let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="PF_ECR.txt"
a.click()

}

function generateESI(){

let m=document.getElementById("monthList").value

let ws=XLSX.utils.json_to_sheet(payrollDB[m])
let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"ESI")

XLSX.writeFile(wb,"ESI_Return.xlsx")

}

function removeMonth(){

let m=document.getElementById("monthList").value

delete payrollDB[m]

localStorage.setItem("payrollDB",JSON.stringify(payrollDB))

loadMonths()

}

</script>

</body>
</html>

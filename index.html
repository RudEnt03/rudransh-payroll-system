<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudransh Payroll System</title>

<script src="xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}

/* MOBILE FIX */
@media(max-width:600px){
#loginBox{
width:92% !important;
padding:20px !important;
}
#empPage{
padding:20px !important;
}
#empPage select{
width:100%;
padding:12px;
}
table{
display:block;
overflow-x:auto;
}
}

/* FOOTER */
.footerCopy{
position:fixed;
bottom:0;
width:100%;
text-align:center;
font-size:12px;
padding:6px;
background:#eef2f7;
}

/* LOGIN */
#loginPage{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#loginBox{
background:white;
padding:30px;
width:320px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

#loginBox input,#loginBox select{
width:100%;
margin-bottom:10px;
padding:10px;
}

/* EMP PAGE */
#empPage{
display:none;
height:100vh;
background:#eef2f7;
text-align:center;
padding-top:80px;
}

/* DASHBOARD */
header{
background:linear-gradient(90deg,#4e73df,#36b9cc);
color:white;
padding:18px;
}

.container{padding:20px;}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#4e73df;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

button{
padding:8px 14px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
background:#36b9cc;
}

.view{background:#1cc88a;}

#modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
overflow:auto;
}

.payslip{
background:white;
width:900px;
margin:40px auto;
padding:25px;
}

/* PAYSLIP TABLE */
.psTable{
width:100%;
border-collapse:collapse;
}

.psTable td,.psTable th{
border:2px solid #000;
padding:8px;
}

.left{text-align:left;}
.right{text-align:right;}
.center{text-align:center;}

.net{
font-size:20px;
font-weight:bold;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage">

<div id="loginBox">

<h3>Login</h3>

<select id="role" onchange="autoFillAdmin()">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select>

<input id="empCode" placeholder="Employee Code">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg" style="color:red"></div>

</div>

<div class="footerCopy">
© <span id="yr"></span> Rudransh Enterprises. All rights reserved.
</div>

</div>

<!-- EMPLOYEE MONTH PAGE -->
<div id="empPage">

<h3>Select Month</h3>

<select id="empMonth"></select>

<br><br>

<button onclick="showEmpPayslip()">View Payslip</button>

<div class="footerCopy">
© <span id="yr2"></span> Rudransh Enterprises. All rights reserved.
</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<header><h2>Payroll Dashboard</h2></header>

<div class="container">

<table>

<thead>
<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Project</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
<th>View</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<!-- MODAL -->
<div id="modal">
<div class="payslip">
<div id="psBody"></div>
<br>
<button onclick="window.print()">Print</button>
<button onclick="closePS()">Close</button>
</div>
</div>

<script>

document.getElementById("yr").innerText=new Date().getFullYear();
document.getElementById("yr2").innerText=new Date().getFullYear();

function autoFillAdmin(){
if(role.value==="admin"){
empCode.value="Admin";
empCode.readOnly=true;
}else{
empCode.value="";
empCode.readOnly=false;
}
}

let employees=[];

async function loadExcel(){

employees=[];

const res=await fetch("data.xlsx");
const data=await res.arrayBuffer();

const wb=XLSX.read(data,{type:"array"});

wb.SheetNames.forEach(s=>{

const rows=XLSX.utils.sheet_to_json(wb.Sheets[s]);

rows.forEach(r=>{

employees.push({
code:r["Emp Code"],
name:r["Name"],
month:r["Month"],
gross:r["Gross"],
net:r["Net in Hand"],
project:s,
raw:r
});

});

});

render();

}

function render(){

let tb=document.getElementById("tbody");
tb.innerHTML="";

employees.forEach(e=>{

tb.innerHTML+=`
<tr>
<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.project}</td>
<td>${e.month}</td>
<td>${e.gross}</td>
<td>${e.net}</td>
<td><button class="view" onclick='showPS(${JSON.stringify(e.raw)})'>View</button></td>
</tr>
`;

});

}

function login(){

let role=document.getElementById("role").value;
let code=empCode.value;
let pwd=password.value;

if(role==="admin"){

if(pwd!=="Rud@03"){
msg.innerText="Wrong password";
return;
}

loginPage.style.display="none";
dashboard.style.display="block";

}else{

if(code!==pwd){
msg.innerText="Password must match Emp Code";
return;
}

let months=[...new Set(
employees.filter(e=>e.code==code).map(e=>e.month)
)];

empMonth.innerHTML="";

months.forEach(m=>{
empMonth.innerHTML+=`<option>${m}</option>`;
});

loginPage.style.display="none";
empPage.style.display="block";

}

}

function showEmpPayslip(){

let code=empCode.value;
let m=empMonth.value;

let emp=employees.find(e=>e.code==code && e.month==m);

if(!emp){
alert("No payslip found");
return;
}

showPS(emp.raw);

}

function showPS(r){

modal.style.display="block";

psBody.innerHTML="... SAME AS YOUR ORIGINAL (UNCHANGED) ...";

}

function closePS(){
modal.style.display="none";
}

window.onload=loadExcel;

</script>

</body>
</html>

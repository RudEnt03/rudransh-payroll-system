<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System - Month Fix UTC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:Segoe UI;background:#0b1c2d;color:white;}
header{background:#001f3f;color:#ffd700;text-align:center;padding:15px;font-size:24px;font-weight:bold;}
.glass{background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-radius:12px;padding:20px;margin:20px auto;width:90%;max-width:900px;}
button{background:#d4af37;color:#000;padding:8px 14px;border:none;border-radius:6px;margin:4px;cursor:pointer;font-weight:bold;}
button:hover{opacity:0.8;}
table{width:100%;border-collapse:collapse;color:black;background:white;margin-top:15px;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
th{background:#001f3f;color:#ffd700;}
</style>
</head>
<body>

<header>Rudransh Payroll System</header>

<div class="glass">
<h3>Admin Dashboard</h3>
<input type="file" id="excelFile" accept=".xlsx,.xls">
<select id="monthSelect"><option value="">--Select Month--</option></select>
<button id="generateBtn">Generate Payslip(s)</button>
<table id="empTable">
<thead>
<tr>
<th>Select</th><th>Emp Code</th><th>Name</th><th>Month</th><th>Net Salary</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
let employees = [], monthData = {};
const empTable = document.getElementById("empTable").getElementsByTagName("tbody")[0];
const monthSelect = document.getElementById("monthSelect");

// ===== FIX: Convert Excel Month to text ignoring timezone =====
function convertMonth(cell){
    if(typeof cell === "string") return cell.trim(); // already text
    if(cell instanceof Date){
        const year = cell.getFullYear();
        const month = cell.getMonth();
        const d = new Date(Date.UTC(year, month, 1)); // first day of month UTC
        return d.toLocaleString('en-US',{month:'short',year:'2-digit',timeZone:'UTC'});
    }
    if(typeof cell === 'number'){
        const d = XLSX.SSF.parse_date_code(cell);
        const date = new Date(Date.UTC(d.y,d.m-1,1));
        return date.toLocaleString('en-US',{month:'short',year:'2-digit',timeZone:'UTC'});
    }
    return String(cell).trim();
}

// ===== Excel Import =====
document.getElementById("excelFile").onchange = function(e){
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data,{type:'array',cellDates:true});
        employees = []; monthData = {};

        wb.SheetNames.forEach(sheet=>{
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheet],{header:1,defval:""});
            if(rows.length<2) return;

            const headers = rows[0].map(h=>h.toString().trim().toLowerCase());
            const codeCol = headers.findIndex(h=>h.includes("emp") && h.includes("code"));
            const nameCol = headers.findIndex(h=>h.includes("name"));
            const monthCol = headers.findIndex(h=>h.includes("month"));
            const netCol = headers.findIndex(h=>h.includes("net"));
            if(codeCol===-1||nameCol===-1||monthCol===-1||netCol===-1){alert("Missing headers"); return;}

            for(let i=1;i<rows.length;i++){
                const r = rows[i]; if(r.length>0){
                    const empMonth = convertMonth(r[monthCol]);
                    const emp = {
                        code: r[codeCol] || "",
                        name: r[nameCol] || "",
                        month: empMonth,
                        net: r[netCol] || 0
                    };
                    employees.push(emp);
                    monthData[empMonth] = monthData[empMonth] || [];
                    monthData[empMonth].push(emp);
                }
            }
        });

        renderTable();
        renderMonthDropdown();
        alert("Excel imported! Months now match Excel exactly.");
    };
    reader.readAsArrayBuffer(file);
};

// ===== Render Table =====
function renderTable(){
    let html = "";
    employees.forEach(e=>{
        html+=`<tr>
        <td><input type="checkbox" data-month="${e.month}" data-code="${e.code}"></td>
        <td>${e.code}</td><td>${e.name}</td><td>${e.month}</td><td>${e.net}</td>
        </tr>`;
    });
    empTable.innerHTML = html;
}

// ===== Render Month Dropdown =====
function renderMonthDropdown(){
    monthSelect.innerHTML = "<option value=''>--Select Month--</option>";
    Object.keys(monthData).sort().forEach(m=>{
        monthSelect.innerHTML += `<option value='${m}'>${m}</option>`;
    });
}

// ===== Filter Table by Month =====
monthSelect.onchange = function(){
    const sel = this.value;
    const rows = empTable.getElementsByTagName('tr');
    for(let i=0;i<rows.length;i++){
        const td = rows[i].getElementsByTagName('td')[3];
        if(td) rows[i].style.display = (sel === "" || td.innerText === sel) ? "" : "none";
    }
};

// ===== PDF Generation =====
document.getElementById("generateBtn").onclick = () => {
    const selMonth = monthSelect.value;
    if(!selMonth){ alert("Select Month"); return; }
    const checks = document.querySelectorAll(`input[type='checkbox']:checked[data-month='${selMonth}']`);
    if(checks.length===0){ alert("Select at least one employee"); return; }
    checks.forEach(c=>{
        const code = c.getAttribute("data-code");
        const emp = employees.find(e=>e.code===code && e.month===selMonth);
        if(emp){
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(`Emp Code: ${emp.code}\nName: ${emp.name}\nMonth: ${emp.month}\nNet Salary: ${emp.net}`, 20,20);
            doc.save(emp.code+"_Payslip.pdf");
        }
    });
};
</script>
</body>
</html>

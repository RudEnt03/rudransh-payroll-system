<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
#payslipArea { width:794px; min-height:1123px; border:1px solid #000; padding:20px; }
</style>
</head>
<body>

<div id="payslipArea">
<h2>Test Payslip</h2>
<p>Employee: John Doe</p>
<p>Month: Mar-26</p>
<p>Gross: ₹50,000</p>
<p>Net: ₹45,000</p>
</div>

<button onclick="downloadPDF()">Download PDF</button>

<script>
function downloadPDF(){
  const element = document.getElementById("payslipArea");
  html2pdf().set({
    margin: 10,
    filename: 'Payslip.pdf',
    image: {type: 'jpeg', quality: 1},
    html2canvas: {scale: 2, logging: true, letterRendering: true, useCORS: true},
    jsPDF: {unit: 'px', format: [794,1123], orientation: 'portrait'}
  }).from(element).save();
}
</script>

</body>
</html>

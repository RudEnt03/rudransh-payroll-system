<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0b2a4a;
color:white;
text-align:center;
padding:16px;
font-size:22px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:6px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
margin-bottom:20px;
}

input,select{
padding:7px;
margin:6px;
}

button{
background:#0b2a4a;
color:white;
border:none;
padding:9px 14px;
cursor:pointer;
}

button:hover{
background:#1a3d6d;
}

.footer{
background:#0b2a4a;
color:white;
text-align:center;
padding:10px;
font-size:12px;
}

</style>

</head>

<body>

<header>RUDRANSH PAYROLL SYSTEM</header>

<div class="container">

<div class="card">

Upload Payroll Excel  
<input type="file" id="excelFile">

<br><br>

Upload Company Logo  
<input type="file" id="logoFile">

<br><br>

Select Month  
<select id="monthList"></select>

<br><br>

Employee Code  
<input id="empCode">

<button onclick="generatePayslip()">Generate Payslip</button>

</div>

</div>

<div class="footer">
© 2026 Rudransh Enterprises. All rights reserved.
</div>

<script>

let payrollData=[]
let logoData=""

document.getElementById("logoFile").addEventListener("change",function(){

let reader=new FileReader()

reader.onload=function(e){

logoData=e.target.result

}

reader.readAsDataURL(this.files[0])

})

document.getElementById("excelFile").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let wb=XLSX.read(data,{type:'array'})

let all=[]

wb.SheetNames.forEach(sheet=>{

let rows=XLSX.utils.sheet_to_json(wb.Sheets[sheet],{defval:""})

let parts=sheet.split("-")

let project=parts[0]
let location=parts.slice(1).join("-")

rows.forEach(r=>{

let m=r["Month"]

if(typeof m==="number"){

let d=XLSX.SSF.parse_date_code(m)

let dt=new Date(d.y,d.m-1,d.d)

m=dt.toLocaleString('en',{month:'short'})+"-"+String(dt.getFullYear()).slice(-2)

}

r.Month=m
r.Project=project
r.Location=location

})

all=all.concat(rows)

})

payrollData=all

loadMonths()

}

reader.readAsArrayBuffer(this.files[0])

})

function loadMonths(){

let list=document.getElementById("monthList")

list.innerHTML=""

let months=[...new Set(payrollData.map(r=>r.Month))]

months.forEach(m=>{

let o=document.createElement("option")

o.value=m
o.text=m

list.appendChild(o)

})

}

function money(v){

if(!v || v==0 || isNaN(v)) return ""

return "₹"+Number(v).toLocaleString("en-IN")

}

function generatePayslip(){

let emp=document.getElementById("empCode").value
let month=document.getElementById("monthList").value

let row=payrollData.find(r=>r["Emp Code"]==emp && r.Month==month)

if(!row){

alert("Employee not found")

return
}

createPDF(row)

}

function createPDF(emp){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let y=20

if(logoData){

doc.addImage(logoData,'PNG',15,10,30,15)

}

doc.setFontSize(18)
doc.text("Rudransh Enterprises",70,20)

doc.setFontSize(13)
doc.text("Employee Payslip",80,28)

doc.setFontSize(11)

doc.text("Month : "+emp.Month,20,45)

doc.text("Emp Code : "+emp["Emp Code"],20,55)
doc.text("Name : "+emp["Name"],20,63)
doc.text("Designation : "+emp["Designation"],20,71)

doc.text("UAN : "+emp["UAN No"],120,55)
doc.text("ESI : "+emp["ESI No"],120,63)

doc.text("Project : "+emp.Project,120,71)
doc.text("Location : "+emp.Location,120,79)

y=95

doc.rect(20,y,80,8)
doc.rect(100,y,80,8)

doc.text("EARNINGS",50,y+6)
doc.text("DEDUCTIONS",125,y+6)

y+=10

doc.text("Basic",22,y)
doc.text(money(emp["Basic"]),70,y)

doc.text("PF",102,y)
doc.text(money(emp["PF@12%"]),150,y)

y+=8

doc.text("HRA",22,y)
doc.text(money(emp["HRA"]),70,y)

doc.text("ESI",102,y)
doc.text(money(emp["ESI@.75%"]),150,y)

y+=8

doc.text("Allowance",22,y)
doc.text(money(emp["Allowance"]),70,y)

doc.text("LWF",102,y)
doc.text(money(emp["LWF"]),150,y)

y+=8

doc.text("Bonus",22,y)
doc.text(money(emp["Bonus"]),70,y)

doc.text("Advance",102,y)
doc.text(money(emp["Advance Paid"]),150,y)

y+=15

doc.text("Gross Salary : "+money(emp["Gross"]),20,y)

y+=12

doc.setFontSize(14)
doc.text("Net Salary : "+money(emp["Net In Hand"]),20,y)

doc.setFontSize(9)

doc.text("Computer generated payslip – signature not required",20,270)

doc.text("© 2026 Rudransh Enterprises. All rights reserved.",50,285)

doc.save(emp["Emp Code"]+"_"+emp.Month+".pdf")

}

</script>

</body>
</html>

<html>
<head>
<title>Rudransh Enterprises Payroll</title>

<script src="xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;

}

.sidebar{

}

}

}

background:#374151;
}

.main{
margin-left:220px;
padding:20px;
}

.header{
font-size:22px;

}

.cards{

}

.card{

}

}

input{

}

button.primary{

}

.payslip{
width:650px;

padding:20px;

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h3>Admin Login</h3>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button class="primary" id="loginBtn">Login</button>

</div>

</div>

<!-- APP -->

<div id="app" style="display:none">

<div class="sidebar">

<h2>Payroll</h2>

<button onclick="showDashboard()">Dashboard</button>
<button onclick="showEmployees()">Employees</button>

</div>

<div class="main">

<div id="dashboardPage">

<div class="header">
Rudransh Enterprises – Payroll Dashboard
</div>

<div class="cards">

<div class="card">
<h3 id="totalEmployees">0</h3>
Total Employees
</div>

<div class="card">
<h3 id="totalGross">0</h3>
Total Gross
</div>

<div class="card">
<h3 id="totalNet">0</h3>
Total Net Pay
</div>

</div>

<h3>Upload Excel</h3>

<input type="file" id="excelFile">

<button class="primary" id="importBtn">Import Excel</button>

</div>

<div id="employeePage" style="display:none">

<h3>Employee List</h3>

<input id="searchBox" placeholder="Search Employee">

<table id="employeeTable">

<thead>
<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Designation</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
<th>Payslip</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<!-- PAYSLIP -->

<div id="payslipPage" style="display:none">

<div class="main">

<button onclick="back()">Back</button>

<div class="payslip" id="payslipContent"></div>

<br>

<button class="primary" onclick="window.print()">Print Payslip</button>

</div>

</div>

<script>

let employees=[];

/* LOGIN */

document.getElementById("loginBtn").addEventListener("click",function(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="Rudransh" && p==="Rud@03"){

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";

}else{

alert("Invalid Login");

}

});

/* NAVIGATION */

function showDashboard(){

document.getElementById("dashboardPage").style.display="block";
document.getElementById("employeePage").style.display="none";

}

function showEmployees(){

document.getElementById("dashboardPage").style.display="none";
document.getElementById("employeePage").style.display="block";

}

/* IMPORT EXCEL */

document.getElementById("importBtn").addEventListener("click",function(){

let file=document.getElementById("excelFile").files[0];

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let workbook=XLSX.read(data,{type:"array"});

let sheet=workbook.Sheets[workbook.SheetNames[0]];

employees=XLSX.utils.sheet_to_json(sheet);

renderTable();
updateDashboard();

};

reader.readAsArrayBuffer(file);

});

/* TABLE */

function renderTable(){

let tbody=document.querySelector("#employeeTable tbody");

tbody.innerHTML="";

employees.forEach((e,i)=>{

let row="<tr>";

row+="<td>"+e["Emp Code"]+"</td>";
row+="<td>"+e["Name"]+"</td>";
row+="<td>"+e["Designation"]+"</td>";
row+="<td>"+e["Month"]+"</td>";
row+="<td>"+e["Gross"]+"</td>";
row+="<td>"+e["Net In Hand"]+"</td>";

row+='<td><button onclick="viewPayslip('+i+')">View</button></td>';

row+="</tr>";

tbody.innerHTML+=row;

});

}

/* DASHBOARD */

function updateDashboard(){

document.getElementById("totalEmployees").innerText=employees.length;

let gross=0;
let net=0;

employees.forEach(e=>{
gross+=Number(e["Gross"]);
net+=Number(e["Net In Hand"]);
});

document.getElementById("totalGross").innerText=gross;
document.getElementById("totalNet").innerText=net;

}

/* PAYSLIP */

function viewPayslip(i){

let e=employees[i];

document.getElementById("app").style.display="none";
document.getElementById("payslipPage").style.display="block";

document.getElementById("payslipContent").innerHTML=

"<h2 style='text-align:center'>Rudransh Enterprises</h2>"+
"<h3 style='text-align:center'>Salary Payslip</h3>"+

"<p><b>Name:</b> "+e["Name"]+"</p>"+
"<p><b>Designation:</b> "+e["Designation"]+"</p>"+
"<p><b>Month:</b> "+e["Month"]+"</p>"+

"<hr>"+

"<p><b>Gross:</b> "+e["Gross"]+"</p>"+
"<p><b>PF:</b> "+e["PF@12%"]+"</p>"+
"<p><b>ESI:</b> "+e["ESI@.75%"]+"</p>"+
"<p><b>LWF:</b> "+e["LWF"]+"</p>"+

"<h3>Net In Hand: "+e["Net In Hand"]+"</h3>";

}

function back(){

document.getElementById("payslipPage").style.display="none";
document.getElementById("app").style.display="block";

}

</script>

</body>
</html>

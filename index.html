<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#0b1c2d;
color:white;
}

header{
background:#001f3f;
color:#d4af37;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.panel{
background:white;
color:black;
padding:20px;
margin:20px auto;
width:90%;
max-width:900px;
border-radius:10px;
}

button{
background:#d4af37;
border:none;
padding:8px 15px;
cursor:pointer;
margin:5px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

th{
background:#001f3f;
color:#fff;
}

.hidden{display:none}

</style>
</head>

<body>

<header>Rudransh Payroll System</header>

<div id="loginPanel" class="panel">

<h3>Login</h3>

<select id="role" onchange="roleChange()">
<option value="admin">Admin</option>
<option value="emp">Employee</option>
</select><br><br>

<input id="userid" placeholder="Employee Code"><br><br>

<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

</div>

<div id="adminPanel" class="panel hidden">

<h3>Admin Dashboard</h3>

<input type="file" id="excelFile">

<select id="monthSelect"></select>

<br>

<button onclick="generateAll()">Bulk Payslips</button>
<button onclick="exportPF()">PF ECR</button>
<button onclick="exportESI()">ESI Return</button>

<table>

<thead>

<tr>
<th>Select</th>
<th>Emp Code</th>
<th>Name</th>
<th>Month</th>
<th>Net</th>
</tr>

</thead>

<tbody id="empTable"></tbody>

</table>

</div>

<div id="empPanel" class="panel hidden">

<h3>Employee Portal</h3>

<input id="empSearch" placeholder="Enter Emp Code">

<button onclick="viewPayslip()">View Payslip</button>

<div id="payslip"></div>

</div>

<script>

let employees=[]

function roleChange(){

let r=document.getElementById("role").value
let u=document.getElementById("userid")

if(r==="admin"){
u.value="Admin"
u.disabled=true
}else{
u.value=""
u.disabled=false
}

}

function login(){

let role=document.getElementById("role").value
let user=document.getElementById("userid").value
let pass=document.getElementById("password").value

if(role==="admin"){

if(pass==="Rud@03"){

document.getElementById("loginPanel").classList.add("hidden")
document.getElementById("adminPanel").classList.remove("hidden")

}else{

alert("Wrong Password")

}

}else{

document.getElementById("loginPanel").classList.add("hidden")
document.getElementById("empPanel").classList.remove("hidden")

}

}

document.getElementById("excelFile").addEventListener("change",function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(evt){

let data=new Uint8Array(evt.target.result)

let wb=XLSX.read(data,{type:'array'})

employees=[]

wb.SheetNames.forEach(name=>{

let sheet=wb.Sheets[name]

let rows=XLSX.utils.sheet_to_json(sheet,{header:1})

let parts=name.split("-")

let project=parts[0]
let location=parts.slice(1).join("-")

for(let i=2;i<rows.length;i++){

let r=rows[i]

if(!r[1]) continue

let month=formatMonth(r[6])

employees.push({

code:r[1],
name:r[2],
designation:r[3],
uan:r[4],
esi:r[5],
month:month,
project:project,
location:location,

basic:r[9],
hra:r[10],
allow:r[11],
leave:r[12],
bonus:r[13],
gross:r[14],

pf:r[15],
esi_d:r[16],
lwf:r[17],
advance:r[19]||"",
net:r[20]

})

}

})

renderTable()

}

reader.readAsArrayBuffer(file)

})

function formatMonth(v){

if(typeof v==="number"){

let d=XLSX.SSF.parse_date_code(v)

let date=new Date(d.y,d.m-1,d.d)

date.setMonth(date.getMonth()+1)

let m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

return m[date.getMonth()]+"-"+String(date.getFullYear()).slice(-2)

}

return v

}

function formatINR(x){

if(!x || x==0) return ""

return "₹"+Number(x).toLocaleString("en-IN",{maximumFractionDigits:0})

}

function renderTable(){

let tb=document.getElementById("empTable")

tb.innerHTML=""

employees.forEach(e=>{

let tr=document.createElement("tr")

tr.innerHTML=`

<td><input type="checkbox"></td>
<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.month}</td>
<td>${formatINR(e.net)}</td>

`

tb.appendChild(tr)

})

}

function viewPayslip(){

let code=document.getElementById("empSearch").value

let e=employees.find(x=>x.code===code)

if(!e){

alert("Employee not found")

return

}

let html=`

<h2>Rudransh Enterprises</h2>

<b>Employee Payslip</b><br><br>

Month : ${e.month}<br>
Project : ${e.project}<br>
Location : ${e.location}<br>
UAN : ${e.uan||""}<br>
ESI : ${e.esi||""}<br>

<br>

<table>

<tr>

<th>Earnings</th>
<th>Amount</th>
<th>Deductions</th>
<th>Amount</th>

</tr>

<tr>

<td>Basic</td>
<td>${formatINR(e.basic)}</td>

<td>PF</td>
<td>${formatINR(e.pf)}</td>

</tr>

<tr>

<td>HRA</td>
<td>${formatINR(e.hra)}</td>

<td>ESI</td>
<td>${formatINR(e.esi_d)}</td>

</tr>

<tr>

<td>Allowance</td>
<td>${formatINR(e.allow)}</td>

<td>LWF</td>
<td>${formatINR(e.lwf)}</td>

</tr>

<tr>

<td>Bonus</td>
<td>${formatINR(e.bonus)}</td>

<td>Advance</td>
<td>${formatINR(e.advance)}</td>

</tr>

</table>

<br>

<b>Gross : ${formatINR(e.gross)}</b><br>
<b>Net In Hand : ${formatINR(e.net)}</b>

`

document.getElementById("payslip").innerHTML=html

}

function generateAll(){

const {jsPDF}=window.jspdf

employees.forEach(e=>{

let doc=new jsPDF()

doc.text("Rudransh Enterprises",20,20)

doc.text("Employee Payslip",20,30)

doc.text("Emp:"+e.code+"  "+e.name,20,40)

doc.text("Month:"+e.month,20,50)

doc.text("Net:"+formatINR(e.net),20,60)

doc.save(e.code+"_"+e.month+".pdf")

})

}

function exportPF(){

let txt=""

employees.forEach(e=>{

txt+=e.uan+","+e.pf+"\n"

})

let blob=new Blob([txt])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="PF_ECR.txt"

a.click()

}

function exportESI(){

let data=[["ESI","Name","Amount"]]

employees.forEach(e=>{

data.push([e.esi,e.name,e.esi_d])

})

let ws=XLSX.utils.aoa_to_sheet(data)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"ESI")

XLSX.writeFile(wb,"ESI_Return.xlsx")

}

</script>

</body>
</html>

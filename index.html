<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudransh Payroll System</title>

<script src="xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{font-family:Segoe UI;margin:0;background:#eef2f7;overflow:hidden;}

/* LOCKED A4 VIEWPORT WRAPPER */
#viewer{
position:fixed;
top:0;left:0;
width:100%;height:100%;
overflow:auto;
background:rgba(0,0,0,0.6);
display:none;
touch-action:none;
}

/* ZOOM CONTAINER */
#zoomWrap{
transform-origin:0 0;
}

/* LOGO */
.logoCircle{
width:90px;height:90px;border-radius:50%;
object-fit:cover;display:block;margin:0 auto 15px;
}

/* LOGIN */
#loginPage{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
}
#loginBox{
background:white;padding:30px;width:320px;border-radius:12px;
text-align:center;
}

/* DASHBOARD */
header{background:#4e73df;color:white;padding:18px;}
.container{padding:20px;}

table{width:100%;border-collapse:collapse;background:white;}
th{background:#4e73df;color:white;padding:10px;}
td{padding:10px;border-bottom:1px solid #eee;text-align:center;}

.view{background:#1cc88a;color:white;border:none;padding:6px 10px;}

/* 🔴 LOCKED PAYSLIP — DO NOT TOUCH */
.payslip{
background:white;
width:794px;
min-height:1123px;
margin:40px auto;
padding:25px;
box-sizing:border-box;
}

/* TABLE */
.psTable{width:100%;border-collapse:collapse;}
.psTable td,.psTable th{border:2px solid #000;padding:8px;}

.left{text-align:left;}
.right{text-align:right;}
.center{text-align:center;}

.net{font-size:20px;font-weight:bold;text-align:center;margin-top:10px;}

.footer{text-align:center;margin-top:15px;font-size:12px;}

</style>
</head>

<body>

<div id="loginPage">
<div id="loginBox">
<img src="logo.png" class="logoCircle">
<h3>Login</h3>
<select id="role">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select>
<input id="empCode" placeholder="Employee Code">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div>© 2026 Rudransh Enterprises</div>
<div id="msg" style="color:red"></div>
</div>
</div>

<div id="dashboard" style="display:none">
<header><h2>Payroll Dashboard</h2></header>
<div class="container">
<table>
<thead>
<tr>
<th>Emp Code</th><th>Name</th><th>Month</th><th>Payslip</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<!-- VIEWER -->
<div id="viewer">
<div id="zoomWrap">
<div class="payslip" id="payslipArea">
<div id="psBody"></div>

<div class="footer">
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="closePS()">Close</button>
</div>

</div>
</div>
</div>

<script>
let scale=1, startY=0, currentY=0;

/* PINCH ZOOM */
let initialDistance=null;

viewer.addEventListener("touchmove",function(e){
if(e.touches.length===2){
let dx=e.touches[0].clientX-e.touches[1].clientX;
let dy=e.touches[0].clientY-e.touches[1].clientY;
let dist=Math.sqrt(dx*dx+dy*dy);

if(!initialDistance) initialDistance=dist;

scale*=dist/initialDistance;
scale=Math.min(Math.max(scale,0.5),3);

zoomWrap.style.transform=`scale(${scale})`;
initialDistance=dist;
}
},{passive:false});

viewer.addEventListener("touchend",()=>initialDistance=null);

/* SWIPE DOWN CLOSE */
viewer.addEventListener("touchstart",(e)=>{
startY=e.touches[0].clientY;
});

viewer.addEventListener("touchmove",(e)=>{
currentY=e.touches[0].clientY;
if(currentY-startY>120){
closePS();
}
});

/* LOAD DEMO */
function login(){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

tbody.innerHTML=`
<tr>
<td>101</td>
<td>Demo User</td>
<td>Jan-26</td>
<td><button class="view" onclick="showPS()">View</button></td>
</tr>`;
}

/* ORIGINAL LOCKED PAYSLIP */
function showPS(){
viewer.style.display="block";

psBody.innerHTML=`
<table class="psTable">
<tr>
<td class="center" style="width:150px">
<img src="logo.png" height="70">
</td>
<td class="center">
<b style="font-size:20px">Rudransh Enterprises</b><br>
Office Address: Shop No- 4,5,6,7, Idgha Road, Bholanath Nagar Market, Delhi-110032
</td>
</tr>
<tr>
<td colspan="2" class="center">
<b>Salary Slip for Jan-26</b>
</td>
</tr>
</table>

<br>

<table class="psTable">
<tr>
<td class="left">Employee Name</td>
<td class="left">Demo User</td>
<td class="left">Employee Code</td>
<td class="left">101</td>
</tr>
</table>

<div class="net">NET PAY ₹15,000</div>
`;
}

function downloadPDF(){
html2pdf().set({
margin:0,
filename:'Payslip.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'px',format:[794,1123]}
}).from(payslipArea).save();
}

function closePS(){
viewer.style.display="none";
scale=1;
zoomWrap.style.transform="scale(1)";
}
</script>

</body>
</html>

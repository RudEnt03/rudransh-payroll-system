<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Enterprises Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}

header{
background:linear-gradient(90deg,#4e73df,#36b9cc);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.cards{
display:flex;
gap:15px;
margin-bottom:20px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

th{
background:#4e73df;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

button{
padding:6px 12px;
border:none;
border-radius:4px;
background:#1cc88a;
color:white;
cursor:pointer;
}

.view{
background:#36b9cc;
}

.loginBox{
width:320px;
margin:120px auto;
background:white;
padding:25px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.payslip{
background:white;
width:700px;
margin:40px auto;
padding:25px;
border-radius:8px;
}

.row{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.section{
font-weight:bold;
border-bottom:2px solid #ddd;
margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="loginBox">

<h3>Employee Login</h3>

<input id="empCode" placeholder="Employee Code"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<br><br>

<button onclick="adminLogin()">Admin Login</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="app" style="display:none">

<header>

<h2>Rudransh Enterprises Payroll Dashboard</h2>

<button onclick="logout()">Logout</button>

</header>

<div class="container">

<input type="file" id="file">
<input id="search" placeholder="Search employee">

<div class="cards">

<div class="card">
<h3>Total Employees</h3>
<p id="cEmp">0</p>
</div>

<div class="card">
<h3>Total Gross</h3>
<p id="cGross">0</p>
</div>

<div class="card">
<h3>Total Net</h3>
<p id="cNet">0</p>
</div>

</div>

<table>

<thead>

<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Project</th>
<th>Location</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
<th>Payslip</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel" style="display:none;padding:20px">

<h3>Admin Control Panel</h3>

<input id="resetEmp" placeholder="Employee Code">

<button onclick="resetEmployee()">Reset Employee Device</button>

<button onclick="closeAdmin()">Close</button>

</div>

<!-- PAYSLIP -->

<div id="modal">

<div class="payslip">

<h3 style="text-align:center">Rudransh Enterprises</h3>
<h4 style="text-align:center">Salary Payslip</h4>

<div id="psBody"></div>

<div style="text-align:center;margin-top:15px">
<button onclick="window.print()">Print / PDF</button>
<button onclick="closePS()">Close</button>
</div>

</div>

</div>

<script>

let employees=[];

function isMobile(){
return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function formatINR(num){
num=Math.round(Number(num)||0);
return "₹ "+num.toLocaleString('en-IN');
}

function formatMonth(v){
if(typeof v==="number"){
let d=XLSX.SSF.parse_date_code(v);
return new Date(d.y,d.m-1).toLocaleString('default',{month:'long',year:'numeric'});
}
return v;
}

/* EXCEL IMPORT */

document.getElementById("file").addEventListener("change",e=>{

const reader=new FileReader();

reader.onload=function(evt){

const data=new Uint8Array(evt.target.result);
const wb=XLSX.read(data,{type:'array'});

employees=[];

wb.SheetNames.forEach(name=>{

const sheet=wb.Sheets[name];
const rows=XLSX.utils.sheet_to_json(sheet);

let parts=name.split("_");

let project=parts[0]||"";
let location=parts[1]||"";

rows.forEach(r=>{

employees.push({

code:r["Emp Code"],
name:r["Name"],
designation:r["Designation"],
month:formatMonth(r["Month"]),
basic:r["Basic"],
hra:r["HRA"],
allow:r["Allowance"],
bonus:r["Bonus"],
gross:r["Gross"],
pf:r["PF@12%"],
esi:r["ESI@.75%"],
lwf:r["LWF"],
advance:r["Advance Paid"],
net:r["Net In Hand"],
project:project,
location:location

});

});

});

render(employees);

};

reader.readAsArrayBuffer(e.target.files[0]);

});

/* DASHBOARD */

function render(data){

let tb=document.getElementById("tbody");

tb.innerHTML="";

let gross=0;
let net=0;

data.forEach(e=>{

gross+=Number(e.gross);
net+=Number(e.net);

tb.innerHTML+=`
<tr>
<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.project}</td>
<td>${e.location}</td>
<td>${e.month}</td>
<td>${formatINR(e.gross)}</td>
<td>${formatINR(e.net)}</td>
<td><button class="view" onclick='showPS(${JSON.stringify(e)})'>View</button></td>
</tr>
`;

});

document.getElementById("cEmp").innerText=data.length;
document.getElementById("cGross").innerText=formatINR(gross);
document.getElementById("cNet").innerText=formatINR(net);

}

/* SEARCH */

document.getElementById("search").addEventListener("keyup",function(){

let v=this.value.toLowerCase();

let f=employees.filter(e=>e.code.toLowerCase().includes(v)||e.name.toLowerCase().includes(v));

render(f);

});

/* PAYSLIP */

function showPS(e){

document.getElementById("modal").style.display="block";

document.getElementById("psBody").innerHTML=`

<div class="row"><b>Emp Code</b><span>${e.code}</span></div>
<div class="row"><b>Name</b><span>${e.name}</span></div>
<div class="row"><b>Designation</b><span>${e.designation}</span></div>
<div class="row"><b>Project</b><span>${e.project}</span></div>
<div class="row"><b>Location</b><span>${e.location}</span></div>
<div class="row"><b>Month</b><span>${e.month}</span></div>

<div class="section">Earnings</div>

<div class="row"><span>Basic</span><span>${formatINR(e.basic)}</span></div>
<div class="row"><span>HRA</span><span>${formatINR(e.hra)}</span></div>
<div class="row"><span>Allowance</span><span>${formatINR(e.allow)}</span></div>
<div class="row"><span>Bonus</span><span>${formatINR(e.bonus)}</span></div>
<div class="row"><b>Gross</b><b>${formatINR(e.gross)}</b></div>

<div class="section">Deductions</div>

<div class="row"><span>PF</span><span>${formatINR(e.pf)}</span></div>
<div class="row"><span>ESI</span><span>${formatINR(e.esi)}</span></div>
<div class="row"><span>LWF</span><span>${formatINR(e.lwf)}</span></div>
<div class="row"><span>Advance</span><span>${formatINR(e.advance)}</span></div>

<div class="section"></div>

<div class="row"><b>Net Pay</b><b>${formatINR(e.net)}</b></div>

`;

}

function closePS(){
document.getElementById("modal").style.display="none";
}

/* LOGIN */

function login(){

if(!isMobile()){
alert("Employee login allowed only from mobile device.");
return;
}

let code=document.getElementById("empCode").value;
let pass=document.getElementById("password").value;

let device=navigator.userAgent;

let stored=localStorage.getItem("device_"+code);

if(stored && stored!==device){
alert("Device mismatch. Contact Admin.");
return;
}

if(pass==="1234"){

localStorage.setItem("device_"+code,device);

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";

}else{
alert("Invalid password");
}

}

/* ADMIN */

function adminLogin(){

let pass=prompt("Enter Admin Password");

if(pass==="Rud@03"){
document.getElementById("adminPanel").style.display="block";
}else{
alert("Wrong password");
}

}

/* RESET */

function resetEmployee(){

let code=document.getElementById("resetEmp").value;

localStorage.removeItem("device_"+code);

alert("Device reset completed");

}

function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}

function logout(){
location.reload();
}

</script>

</body>
</html>

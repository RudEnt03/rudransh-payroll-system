<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0b1f3a,#000000);
color:white;
margin:0;
padding:0;
}

.container{
padding:30px;
}

.loginbox{
background:white;
color:black;
padding:25px;
width:300px;
margin:auto;
margin-top:120px;
border-radius:10px;
text-align:center;
}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:8px;
border:1px solid #ccc;
text-align:left;
}

th{
background:#0b1f3a;
color:white;
}

.payslip{
width:800px;
margin:auto;
background:white;
color:black;
padding:20px;
border:2px solid #0b1f3a;
}

.header{
text-align:center;
border-bottom:2px solid #d4af37;
margin-bottom:10px;
}

.gold{
color:#d4af37;
}

.flex{
display:flex;
justify-content:space-between;
}

.print{
margin-top:20px;
}

</style>
</head>

<body>

<div id="loginPage" class="loginbox">

<h2>Rudransh Payroll</h2>

<select id="role">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select>

<br><br>

<input id="empCode" placeholder="Employee Code">

<br><br>

<input id="password" placeholder="Password" type="password">

<br><br>

<button onclick="login()">Login</button>

</div>



<div id="adminPanel" class="container" style="display:none">

<h2 class="gold">Payroll Admin Tools</h2>

Upload Company Logo
<input type="file" id="logoUpload">

<br><br>

Upload Payroll Excel
<input type="file" id="excelFile">

<br><br>

Select Month
<select id="monthSelect"></select>

<br><br>

<button onclick="showDashboard()">Dashboard</button>

<button onclick="bulkPayslip()">Bulk Payslips</button>

<button onclick="pfExport()">PF ECR</button>

<button onclick="esiExport()">ESI Return</button>

<button onclick="removeMonth()">Remove Month Data</button>

<hr>

<div id="dashboard"></div>

</div>




<div id="empPanel" class="container" style="display:none">

<h2>Employee Portal</h2>

<button onclick="generatePayslip()">Download Payslip</button>

<div id="empPayslip"></div>

</div>



<script>

/* =====================================================
   CORE PAYROLL ENGINE  (RPS_FF_HTML_v1 CORE)
   DO NOT MODIFY THIS BLOCK
===================================================== */

function rupee(n){

return "₹"+Number(n).toLocaleString("en-IN",{maximumFractionDigits:0})

}

function clean(v){

if(v==0 || v=="" || v==null) return ""

return v

}

/* =====================================================
   END CORE
===================================================== */


let payrollData={}
let currentUser=""
let adminPass="admin123"



function login(){

let role=document.getElementById("role").value
let emp=document.getElementById("empCode").value
let pass=document.getElementById("password").value

if(role=="admin"){

if(pass==adminPass){

document.getElementById("loginPage").style.display="none"
document.getElementById("adminPanel").style.display="block"

}

else{

alert("Wrong password")

}

}

else{

let device=localStorage.getItem("device")

if(!device){

localStorage.setItem("device",emp)

}

if(localStorage.getItem("device")!=emp){

alert("Device already bound to another employee")

return

}

currentUser=emp

document.getElementById("loginPage").style.display="none"
document.getElementById("empPanel").style.display="block"

}

}



document.getElementById("excelFile").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let wb=XLSX.read(data,{type:"array"})

let ws=wb.Sheets[wb.SheetNames[0]]

let json=XLSX.utils.sheet_to_json(ws)

json.forEach(r=>{

let m=r.Month

if(!payrollData[m]) payrollData[m]=[]

payrollData[m].push(r)

})

updateMonths()

}

reader.readAsArrayBuffer(e.target.files[0])

})



function updateMonths(){

let sel=document.getElementById("monthSelect")

sel.innerHTML=""

Object.keys(payrollData).forEach(m=>{

let o=document.createElement("option")

o.text=m

o.value=m

sel.appendChild(o)

})

}



function showDashboard(){

let m=document.getElementById("monthSelect").value

let data=payrollData[m]

let html="<table>"

html+="<tr><th>Emp Code</th><th>Name</th><th>Net Salary</th><th>Payslip</th></tr>"

data.forEach(r=>{

html+="<tr>"

html+="<td>"+r["Emp Code"]+"</td>"

html+="<td>"+r["Name"]+"</td>"

html+="<td>"+rupee(r["Net In Hand"])+"</td>"

html+="<td><button onclick='singlePayslip(\""+r["Emp Code"]+"\",\""+m+"\")'>View</button></td>"

html+="</tr>"

})

html+="</table>"

document.getElementById("dashboard").innerHTML=html

}



function singlePayslip(code,month){

let emp=payrollData[month].find(e=>e["Emp Code"]==code)

renderPayslip(emp,month,"dashboard")

}



function generatePayslip(){

let m=Object.keys(payrollData)[0]

let emp=payrollData[m].find(e=>e["Emp Code"]==currentUser)

renderPayslip(emp,m,"empPayslip")

}



function renderPayslip(e,month,target){

let html=""

html+="<div class='payslip'>"

html+="<div class='header'>"

html+="<h2>RUDRANSH PAYROLL SYSTEM</h2>"

html+="Employee Payslip<br>"

html+="Month : "+month

html+="</div>"

html+="Emp Code : "+e["Emp Code"]+"<br>"
html+="Name : "+e["Name"]+"<br>"
html+="Designation : "+e["Designation"]+"<br><br>"

html+="<div class='flex'>"

html+="<table style='width:48%'>"

html+="<tr><th colspan=2>Earnings</th></tr>"

html+="<tr><td>Basic</td><td>"+clean(rupee(e.Basic))+"</td></tr>"
html+="<tr><td>HRA</td><td>"+clean(rupee(e.HRA))+"</td></tr>"
html+="<tr><td>Allowance</td><td>"+clean(rupee(e.Allowance))+"</td></tr>"
html+="<tr><td>Bonus</td><td>"+clean(rupee(e.Bonus))+"</td></tr>"

html+="</table>"

html+="<table style='width:48%'>"

html+="<tr><th colspan=2>Deductions</th></tr>"

html+="<tr><td>PF</td><td>"+clean(rupee(e["PF@12%"]))+"</td></tr>"
html+="<tr><td>ESI</td><td>"+clean(rupee(e["ESI@.75%"]))+"</td></tr>"
html+="<tr><td>LWF</td><td>"+clean(rupee(e.LWF))+"</td></tr>"
html+="<tr><td>Advance</td><td>"+clean(rupee(e["Advance Paid"]))+"</td></tr>"

html+="</table>"

html+="</div>"

html+="<h3 style='text-align:right'>Net Pay : "+rupee(e["Net In Hand"])+"</h3>"

html+="<button class='print' onclick='window.print()'>Print</button>"

html+="</div>"

document.getElementById(target).innerHTML=html

}



function bulkPayslip(){

alert("Bulk Payslip Generator triggered")

}



function pfExport(){

alert("PF ECR file generated")

}



function esiExport(){

alert("ESI return file generated")

}



function removeMonth(){

let m=document.getElementById("monthSelect").value

delete payrollData[m]

updateMonths()

alert("Month removed")

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RUDRANSH PAYROLL SYSTEM v6 - Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Excel Reader -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- PDF Export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial,sans-serif; margin:0; padding:0; background:#f3f3f3; }
header { background:#003366; color:#fff; padding:15px; text-align:center; font-size:22px; }
section { padding:20px; }
input, button { padding:8px; font-size:14px; margin:5px 0;}
button { cursor:pointer; }
#loginBox, #importBox, #dashboard, #payslipView { display:none; }
table { border-collapse:collapse; width:100%; margin-top:10px;}
th, td { border:1px solid #000; padding:6px; text-align:center; }
.footerNote { font-size:11px; color:#555; text-align:center; margin-top:10px; }
</style>
</head>
<body>

<header>RUDRANSH PAYROLL SYSTEM v6 - Ultimate</header>

<!-- LOGIN -->
<section id="loginBox">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Emp Code / Admin"><br>
    <input type="password" id="password" placeholder="Emp Code / Admin Pass"><br>
    <button onclick="doLogin()">Login</button>
</section>

<!-- IMPORT EXCEL (Admin only) -->
<section id="importBox">
    <h2>Import Excel Payroll Sheet</h2>
    <input type="file" id="excelFile" accept=".xlsx, .xls"><br>
    <button onclick="loadExcel()">Load Sheet</button>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
    <h2>Employee Dashboard</h2>
    <table id="empTable">
        <thead>
            <tr><th>Emp Code</th><th>Name</th><th>Project</th><th>Action</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</section>

<!-- PAYSLIP VIEW -->
<section id="payslipView">
    <button onclick="backToDash()">← Back to Dashboard</button>
    <div id="payslipPreview"></div>
    <button onclick="downloadPayslipPDF()">Download PDF</button>
</section>

<script>
// GLOBALS
let payrollData=[];
let currentUser=null;
let isAdmin=false;
let sheetName="";

// LOGIN
function doLogin(){
    const u=document.getElementById("username").value.trim();
    const p=document.getElementById("password").value.trim();

    // Admin login
    if(u==="admin" && p==="Rud@03"){ 
        isAdmin=true; 
        document.getElementById("loginBox").style.display="none"; 
        document.getElementById("importBox").style.display="block"; 
        return;
    }

    // Employee login (Emp Code = password)
    const emp=payrollData.find(e=>e["Emp Code"]===u && u===p);
    if(emp){ 
        currentUser=emp; 
        isAdmin=false; 
        document.getElementById("loginBox").style.display="none"; 
        viewPayslip(emp); 
        return;
    }
    alert("Invalid login!");
}

// LOAD EXCEL
function loadExcel(){
    const file=document.getElementById("excelFile");
    if(!file.files.length){ alert("Select Excel"); return;}
    const reader=new FileReader();
    reader.onload=function(e){
        const data=e.target.result;
        const wb=XLSX.read(data,{type:"binary"});
        sheetName=wb.SheetNames[0];
        const sheet=wb.Sheets[sheetName];
        payrollData=XLSX.utils.sheet_to_json(sheet,{defval:""});
        alert("Excel loaded: "+payrollData.length+" records, Sheet: "+sheetName);
        showDashboard();
    };
    reader.readAsBinaryString(file.files[0]);
}

// DASHBOARD
function showDashboard(){
    document.getElementById("importBox").style.display="none";
    document.getElementById("dashboard").style.display="block";
    const tbody=document.getElementById("empTable").querySelector("tbody");
    tbody.innerHTML="";
    payrollData.forEach(emp=>{
        const row=document.createElement("tr");
        row.innerHTML=`<td>${emp["Emp Code"]}</td><td>${emp["Name"]}</td><td>${sheetName}</td><td><button onclick='viewPayslipFromCode("${emp["Emp Code"]}")'>View</button></td>`;
        tbody.appendChild(row);
    });
}

// VIEW PAYSLIP BY CODE
function viewPayslipFromCode(empCode){
    const emp=payrollData.find(e=>e["Emp Code"]===empCode);
    viewPayslip(emp);
}

// PAYSLIP (Enterprise Layout)
function viewPayslip(emp){
    document.getElementById("dashboard").style.display="none";
    document.getElementById("payslipView").style.display="block";
    const container=document.getElementById("payslipPreview");

    // defaults
    const location = emp["Location"] || "-";
    const advancePaid = emp["Advance Paid"] || 0;

    container.innerHTML=`
<div style="padding:15px; border:2px solid #000; width:210mm; margin:auto; font-family: Arial, sans-serif;">
    <h2 style="text-align:center; margin-bottom:10px;">Rudransh Pvt. Ltd.</h2>
    <h3 style="text-align:center; margin-bottom:20px;">Payslip for: ${emp["Name"]}</h3>

    <table style="width:100%; margin-bottom:15px;">
        <tr><td><b>Emp Code:</b> ${emp["Emp Code"]}</td><td><b>Designation:</b> ${emp["Designation"]}</td></tr>
        <tr><td><b>UAN No:</b> ${emp["UAN No"]}</td><td><b>ESI No:</b> ${emp["ESI No"]}</td></tr>
        <tr><td><b>M Days:</b> ${emp["M Days"]}</td><td><b>P Days:</b> ${emp["P Days"]}</td></tr>
        <tr><td><b>Project:</b> ${sheetName}</td><td><b>Location:</b> ${location}</td></tr>
    </table>

    <table style="width:100%; border-collapse: collapse; margin-bottom:15px;">
        <tr style="background:#ddd; font-weight:bold;"><th>EARNINGS</th><th>AMOUNT</th></tr>
        <tr><td>Basic</td><td>${emp["Basic"]}</td></tr>
        <tr><td>HRA</td><td>${emp["HRA"]}</td></tr>
        <tr><td>Allowance</td><td>${emp["Allowance"]}</td></tr>
        <tr><td>Leave</td><td>${emp["Leave"]}</td></tr>
        <tr><td>Bonus</td><td>${emp["Bonus"]}</td></tr>
        <tr style="font-weight:bold;"><td>Gross</td><td>${emp["Gross"]}</td></tr>
    </table>

    <table style="width:100%; border-collapse: collapse; margin-bottom:15px;">
        <tr style="background:#ddd; font-weight:bold;"><th>DEDUCTIONS</th><th>AMOUNT</th></tr>
        <tr><td>PF @12%</td><td>${emp["PF@12%"]}</td></tr>
        <tr><td>ESI @0.75%</td><td>${emp["ESI@.75%"]}</td></tr>
        <tr><td>LWF</td><td>${emp["LWF"]}</td></tr>
        <tr><td>Advance Paid</td><td>${advancePaid}</td></tr>
    </table>

    <h3 style="text-align:center; margin-top:20px;">Net Pay: ${emp["Net In Hand"]}</h3>
    <p style="text-align:center; font-size:11px; margin-top:15px;">Generated by RUDRANSH PAYROLL SYSTEM v6 - ULTIMATE Edition | 2026</p>
</div>
`;
}

// BACK
function backToDash(){
    document.getElementById("payslipView").style.display="none";
    if(isAdmin) document.getElementById("dashboard").style.display="block";
}

// PDF
function downloadPayslipPDF(){
    html2pdf().set({
        margin:[0.2,0.2,0.2,0.2],
        filename:'Payslip.pdf',
        image:{type:'jpeg',quality:1},
        html2canvas:{scale:2,scrollY:0},
        jsPDF:{unit:'in',format:'a4',orientation:'portrait'},
        pagebreak:{mode:['css','legacy']}
    }).from(document.getElementById("payslipPreview")).save();
}

// INIT
document.getElementById("loginBox").style.display="block";
</script>

</body>
</html>

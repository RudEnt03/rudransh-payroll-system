<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Segoe UI;background:#eef2f7;margin:0;text-align:center}
header{background:#4e73df;color:white;padding:15px}
input{padding:8px;margin:5px}
button{padding:8px 14px;background:#4e73df;color:white;border:none}
#payslip{margin-top:30px}
</style>
</head>

<body>

<header>Rudransh Enterprises Payroll</header>

<h2>Employee Login</h2>

<input id="empCode" placeholder="Employee Code"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<div id="msg" style="color:red"></div>

<div id="payslip" style="display:none"></div>

<script>

let payrollData=[]

/* LOAD PAYROLL DATABASE FROM GITHUB */

fetch("payroll.json?v=1")
.then(r=>r.json())
.then(data=>{

payrollData=data

})

function normalize(v){

return String(v).replace(/\s+/g,"").toUpperCase()

}

function rupee(v){

return "₹"+Number(v).toLocaleString("en-IN")

}

function login(){

let code=normalize(document.getElementById("empCode").value)
let pwd=normalize(document.getElementById("password").value)

if(code!==pwd){

document.getElementById("msg").innerText="Password must equal Emp Code"
return

}

let emp=payrollData.find(e=>normalize(e.code)===code)

if(!emp){

document.getElementById("msg").innerText="No payslip found"
return

}

document.getElementById("payslip").style.display="block"

document.getElementById("payslip").innerHTML=

`
<h3>Payslip</h3>

Employee Code : ${emp.code}<br>
Name : ${emp.name}<br>
Designation : ${emp.designation}<br>
Month : ${emp.month}<br>
Gross Salary : ${rupee(emp.gross)}<br>
Net Salary : ${rupee(emp.net)}

`

}

</script>

</body>
</html>

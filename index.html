<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js?v=5"></script>

<style>
body{font-family:Segoe UI;margin:0;background:#eef2f7}
header{background:#4e73df;color:white;padding:15px;text-align:center}
.container{padding:20px}
input,select{padding:8px;margin:6px;width:220px;max-width:90%}
button{padding:8px 14px;background:#4e73df;color:white;border:none;border-radius:4px}
table{width:100%;border-collapse:collapse;background:white;margin-top:20px}
th{background:#4e73df;color:white;padding:10px}
td{padding:10px;border-bottom:1px solid #eee;text-align:center}
#loginPage{text-align:center;margin-top:120px}
#empPanel{text-align:center;margin-top:120px}
#payslip{text-align:center;margin-top:40px}
</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<h2>Payroll Login</h2>

<select id="role">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select>

<br>

<input id="empCode" placeholder="Employee Code">

<br>

<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<div id="msg" style="color:red;margin-top:10px"></div>

</div>

<!-- ADMIN DASHBOARD -->

<div id="adminDash" style="display:none">

<header>Rudransh Payroll Dashboard</header>

<div class="container">

<input type="file" id="file">

<table>

<thead>
<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<!-- EMPLOYEE PANEL -->

<div id="empPanel" style="display:none">

<h2>Employee Payslip</h2>

<select id="empMonth"></select>

<br><br>

<button onclick="viewPayslip()">View Payslip</button>

</div>

<!-- PAYSLIP -->

<div id="payslip" style="display:none">

<h2>Payslip</h2>

<div id="psBody"></div>

</div>

<script>

/* ---------- VERSION RESET (Fix mobile cache issue) ---------- */

const SYSTEM_VERSION="2";

if(localStorage.getItem("system_version")!==SYSTEM_VERSION){

localStorage.clear();
localStorage.setItem("system_version",SYSTEM_VERSION);

}

/* ------------------------------------------------------------ */

let employees = JSON.parse(localStorage.getItem("payroll_data") || "[]")

let currentEmp=""

function rupee(v){
return "₹"+Number(v).toLocaleString("en-IN")
}

function normalize(v){
return String(v).replace(/\s+/g,"").trim().toUpperCase()
}

/* ---------------- LOGIN ---------------- */

function login(){

const role=document.getElementById("role").value
const code=normalize(document.getElementById("empCode").value)
const pwd=normalize(document.getElementById("password").value)

if(role==="admin"){

if(pwd!=="RUD@03"){

document.getElementById("msg").innerText="Invalid admin password"
return

}

document.getElementById("loginPage").style.display="none"
document.getElementById("adminDash").style.display="block"

render(employees)

}

else{

if(code!==pwd){

document.getElementById("msg").innerText="Password must equal Emp Code"
return

}

let empRecords=employees.filter(e=>normalize(e.code)===code)

if(empRecords.length===0){

document.getElementById("msg").innerText="No payslip found for this emp."
return

}

currentEmp=code

document.getElementById("loginPage").style.display="none"
document.getElementById("empPanel").style.display="block"

loadMonths(empRecords)

}

}

/* ---------------- EMP MONTHS ---------------- */

function loadMonths(records){

let dd=document.getElementById("empMonth")

dd.innerHTML=""

let months=[...new Set(records.map(r=>r.month))]

months.forEach(m=>{

dd.innerHTML+=`<option value="${m}">${m}</option>`

})

}

/* ---------------- VIEW PAYSLIP ---------------- */

function viewPayslip(){

let month=document.getElementById("empMonth").value

let emp=employees.find(e=>normalize(e.code)===currentEmp && e.month===month)

if(!emp)return

document.getElementById("payslip").style.display="block"

document.getElementById("psBody").innerHTML=`

Emp Code : ${emp.code}<br>
Name : ${emp.name}<br>
Month : ${emp.month}<br>
Gross : ${rupee(emp.gross)}<br>
Net In Hand : ${rupee(emp.net)}

`

}

/* ---------------- EXCEL IMPORT ---------------- */

document.getElementById("file").addEventListener("change",e=>{

const reader=new FileReader()

reader.onload=function(evt){

const data=new Uint8Array(evt.target.result)

const wb=XLSX.read(data,{type:'array'})

employees=[]

wb.SheetNames.forEach(name=>{

const sheet=wb.Sheets[name]

const rows=XLSX.utils.sheet_to_json(sheet)

rows.forEach(r=>{

let rec={}

for(let k in r) rec[k.trim().toLowerCase()]=r[k]

let month=rec['month']

if(typeof month==="number"){

month=XLSX.SSF.format("mmm-yy",month)

}

employees.push({

code:(rec['emp code']||"").toString(),
name:rec['name']||"",
month:month,
gross:Number(rec['gross']||0),
net:Number(rec['net in hand']||0)

})

})

})

localStorage.setItem("payroll_data",JSON.stringify(employees))

render(employees)

}

reader.readAsArrayBuffer(e.target.files[0])

})

/* ---------------- ADMIN TABLE ---------------- */

function render(data){

let tb=document.getElementById("tbody")

tb.innerHTML=""

data.forEach(e=>{

tb.innerHTML+=`

<tr>
<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.month}</td>
<td>${rupee(e.gross)}</td>
<td>${rupee(e.net)}</td>
</tr>

`

})

}

</script>

</body>
</html>

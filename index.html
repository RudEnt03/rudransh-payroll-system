<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#0b1c2d;
color:white;
}

header{
background:#001f3f;
color:#ffd700;
padding:15px;
font-size:24px;
text-align:center;
font-weight:bold;
}

.panel{
background:white;
color:black;
padding:20px;
margin:20px;
border-radius:10px;
}

button{
background:#d4af37;
border:none;
padding:8px 14px;
margin:4px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:6px;
}

th{
background:#001f3f;
color:#ffd700;
}

</style>

</head>

<body>

<header>
RUDRANSH PAYROLL SYSTEM
</header>


<!-- ======================================================
CORE SYSTEM AREA
⚠️ DO NOT MODIFY
Paste RPS_FF_HTML_v1 inside this container
====================================================== -->

<div id="core_system">

<!-- PLACE ORIGINAL RPS_FF_HTML_v1 HERE -->

</div>



<!-- ======================================================
EXTENSION MODULE (NEW FEATURES)
====================================================== -->

<div class="panel">

<h3>Payroll Admin Tools</h3>

<label>Upload Company Logo</label>
<input type="file" onchange="uploadLogo(this)">

<br><br>

<label>Select Month</label>
<select id="monthSelect"></select>

<br><br>

<button onclick="generateBulk()">Bulk Payslips</button>

<button onclick="exportPF()">PF ECR</button>

<button onclick="exportESI()">ESI Return</button>

<button onclick="removeMonth()">Remove Month Data</button>

</div>



<script>

/* =========================
DATABASE
========================= */

let payrollDB = JSON.parse(localStorage.getItem("RPS_DB")||"{}")


function saveDB(){

localStorage.setItem("RPS_DB",JSON.stringify(payrollDB))

}



/* =========================
MONTH LIST
========================= */

function refreshMonthList(){

let sel=document.getElementById("monthSelect")

sel.innerHTML=""

Object.keys(payrollDB).forEach(m=>{

let op=document.createElement("option")

op.text=m

sel.add(op)

})

}

refreshMonthList()



/* =========================
LOGO SYSTEM
========================= */

function uploadLogo(input){

let reader=new FileReader()

reader.onload=e=>{

localStorage.setItem("RPS_LOGO",e.target.result)

alert("Logo Saved")

}

reader.readAsDataURL(input.files[0])

}

function getLogo(){

return localStorage.getItem("RPS_LOGO")||""

}



/* =========================
INDIAN RUPEE FORMAT
========================= */

function rupee(v){

if(!v||v==0)return ""

v=Math.round(v)

return "₹"+v.toLocaleString("en-IN")

}



/* =========================
REMOVE MONTH
========================= */

function removeMonth(){

let m=document.getElementById("monthSelect").value

delete payrollDB[m]

saveDB()

refreshMonthList()

alert("Month Removed")

}



/* =========================
BUILD CORPORATE PAYSLIP
========================= */

function buildPayslip(emp){

let logo=getLogo()

return `

<div style="width:800px;margin:auto;border:4px solid #001f3f;padding:30px;font-family:Arial">

<div style="text-align:center">

<img src="${logo}" style="height:60px"><br>

<h2 style="color:#001f3f">RUDRANSH PAYROLL SYSTEM</h2>

<h3 style="color:#d4af37">Employee Payslip</h3>

Month : ${emp.Month}

</div>


<br>

<table width="100%">

<tr>

<td>Emp Code</td>
<td>${emp["Emp Code"]}</td>

<td>Name</td>
<td>${emp.Name}</td>

</tr>

<tr>

<td>Designation</td>
<td>${emp.Designation}</td>

<td>UAN</td>
<td>${emp["UAN No"]}</td>

</tr>

<tr>

<td>ESI</td>
<td>${emp["ESI No"]}</td>

<td>Days</td>
<td>${emp["P Days"]}/${emp["M Days"]}</td>

</tr>

</table>


<br>


<table width="100%">

<tr style="background:#001f3f;color:white">

<th>Earnings</th>
<th>Amount</th>
<th>Deductions</th>
<th>Amount</th>

</tr>


<tr>

<td>Basic</td>
<td>${rupee(emp.Basic)}</td>

<td>PF</td>
<td>${rupee(emp["PF@12%"])}</td>

</tr>

<tr>

<td>HRA</td>
<td>${rupee(emp.HRA)}</td>

<td>ESI</td>
<td>${rupee(emp["ESI@.75%"])}</td>

</tr>

<tr>

<td>Allowance</td>
<td>${rupee(emp.Allowance)}</td>

<td>LWF</td>
<td>${rupee(emp.LWF)}</td>

</tr>

<tr>

<td>Bonus</td>
<td>${rupee(emp.Bonus)}</td>

<td>Advance</td>
<td>${rupee(emp.Advance)}</td>

</tr>

</table>


<br>

<div style="background:#001f3f;color:white;padding:12px;font-size:20px;text-align:center">

NET IN HAND : ${rupee(emp["Net In Hand"])}

</div>

</div>

`

}



/* =========================
BULK PAYSLIP
========================= */

function generateBulk(){

let m=document.getElementById("monthSelect").value

let list=payrollDB[m]||[]

if(list.length==0){

alert("No data")

return

}

list.forEach(emp=>{

let html=buildPayslip(emp)

let w=window.open()

w.document.write(html)

w.print()

})

}



/* =========================
PF ECR
========================= */

function exportPF(){

let m=document.getElementById("monthSelect").value

let list=payrollDB[m]||[]

let csv="UAN,Name,PF\n"

list.forEach(e=>{

csv+=`${e["UAN No"]},${e.Name},${e["PF@12%"]}\n`

})

download(csv,"PF_ECR.csv")

}



/* =========================
ESI RETURN
========================= */

function exportESI(){

let m=document.getElementById("monthSelect").value

let list=payrollDB[m]||[]

let csv="ESI,Name,Gross\n"

list.forEach(e=>{

csv+=`${e["ESI No"]},${e.Name},${e.Gross}\n`

})

download(csv,"ESI_Return.csv")

}



/* =========================
DOWNLOAD
========================= */

function download(text,name){

let blob=new Blob([text])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download=name

a.click()

}

</script>

</body>
</html>

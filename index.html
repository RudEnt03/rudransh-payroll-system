<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudransh Payroll System</title>
<script src="xlsx.full.min.js"></script>

<style>
body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}
header{
background:linear-gradient(90deg,#4e73df,#36b9cc);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}
.container{padding:20px;}
.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}
input,select{
padding:8px;
}
.cards{
display:flex;
gap:15px;
margin-bottom:20px;
}
.card{
flex:1;
background:white;
padding:20px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
table{
width:100%;
border-collapse:collapse;
background:white;
}
th{
background:#4e73df;
color:white;
padding:10px;
}
td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}
button{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
background:#36b9cc;
}
.view{background:#1cc88a;}

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
overflow:auto;
}

.payslip{
background:white;
width:900px;
margin:40px auto;
padding:25px;
position:relative;
}

.psTable{
width:100%;
border-collapse:collapse;
}
.psTable td,.psTable th{
border:2px solid #000;
padding:8px;
}

.left{text-align:left;}
.right{text-align:right;}
.center{text-align:center;}

.net{
font-size:20px;
font-weight:bold;
text-align:center;
margin-top:10px;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
}

/* LOGIN */
#loginPage{
position:fixed;
width:100%;
height:100%;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#loginBox{
background:white;
padding:30px;
width:300px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
text-align:center;
}

#loginBox input,#loginBox select{
width:100%;
margin-bottom:10px;
padding:8px;
}

.logo{
margin-bottom:10px;
}

#copyright{
margin-top:10px;
font-size:12px;
color:#555;
text-align:center;
}

/* MOBILE */
@media (max-width:480px){
#loginBox{
width:100%;
height:100%;
border-radius:0;
box-shadow:none;
}
}

/* A4 PRINT FIX */
@media print{
body *{visibility:hidden;}
#modal, #modal *{visibility:visible;}
#modal{
position:absolute;
top:0;
left:0;
width:100%;
}
.payslip{
width:210mm;
min-height:297mm;
margin:0;
padding:20mm;
box-sizing:border-box;
}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div id="loginBox">
    <img src="logo.png" height="70" class="logo">
    <h3>Login</h3>

    <select id="role" onchange="if(this.value==='admin'){document.getElementById('empCode').value='Admin';}else{document.getElementById('empCode').value='';}">
      <option value="emp">Employee</option>
      <option value="admin">Admin</option>
    </select>

    <input id="empCode" placeholder="Employee Code">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="copyright">
      © 2026 Rudransh Enterprises. All Rights Reserved.
    </div>

    <div id="msg" style="color:red"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<header>
<h2>Payroll Dashboard</h2>
</header>

<div class="container">

<div class="controls">
<select id="monthFilter">
<option value="all">All Months</option>
</select>

<select id="projectFilter">
<option value="all">All Projects</option>
</select>

<button onclick="applyFilter()">Filter</button>
</div>

<div class="cards">
<div class="card">Total Employees<p id="cEmp">0</p></div>
<div class="card">Total Gross<p id="cGross">0</p></div>
<div class="card">Total Net<p id="cNet">0</p></div>
</div>

<table>
<thead>
<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Project & Location</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
<th>Payslip</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>
</div>

<!-- PAYSLIP -->
<div id="modal">
<div class="payslip">

<div id="psBody"></div>

<div class="footer">
Note: This is a Computer Generated Slip and does not require signature
<br><br>
<button onclick="window.print()">Download PDF</button>
<button onclick="closePS()">Close</button>
</div>

</div>
</div>

<script>
const USER="RudEnt03";
const REPO="rudransh-payroll-system";
let employees=[];
let months=new Set();
let projects=new Set();

function rupee(v){return "₹"+Math.round(Number(v||0)).toLocaleString("en-IN");}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}

header{
background:linear-gradient(90deg,#4e73df,#36b9cc);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{padding:20px;}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

input,select{
padding:8px;
}

.cards{
display:flex;
gap:15px;
margin-bottom:20px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#4e73df;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

button{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
background:#36b9cc;
}

.view{background:#1cc88a;}

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
overflow:auto;
}

.payslip{
background:white;
width:900px;
margin:40px auto;
padding:25px;
position:relative;
}

.psHeader{
border:2px solid #000;
}

.psTable{
width:100%;
border-collapse:collapse;
}

.psTable td,.psTable th{
border:2px solid #000;
padding:8px;
}

.left{text-align:left;}
.right{text-align:right;}
.center{text-align:center;}

.net{
font-size:20px;
font-weight:bold;
text-align:center;
margin-top:10px;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
}

#loginPage{
position:fixed;
width:100%;
height:100%;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
}

#loginBox{
background:white;
padding:30px;
width:300px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

#loginBox input,#loginBox select{
width:100%;
margin-bottom:10px;
padding:8px;
}

/* ✅ MOBILE FIX (ADDED ONLY) */
@media screen and (max-width:600px){

#loginBox{
width:90% !important;
padding:20px !important;
}

#loginBox input,
#loginBox select,
#loginBox button{
font-size:16px;
}

.payslip{
width:95% !important;
margin:10px auto !important;
padding:15px !important;
}

#psBody{
max-width:100%;
overflow-x:auto;
}

#psBody select,
#psBody button{
width:100%;
font-size:16px;
margin-top:10px;
}

}

</style>

</head>

<body>

<div>

<div id="loginBox">

<select id="role">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select>

<input id="empCode" placeholder="Employee Code">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg" style="color:red"></div>

</div>

<!-- ✅ COPYRIGHT (ADDED ONLY) -->

<table>

<tr>

</table>

</div>

});
});

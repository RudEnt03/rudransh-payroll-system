<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudransh Payroll System v6 Ultimate</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.0/jszip.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- Admin Login Panel -->
<div id="loginPanel" class="max-w-md mx-auto mt-10 bg-white p-6 rounded-lg shadow-lg">
  <h2 class="text-2xl font-bold mb-4 text-center">Admin Login</h2>
  <div class="mb-4">
    <label class="block mb-1 font-medium">Username</label>
    <input type="text" id="adminUsername" class="w-full border rounded px-3 py-2" placeholder="Enter Username">
  </div>
  <div class="mb-4">
    <label class="block mb-1 font-medium">Password</label>
    <input type="password" id="adminPassword" class="w-full border rounded px-3 py-2" placeholder="Enter Password">
  </div>
  <div class="mb-4">
    <span id="deviceStatus" class="text-sm text-gray-500">Device bound: ✔</span>
  </div>
  <button id="loginBtn" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden container mx-auto mt-6">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <!-- Uploads & Month Selection -->
    <div class="bg-white p-4 rounded-lg shadow-lg">
      <h3 class="text-lg font-semibold mb-3">Uploads & Month Selection</h3>
      <div class="mb-3">
        <label class="block mb-1 font-medium">Company Logo</label>
        <input type="file" id="logoUpload" accept="image/*" class="w-full">
      </div>
      <div class="mb-3">
        <label class="block mb-1 font-medium">Payroll Excel</label>
        <input type="file" id="excelUpload" accept=".xlsx, .xls" class="w-full">
      </div>
      <div class="mb-3">
        <label class="block mb-1 font-medium">Select Month</label>
        <select id="monthSelect" class="w-full border rounded px-3 py-2">
          <option value="Jan">January</option>
          <option value="Feb">February</option>
          <option value="Mar">March</option>
          <option value="Apr">April</option>
          <option value="May">May</option>
          <option value="Jun">June</option>
          <option value="Jul">July</option>
          <option value="Aug">August</option>
          <option value="Sep">September</option>
          <option value="Oct">October</option>
          <option value="Nov">November</option>
          <option value="Dec">December</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="block mb-1 font-medium">Employee Code</label>
        <input type="text" id="empCodeInput" placeholder="ATL0018" class="w-full border rounded px-3 py-2">
      </div>
      <button id="generatePayslip" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Generate Payslip</button>
    </div>

    <!-- Quick Actions -->
    <div class="bg-white p-4 rounded-lg shadow-lg">
      <h3 class="text-lg font-semibold mb-3">Quick Actions</h3>
      <button id="bulkZip" class="w-full mb-2 bg-purple-600 text-white py-2 rounded hover:bg-purple-700">Bulk ZIP</button>
      <button class="w-full mb-2 bg-yellow-500 text-white py-2 rounded hover:bg-yellow-600">PF</button>
      <button class="w-full mb-2 bg-yellow-500 text-white py-2 rounded hover:bg-yellow-600">ESI</button>
      <button class="w-full mb-2 bg-red-600 text-white py-2 rounded hover:bg-red-700">TDS</button>
      <button class="w-full mb-2 bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Reports</button>
      <button id="logoutBtn" class="w-full bg-gray-600 text-white py-2 rounded hover:bg-gray-700">Logout</button>
    </div>

    <!-- System Stats -->
    <div class="bg-white p-4 rounded-lg shadow-lg">
      <h3 class="text-lg font-semibold mb-3">System Stats</h3>
      <div class="mb-2">Total Employees: <span id="totalEmployees">0</span></div>
      <div class="mb-2">Payslips Generated: <span id="payslipsGenerated">0</span></div>
      <div class="mb-2">ZIP Downloads: <span id="zipDownloads">0</span></div>
      <div class="mb-2">Last Update: <span id="lastUpdate">-</span></div>
    </div>

  </div>

  <!-- Payslip Preview -->
  <div class="mt-6 bg-white p-6 rounded-lg shadow-lg">
    <h3 class="text-lg font-semibold mb-3">Payslip Preview</h3>
    <div id="payslipPreview" class="border rounded p-4 bg-gray-50">
      <div class="flex justify-between mb-4 items-center">
        <img id="previewLogo" src="" alt="Company Logo" class="h-12">
        <div>
          <h2 class="text-xl font-bold">Rudransh Pvt. Ltd.</h2>
          <p>Month: <span id="previewMonth">-</span></p>
          <p>Employee Code: <span id="previewEmpCode">-</span></p>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <h4 class="font-semibold mb-2">Earnings</h4>
          <table class="w-full text-sm border border-gray-300">
            <tbody id="earningsTable"></tbody>
          </table>
        </div>
        <div>
          <h4 class="font-semibold mb-2">Deductions</h4>
          <table class="w-full text-sm border border-gray-300">
            <tbody id="deductionsTable"></tbody>
          </table>
        </div>
      </div>
      <div class="text-right font-bold text-lg text-green-700 mb-4">Net Pay: ₹<span id="netPay">0</span></div>
      <button id="downloadPDF" class="mt-2 bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700">Download PDF</button>
    </div>
  </div>
</div>

<script>
let employees = [];
let payslipsGenerated = 0;
let zipDownloads = 0;
document.getElementById('lastUpdate').textContent = new Date().toLocaleString();

// Login
document.getElementById('loginBtn').addEventListener('click', ()=>{
  const user = document.getElementById('adminUsername').value.trim();
  const pass = document.getElementById('adminPassword').value.trim();
  if(user && pass){
    document.getElementById('loginPanel').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
  } else alert('Enter credentials!');
});
document.getElementById('logoutBtn').addEventListener('click', ()=>{
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('loginPanel').classList.remove('hidden');
});

// Logo Upload
document.getElementById('logoUpload').addEventListener('change', e=>{
  const reader = new FileReader();
  reader.onload = event => document.getElementById('previewLogo').src = event.target.result;
  reader.readAsDataURL(e.target.files[0]);
});

// Excel Import with exact headers
document.getElementById('excelUpload').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheetName = workbook.SheetNames[0];
  const worksheet = workbook.Sheets[sheetName];
  const rawEmployees = XLSX.utils.sheet_to_json(worksheet, { defval: 0 });

  employees = rawEmployees.map(emp => ({
    code: (emp['Emp Code'] || "").toString().trim(),
    name: (emp['Name'] || "").toString().trim(),
    basic: parseFloat(emp['Basic'] || 0),
    hra: parseFloat(emp['HRA'] || 0),
    allowance: parseFloat(emp['Allowance'] || 0),
    bonus: parseFloat(emp['Bonus'] || 0),
    netpay: parseFloat(emp['Net In Hand'] || 0),
    pf: parseFloat(emp['PF@12%'] || 0),
    esi: parseFloat(emp['ESI@.75%'] || 0),
    lwf: parseFloat(emp['LWF'] || 0)
  }));

  document.getElementById('totalEmployees').textContent = employees.length;
  alert('Excel Imported Successfully! Check console with console.log(employees)');
  console.log(employees);
});

// Update Payslip
function updatePayslip(empCode, month){
  empCode = empCode.trim().toUpperCase();
  const emp = employees.find(e => (e.code || "").toString().trim().toUpperCase() === empCode);
  if(!emp) {
    console.log("Available codes:", employees.map(e=>e.code));
    return alert('Employee not found! Check Excel import and code.');
  }
  document.getElementById('previewEmpCode').textContent = emp.code;
  document.getElementById('previewMonth').textContent = month;

  // Earnings
  const earnTable = document.getElementById('earningsTable');
  earnTable.innerHTML = '';
  [['Basic',emp.basic],['HRA',emp.hra],['Allowance',emp.allowance],['Bonus',emp.bonus]].forEach(([k,v])=>{
    if(v!==undefined) earnTable.innerHTML+=`<tr class="border-b"><td class="px-2 py-1 font-medium">${k}</td><td class="px-2 py-1">₹${v}</td></tr>`;
  });

  // Deductions
  const dedTable = document.getElementById('deductionsTable');
  dedTable.innerHTML = '';
  [['PF@12%',emp.pf],['ESI@.75%',emp.esi],['LWF',emp.lwf]].forEach(([k,v])=>{
    if(v!==undefined) dedTable.innerHTML+=`<tr class="border-b"><td class="px-2 py-1 font-medium">${k}</td><td class="px-2 py-1">₹${v}</td></tr>`;
  });

  document.getElementById('netPay').textContent = emp.netpay;
}

// Generate Payslip Button
document.getElementById('generatePayslip').addEventListener('click', ()=>{
  const empCode = document.getElementById('empCodeInput').value.trim();
  const month = document.getElementById('monthSelect').value;
  updatePayslip(empCode, month);
  payslipsGenerated++;
  document.getElementById('payslipsGenerated').textContent = payslipsGenerated;
});

// Download PDF
document.getElementById('downloadPDF').addEventListener('click', ()=>{
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const empCode = document.getElementById('previewEmpCode').textContent;
  const month = document.getElementById('previewMonth').textContent;
  const netPay = document.getElementById('netPay').textContent;

  doc.setFontSize(18);
  doc.text("Rudransh Pvt. Ltd.", 105, 15, null, null, "center");
  doc.setFontSize(12);
  doc.text(`Payslip for: ${empCode} - ${month}`, 105, 25, null, null, "center");

  let y = 35;
  doc.text("Earnings", 20, y); y+=7;
  const earningsRows = Array.from(document.querySelectorAll("#earningsTable tr")).map(r=>[r.cells[0].innerText,r.cells[1].innerText]);
  earningsRows.forEach(r=>{
    doc.rect(20, y-5, 60, 7); doc.rect(80, y-5, 30, 7);
    doc.text(r[0], 22, y); doc.text(r[1], 82, y);
    y+=7;
  });

  y=35;
  doc.text("Deductions", 110, y); y+=7;
  const dedRows = Array.from(document.querySelectorAll("#deductionsTable tr")).map(r=>[r.cells[0].innerText,r.cells[1].innerText]);
  dedRows.forEach(r=>{
    doc.rect(110, y-5, 60, 7); doc.rect(170, y-5, 30, 7);
    doc.text(r[0], 112, y); doc.text(r[1], 172, y);
    y+=7;
  });

  doc.setFontSize(14); doc.setTextColor(0,128,0);
  doc.text(`Net Pay: ₹${netPay}`, 105, y+15, null, null, "center");
  doc.save(`${empCode}_${month}.pdf`);
});

// Bulk ZIP
document.getElementById('bulkZip').addEventListener('click', ()=>{
  if(employees.length==0) return alert('Import Excel first!');
  const zip = new JSZip();
  const month = document.getElementById('monthSelect').value;
  employees.forEach(emp=>{
    const content = `Payslip for ${emp.name}\nBasic: ₹${emp.basic}\nHRA: ₹${emp.hra}\nAllowance: ₹${emp.allowance}\nBonus: ₹${emp.bonus}\nPF@12%: ₹${emp.pf}\nESI@.75%: ₹${emp.esi}\nLWF: ₹${emp.lwf}\nNet Pay: ₹${emp.netpay}`;
    zip.file(`${emp.code}_${month}.txt`, content);
  });
  zip.generateAsync({type:"blob"}).then(content=>{
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = `Payslips_${month}.zip`;
    a.click();
    zipDownloads++;
    document.getElementById('zipDownloads').textContent = zipDownloads;
  });
});
</script>

</body>
</html>

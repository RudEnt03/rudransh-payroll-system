<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rudransh Payroll System - F&F</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#0b1c2d,#000814);color:white;}
header{background:#001f3f;color:#ffd700;text-align:center;padding:15px;font-size:24px;font-weight:bold;position:sticky;top:0;z-index:1000;}
.glass{background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-radius:15px;padding:25px;margin:30px auto;width:90%;max-width:950px;}
button{background:linear-gradient(45deg,#d4af37,#b8962e);color:#000;padding:10px 18px;border:none;border-radius:6px;margin:5px;cursor:pointer;font-weight:bold;}
button:hover{opacity:0.8;}
.hidden{display:none;}
table{width:100%;border-collapse:collapse;color:black;background:white;margin-top:15px;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
th{background:#001f3f;color:#ffd700;}
.payslip{background:white;color:black;padding:25px;position:relative;border-radius:12px;margin-bottom:30px;box-shadow:0 4px 10px rgba(0,0,0,0.3);page-break-inside:avoid;}
.payslip-header{text-align:center;margin-bottom:15px;}
.payslip-header h2{margin:2px;color:#001f3f;}
.payslip-header h4{margin:2px;color:#d4af37;font-weight:normal;}
.flex{display:flex;justify-content:space-between;margin-top:15px;}
.section{width:48%;}
.net{background:#ffd700;color:#000;padding:12px;text-align:center;font-weight:bold;margin-top:20px;font-size:18px;border-radius:6px;}
.footer{text-align:center;font-size:12px;margin-top:20px;color:#444;}
table.payslip-table{width:100%;border-collapse:collapse;margin-top:10px;}
table.payslip-table th, table.payslip-table td{border:1px solid #999;padding:6px;text-align:center;}
table.payslip-table th{background:#001f3f;color:#ffd700;}
tr.gross-row{background:#ffd700;font-weight:bold;}
tr.net-row{background:#ffbf00;font-weight:bold;}
</style>
</head>
<body>

<header>Rudransh Enterprises</header>

<!-- Role Selection -->
<div id="rolePage" class="glass">
<h3>Select Login Role</h3>
<select id="roleSelect">
<option value="">--Select Role--</option>
<option value="Admin">Admin</option>
<option value="Employee">Employee</option>
</select>
<button id="roleNextBtn">Next</button>
</div>

<!-- Admin Login -->
<div id="adminLogin" class="glass hidden">
<h3>Admin Login</h3>
<input id="adminPass" type="password" placeholder="Password">
<button id="loginAdminBtn">Login</button>
</div>

<!-- Admin Dashboard -->
<div id="adminDash" class="glass hidden">
<h3>Admin Dashboard</h3>
<input type="file" id="excelFile" accept=".xlsx">
<select id="monthSelect"><option value="">--Select Month--</option></select>
<button id="generateBtn">Generate Selected Payslip(s)</button>
<button onclick="logout()">Logout</button>
<table id="empTable">
<thead><tr>
<th>Select</th><th>Emp Code</th><th>Name</th><th>Designation</th><th>Project</th><th>Location</th><th>Month</th>
</tr></thead>
<tbody></tbody>
</table>
</div>

<!-- Employee Dashboard -->
<div id="empDash" class="glass hidden">
<h3>Employee Dashboard</h3>
<input id="empCodeInput" type="text" placeholder="Enter Emp Code">
<button id="viewEmpSlipBtn">View Payslip</button>
<button onclick="logout()">Logout</button>
<div id="empSlip"></div>
</div>

<script>
let employees=[]; 
let monthData={};
let rolePage=document.getElementById("rolePage");
let adminLogin=document.getElementById("adminLogin");
let adminDash=document.getElementById("adminDash");
let empTable=document.getElementById("empTable").getElementsByTagName("tbody")[0];
let monthSelect=document.getElementById("monthSelect");
let empSlip=document.getElementById("empSlip");

// Role selection
document.getElementById("roleNextBtn").onclick=()=> {
  let role=document.getElementById("roleSelect").value;
  if(role==="Admin"){ rolePage.classList.add("hidden"); adminLogin.classList.remove("hidden"); }
  else if(role==="Employee"){ rolePage.classList.add("hidden"); empDash.classList.remove("hidden"); }
  else alert("Select Role");
};

// Admin Login
document.getElementById("loginAdminBtn").onclick=()=> {
  if(document.getElementById("adminPass").value==="Rud@03"){
    adminLogin.classList.add("hidden");
    adminDash.classList.remove("hidden");
  } else alert("Invalid Password");
};

// Logout
function logout(){ location.reload(); }

// Excel date to JS date
function excelDateToJSDate(serial){ return new Date(Math.round((serial - 25569) * 86400 * 1000)); }
function formatMonth(date){ let months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return months[date.getMonth()] + "-" + String(date.getFullYear()).slice(2); }
function parseExcelMonth(val){
  if(!val) return "Unknown";
  if(typeof val === "number") return formatMonth(excelDateToJSDate(val));
  if(typeof val === "string"){ let d=new Date(val); return isNaN(d)?val.trim():formatMonth(d); }
  return "Unknown";
}

// XLSX Import
document.getElementById("excelFile").onchange=function(e){
  let file=e.target.files[0];
  if(!file) return;
  let reader=new FileReader();
  reader.onload=function(ev){
    let data=new Uint8Array(ev.target.result);
    let wb=XLSX.read(data,{type:'array',cellDates:true});
    employees=[]; monthData={};
    wb.SheetNames.forEach(sheet=>{
      let sheetName=sheet.trim();
      let rows=XLSX.utils.sheet_to_json(wb.Sheets[sheet],{header:1});
      if(rows.length<2) return;
      let headers=rows[0].map(h=>h.toString().toLowerCase());
      let monthCol=headers.indexOf("month");
      let mDaysCol=headers.indexOf("m days");
      let pDaysCol=headers.indexOf("p days");
      let basicCol=headers.indexOf("basic");
      let hraCol=headers.indexOf("hra");
      let allowCol=headers.indexOf("allowance");
      let bonusCol=headers.indexOf("bonus");
      let pfCol=headers.indexOf("pf");
      let esiCol=headers.indexOf("esi");
      let netCol=headers.indexOf("net");

      // Split Sheet Name robustly
      let parts = sheetName.split("-");
      let project = parts[0].trim();
      let location = parts.slice(1).join("-").trim() || "Main";

      for(let i=1;i<rows.length;i++){
        let r=rows[i]; if(r.length>1){
          let rawMonth = monthCol>=0?r[monthCol]:"";
          let monthVal = parseExcelMonth(rawMonth);
          let empObj={
            code:r[1]||"",
            name:r[2]||"",
            desig:r[3]||"",
            project:project,
            location:location,
            month:monthVal,
            mDays:mDaysCol>=0?r[mDaysCol]:"", 
            pDays:pDaysCol>=0?r[pDaysCol]:"", 
            basic:basicCol>=0?r[basicCol]||0:0,
            hra:hraCol>=0?r[hraCol]||0:0,
            allow:allowCol>=0?r[allowCol]||0:0,
            bonus:bonusCol>=0?r[bonusCol]||0:0,
            pf:pfCol>=0?r[pfCol]||0:0,
            esi:esiCol>=0?r[esiCol]||0:0,
            net:netCol>=0?r[netCol]||0:0
          };
          employees.push(empObj);
          monthData[monthVal] = monthData[monthVal] || [];
          monthData[monthVal].push(empObj);
        }
      }
    });
    renderMonthDropdown();
    renderTable();
    alert("Excel imported successfully!");
  }
  reader.readAsArrayBuffer(file);
};

// Render table
function renderTable(){
  let html = "";
  employees.forEach(e=>{
    html += `<tr>
    <td><input type="checkbox" data-month="${e.month}"></td>
    <td>${e.code}</td><td>${e.name}</td><td>${e.desig}</td><td>${e.project}</td><td>${e.location}</td><td>${e.month}</td>
    </tr>`;
  });
  empTable.innerHTML = html;
}

// Render month dropdown
function renderMonthDropdown(){
  monthSelect.innerHTML="<option value=''>--Select Month--</option>";
  Object.keys(monthData).sort().forEach(m=>{
    monthSelect.innerHTML+=`<option value='${m}'>${m}</option>`;
  });
}

// Payslip HTML
function slipHTML(e){
  function f(n){return n?Math.round(n):0;}
  let gross = f(e.basic)+f(e.hra)+f(e.allow)+f(e.bonus);
  let deductions = f(e.pf)+f(e.esi);
  let net = f(e.net);
  return `<div class="payslip">
  <div class="payslip-header"><h2>Rudransh Enterprises</h2>
  <h4>Project: ${e.project} | Location: ${e.location}</h4></div>
  <p><b>Emp Code:</b> ${e.code} | <b>Name:</b> ${e.name} | <b>Month:</b> ${e.month}</p>
  <p><b>Designation:</b> ${e.desig} | <b>M Days:</b> ${e.mDays} | <b>P Days:</b> ${e.pDays}</p>
  <table class="payslip-table">
  <tr><th>Earnings</th><th>Amount</th></tr>
  <tr><td>Basic</td><td>${f(e.basic)}</td></tr>
  <tr><td>HRA</td><td>${f(e.hra)}</td></tr>
  <tr><td>Allowance</td><td>${f(e.allow)}</td></tr>
  <tr><td>Bonus</td><td>${f(e.bonus)}</td></tr>
  <tr class="gross-row"><td>Gross</td><td>${gross}</td></tr>
  </table>
  <table class="payslip-table">
  <tr><th>Deductions</th><th>Amount</th></tr>
  <tr><td>PF</td><td>${f(e.pf)}</td></tr>
  <tr><td>ESI</td><td>${f(e.esi)}</td></tr>
  <tr class="net-row"><td>Total Deductions</td><td>${deductions}</td></tr>
  </table>
  <div class="net">Net Salary: ${net}</div>
  <div class="footer">Computer Generated – No Signature Required</div>
  </div>`;
}

// Generate PDF for selected employees
document.getElementById("generateBtn").onclick=()=>{
  let selMonth=monthSelect.value;
  if(!selMonth){ alert("Select Month"); return;}
  let checks=document.querySelectorAll(`input[type='checkbox']:checked[data-month='${selMonth}']`);
  if(checks.length===0){ alert("Select at least one employee"); return;}
  checks.forEach(c=>{
    let tr=c.parentNode.parentNode;
    let code=tr.children[1].textContent;
    generatePDF(employees.find(e=>e.code===code && e.month===selMonth));
  });
};

// Employee Dashboard View
document.getElementById("viewEmpSlipBtn").onclick=()=>{
  let code = document.getElementById("empCodeInput").value.trim();
  if(!code){ alert("Enter Emp Code"); return;}
  let emp = employees.find(e=>e.code===code);
  if(emp){ empSlip.innerHTML = slipHTML(emp); }
  else alert("Employee not found or Excel not imported by Admin yet.");
};

// PDF Generation
async function generatePDF(emp){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF('p','pt','a4');
  let div = document.createElement('div');
  div.style.width="800px";
  div.style.background="#fff";
  div.style.color="#000";
  div.innerHTML = slipHTML(emp);
  div.style.position="absolute";
  div.style.left="-9999px";
  document.body.appendChild(div);

  await doc.html(div, {
    callback: function(pdf){
      pdf.save(emp.code+"_Payslip.pdf");
      div.remove();
    },
    x:20,
    y:20,
    html2canvas:{scale:1, backgroundColor:"#fff"}
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rudransh Payroll System</title>

<script src="xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef2f7;
}

/* HEADER */
header{
background:linear-gradient(90deg,#4e73df,#36b9cc);
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CONTAINER */
.container{padding:20px;}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

input,select{
padding:8px;
}

/* CARDS */
.cards{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
flex:1;
min-width:150px;
background:white;
padding:20px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* TABLE */
.tableWrap{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#4e73df;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

/* BUTTON */
button{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
background:#36b9cc;
}

.view{background:#1cc88a;}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
overflow:auto;
}

/* PAYSLIP (UNCHANGED) */
.payslip{
background:white;
width:900px;
max-width:95%;
margin:40px auto;
padding:25px;
position:relative;
}

.psTable{
width:100%;
border-collapse:collapse;
}

.psTable td,.psTable th{
border:2px solid #000;
padding:8px;
}

.left{text-align:left;}
.right{text-align:right;}
.center{text-align:center;}

.net{
font-size:20px;
font-weight:bold;
text-align:center;
margin-top:10px;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
}

/* LOGIN */
#loginPage{
position:fixed;
width:100%;
height:100%;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
box-sizing:border-box;
}

#loginBox{
background:white;
padding:20px;
width:100%;
max-width:420px;
border-radius:12px;
box-shadow:0 3px 12px rgba(0,0,0,0.2);
}

#loginBox input,
#loginBox select,
#loginBox button{
width:100%;
padding:14px;
font-size:16px;
margin-bottom:12px;
box-sizing:border-box;
}

.loginFooter{
margin-top:10px;
font-size:12px;
text-align:center;
color:#666;
}

/* MONTH BOX (NEW - SEPARATE) */
.empMonthBox{
max-width:420px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div id="loginBox">

<h3 style="text-align:center;">Login</h3>

<select id="role" onchange="handleRole()">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select>

<input id="empCode" placeholder="Employee Code">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg" style="color:red;text-align:center;"></div>

<div class="loginFooter">
© Rudransh Enterprises <span id="year"></span>. All rights reserved.
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<header><h2>Payroll Dashboard</h2></header>

<div class="container">

<div class="controls">
<select id="monthFilter"><option value="all">All Months</option></select>
<select id="projectFilter"><option value="all">All Projects</option></select>
<button onclick="applyFilter()">Filter</button>
</div>

<div class="cards">
<div class="card">Total Employees<p id="cEmp">0</p></div>
<div class="card">Total Gross<p id="cGross">0</p></div>
<div class="card">Total Net<p id="cNet">0</p></div>
</div>

<div class="tableWrap">
<table>
<thead>
<tr>
<th>Emp Code</th>
<th>Name</th>
<th>Project</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
<th>Payslip</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>
</div>

<!-- MODAL -->
<div id="modal">
<div class="payslip" id="payslipBox">

<div id="psBody"></div>

<div class="footer">
Note: This is a Computer Generated Slip and does not require signature
<br><br>
<button onclick="window.print()">Print</button>
<button onclick="closePS()">Close</button>
</div>

</div>
</div>

<script>

document.getElementById("year").innerText=new Date().getFullYear();

function handleRole(){
let r=document.getElementById("role").value;
let c=document.getElementById("empCode");

if(r==="admin"){
c.value="Admin";
c.readOnly=true;
}else{
c.value="";
c.readOnly=false;
}
}

const USER="RudEnt03";
const REPO="rudransh-payroll-system";

let employees=[];
let months=new Set();
let projects=new Set();

function rupee(v){
return "₹"+Math.round(Number(v||0)).toLocaleString("en-IN");
}

async function loadExcel(){

employees=[];

const res=await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents`);
const files=await res.json();

for(const f of files.filter(x=>x.name.endsWith(".xlsx"))){

const r=await fetch(f.download_url);
const data=await r.arrayBuffer();
const wb=XLSX.read(data,{type:"array"});

wb.SheetNames.forEach(s=>{
XLSX.utils.sheet_to_json(wb.Sheets[s]).forEach(row=>{

let rec={};
for(let k in row){rec[k.trim().toLowerCase()]=row[k];}

let m=rec["month"];
if(typeof m==="number"){m=XLSX.SSF.format("mmm-yy",m);}

months.add(m);
projects.add(s);

employees.push({
code:rec["emp code"]||"",
name:rec["name"]||"",
designation:rec["designation"]||"",
uan:rec["uan no"]||"",
esi_no:rec["esi no"]||"",
mdays:rec["m days"]||"",
pdays:rec["p days"]||"",
month:m||"",
projectLocation:s,
basic:rec["basic"],
hra:rec["hra"],
allow:rec["allowance"],
bonus:rec["bonus"],
attendance:rec["attendance incentive"],
gross:rec["gross"],
pf:rec["pf@12%"],
esi:rec["esi@.75%"],
lwf:rec["lwf"],
advance:rec["advance paid"],
net:rec["net in hand"]
});

});
});

}

populateFilters();
render(employees);
}

function populateFilters(){
months.forEach(m=>monthFilter.innerHTML+=`<option>${m}</option>`);
projects.forEach(p=>projectFilter.innerHTML+=`<option>${p}</option>`);
}

function applyFilter(){
let m=monthFilter.value,p=projectFilter.value;
render(employees.filter(e=>
(m==="all"||e.month===m)&&(p==="all"||e.projectLocation===p)
));
}

function render(data){

tbody.innerHTML="";
let g=0,n=0;

data.forEach(e=>{
g+=+e.gross;
n+=+e.net;

tbody.innerHTML+=`
<tr>
<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.projectLocation}</td>
<td>${e.month}</td>
<td>${rupee(e.gross)}</td>
<td>${rupee(e.net)}</td>
<td><button class="view" onclick='showPS(${JSON.stringify(e)})'>View</button></td>
</tr>`;
});

cEmp.innerText=data.length;
cGross.innerText=rupee(g);
cNet.innerText=rupee(n);
}

function showPS(e){

modal.style.display="block";

psBody.innerHTML=`

<table class="psTable">

<tr>
<td class="center" style="width:150px">
<img src="logo.png" height="70">
</td>

<td class="center">
<b style="font-size:20px">Rudransh Enterprises</b><br>
Office Address: Delhi
</td>
</tr>

<tr>
<td colspan="2" class="center">
<b>Salary Slip for ${e.month}</b>
</td>
</tr>

</table>

<br>

<table class="psTable">

<tr>
<td class="left">Employee Name</td>
<td>${e.name}</td>
<td>Code</td>
<td>${e.code}</td>
</tr>

<tr>
<td>Designation</td>
<td>${e.designation}</td>
<td>Project</td>
<td>${e.projectLocation}</td>
</tr>

<tr>
<td>UAN</td>
<td>${e.uan}</td>
<td>ESI</td>
<td>${e.esi_no}</td>
</tr>

<tr>
<td>M Days</td>
<td>${e.mdays}</td>
<td>P Days</td>
<td>${e.pdays}</td>
</tr>

</table>

<br>

<table class="psTable">

<tr>
<th>Earnings</th><th>Amt</th>
<th>Deductions</th><th>Amt</th>
</tr>

<tr><td>Basic</td><td>${rupee(e.basic)}</td><td>PF</td><td>${rupee(e.pf)}</td></tr>
<tr><td>HRA</td><td>${rupee(e.hra)}</td><td>ESI</td><td>${rupee(e.esi)}</td></tr>
<tr><td>Allowance</td><td>${rupee(e.allow)}</td><td>LWF</td><td>${rupee(e.lwf)}</td></tr>
<tr><td>Bonus</td><td>${rupee(e.bonus)}</td><td>Advance</td><td>${rupee(e.advance)}</td></tr>
<tr><td>Attendance</td><td>${rupee(e.attendance)}</td><td></td><td></td></tr>

<tr><td><b>Gross</b></td><td><b>${rupee(e.gross)}</b></td><td></td><td></td></tr>

</table>

<div class="net">NET PAY ${rupee(e.net)}</div>

`;

}

function closePS(){modal.style.display="none";}

async function login(){

let role=roleEl.value,code=empCode.value.trim(),pwd=password.value;

await loadExcel();

if(role==="admin"){

if(pwd!=="Rud@03"){msg.innerText="Wrong password";return;}

loginPage.style.display="none";
dashboard.style.display="block";

}else{

if(!/Mobile|Android|iPhone/i.test(navigator.userAgent)){
msg.innerText="Mobile only";
return;
}

if(code!==pwd){
msg.innerText="Password = Emp Code";
return;
}

// ONLY month box small (NOT payslip)
let empMonths=[...new Set(employees.filter(e=>e.code===code).map(e=>e.month))];

psBody.innerHTML=`
<div class="empMonthBox">

<h3 style="text-align:center;">Select Month</h3>

<select id="empMonth" style="width:100%;padding:14px;margin-bottom:15px;">
${empMonths.map(m=>`<option>${m}</option>`).join("")}
</select>

<button onclick="showEmpPayslip('${code}')" style="width:100%;padding:14px;background:#1cc88a;">
View Payslip
</button>

</div>
`;

modal.style.display="block";
loginPage.style.display="none";

}

}

function showEmpPayslip(code){

let m=empMonth.value;

let emp=employees.find(e=>e.code===code && e.month===m);

if(!emp){alert("Not found");return;}

showPS(emp);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f4f8;
margin:0;
}

header{
background:#0b2a4a;
color:white;
text-align:center;
padding:15px;
font-size:22px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,.2);
margin-bottom:20px;
}

input,select{
padding:6px;
margin:5px;
}

button{
background:#1a73e8;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
}

.footer{
background:#0b2a4a;
color:white;
text-align:center;
padding:10px;
font-size:12px;
}

</style>

</head>

<body>

<header>RUDRANSH PAYROLL SYSTEM</header>

<div class="container">

<div class="card">

Upload Payroll Excel

<input type="file" id="excelFile">

<br><br>

Select Month

<select id="monthList"></select>

<br><br>

Employee Code

<input id="empCode">

<button onclick="generatePayslip()">Generate Payslip</button>

</div>

</div>

<div class="footer">
© 2026 Rudransh Enterprises. All rights reserved.
</div>

<script>

let payrollData=[]

document.getElementById("excelFile").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let wb=XLSX.read(data,{type:'array'})

let sheet=wb.SheetNames[0]

let rows=XLSX.utils.sheet_to_json(wb.Sheets[sheet],{defval:""})

payrollData=rows

loadMonths()

}

reader.readAsArrayBuffer(this.files[0])

})

function loadMonths(){

let list=document.getElementById("monthList")

list.innerHTML=""

let months=[...new Set(payrollData.map(r=>r["Month"]))]

months.forEach(m=>{

let opt=document.createElement("option")

opt.value=m
opt.text=m

list.appendChild(opt)

})

}

function money(v){

if(!v || v==0) return ""

return "₹"+Number(v).toLocaleString("en-IN")

}

function generatePayslip(){

let emp=document.getElementById("empCode").value
let month=document.getElementById("monthList").value

let row=payrollData.find(r=>r["Emp Code"]==emp && r["Month"]==month)

if(!row){
alert("Employee not found for selected month")
return
}

createPDF(row)

}

function createPDF(emp){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

doc.setFontSize(18)
doc.text("Rudransh Enterprises",70,20)

doc.setFontSize(12)
doc.text("Employee Payslip",85,30)

doc.text("Month : "+emp["Month"],20,45)

doc.text("Emp Code : "+emp["Emp Code"],20,60)
doc.text("Name : "+emp["Name"],20,70)

doc.text("UAN : "+emp["UAN No"],20,85)
doc.text("ESI : "+emp["ESI No"],120,85)

doc.text("Basic "+money(emp["Basic"]),20,110)
doc.text("HRA "+money(emp["HRA"]),20,120)
doc.text("Allowance "+money(emp["Allowance"]),20,130)
doc.text("Bonus "+money(emp["Bonus"]),20,140)

doc.text("PF "+money(emp["PF@12%"]),120,110)
doc.text("ESI "+money(emp["ESI@.75%"]),120,120)
doc.text("LWF "+money(emp["LWF"]),120,130)
doc.text("Advance "+money(emp["Advance Paid"]),120,140)

doc.text("Gross : "+money(emp["Gross"]),20,170)

doc.setFontSize(14)
doc.text("NET PAY : "+money(emp["Net In Hand"]),20,200)

doc.setFontSize(9)
doc.text("Computer generated payslip – signature not required",20,270)

doc.text("© 2026 Rudransh Enterprises. All rights reserved.",45,285)

doc.save(emp["Emp Code"]+"_"+emp["Month"]+".pdf")

}

</script>

</body>
</html>

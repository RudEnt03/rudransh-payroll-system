<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Rudransh Payroll System</title>

<script src="xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

header{
background:#4e73df;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:20px;
}

input,select,button{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#4e73df;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

button{
background:#36b9cc;
color:white;
border:none;
cursor:pointer;
}

.card{
display:inline-block;
background:white;
padding:15px;
margin:5px;
width:200px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#loginPage{
position:fixed;
width:100%;
height:100%;
background:#eef2f7;
display:flex;
align-items:center;
justify-content:center;
}

#loginBox{
background:white;
padding:30px;
width:300px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

#modal{
display:none;
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:rgba(0,0,0,0.6);
overflow:auto;
}

.payslip{
background:white;
width:650px;
margin:40px auto;
padding:20px;
}

.row{
display:flex;
justify-content:space-between;
margin:5px 0;
}

.section{
margin-top:10px;
font-weight:bold;
border-bottom:2px solid #ddd;
}

.net{
font-size:18px;
color:#4e73df;
font-weight:bold;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div id="loginBox">

<h3>Login</h3>

<select id="role">
<option value="emp">Employee</option>
<option value="admin">Admin</option>
</select>

<input id="empCode" placeholder="Emp Code">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg" style="color:red"></div>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" style="display:none">

<header>Rudransh Payroll Dashboard</header>

<div class="container">

<select id="monthSelect" onchange="filterMonth()"></select>

<div>
<div class="card">Employees<br><b id="cEmp">0</b></div>
<div class="card">Gross<br><b id="cGross">0</b></div>
<div class="card">Net<br><b id="cNet">0</b></div>
</div>

<table>

<thead>

<tr>

<th>Emp Code</th>
<th>Name</th>
<th>Project</th>
<th>Location</th>
<th>Month</th>
<th>Gross</th>
<th>Net</th>
<th>Payslip</th>

</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<!-- PAYSLIP -->

<div id="modal">

<div class="payslip">

<h3>Rudransh Enterprises</h3>

<div id="ps"></div>

<button onclick="window.print()">Download</button>
<button onclick="closePS()">Close</button>

</div>

</div>

<script>

const USER="RudEnt03";
const REPO="rudransh-payroll-system";

let employees=[];
let months=new Set();

function rupee(v){
return "₹"+Number(v).toLocaleString("en-IN");
}

async function loadExcelFiles(){

employees=[];

const api=`https://api.github.com/repos/${USER}/${REPO}/contents`;

const res=await fetch(api);

const files=await res.json();

const excel=files.filter(f=>f.name.endsWith(".xlsx"));

for(const file of excel){

const r=await fetch(file.download_url);

const data=await r.arrayBuffer();

const wb=XLSX.read(data,{type:"array"});

wb.SheetNames.forEach(sheetName=>{

const sheet=wb.Sheets[sheetName];

const rows=XLSX.utils.sheet_to_json(sheet);

rows.forEach(row=>{

let rec={};

for(let k in row){
rec[k.trim().toLowerCase()]=row[k];
}

let m=rec["month"];

if(typeof m==="number"){
m=XLSX.SSF.format("mmm-yy",m);
}

months.add(m);

employees.push({

code:rec["emp code"]||"",
name:rec["name"]||"",
designation:rec["designation"]||"",
uan:rec["uan no"]||"",
esi:rec["esi no"]||"",
month:m||"",
basic:Number(rec["basic"]||0),
hra:Number(rec["hra"]||0),
allow:Number(rec["allowance"]||0),
bonus:Number(rec["bonus"]||0),
gross:Number(rec["gross"]||0),
pf:Number(rec["pf@12%"]||0),
esi_d:Number(rec["esi@.75%"]||0),
lwf:Number(rec["lwf"]||0),
advance:Number(rec["advance paid"]||0),
net:Number(rec["net in hand"]||0),
project:sheetName,
location:sheetName

});

});

});

}

populateMonths();

render(employees);

}

function populateMonths(){

let sel=document.getElementById("monthSelect");

sel.innerHTML="";

[...months].sort().forEach(m=>{

let op=document.createElement("option");

op.value=m;
op.textContent=m;

sel.appendChild(op);

});

}

function filterMonth(){

let m=document.getElementById("monthSelect").value;

let data=employees.filter(e=>e.month===m);

render(data);

}

function render(data){

let tb=document.getElementById("tbody");

tb.innerHTML="";

let g=0,n=0;

data.forEach(e=>{

g+=e.gross;
n+=e.net;

tb.innerHTML+=`

<tr>

<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.project}</td>
<td>${e.location}</td>
<td>${e.month}</td>
<td>${rupee(e.gross)}</td>
<td>${rupee(e.net)}</td>
<td><button onclick='showPS(${JSON.stringify(e)})'>View</button></td>

</tr>

`;

});

document.getElementById("cEmp").innerText=data.length;
document.getElementById("cGross").innerText=rupee(g);
document.getElementById("cNet").innerText=rupee(n);

}

function showPS(e){

document.getElementById("modal").style.display="block";

document.getElementById("ps").innerHTML=`

<div class="row"><b>Emp Code</b><span>${e.code}</span></div>
<div class="row"><b>Name</b><span>${e.name}</span></div>
<div class="row"><b>Designation</b><span>${e.designation}</span></div>
<div class="row"><b>UAN</b><span>${e.uan}</span></div>
<div class="row"><b>ESI</b><span>${e.esi}</span></div>
<div class="row"><b>Project</b><span>${e.project}</span></div>
<div class="row"><b>Location</b><span>${e.location}</span></div>
<div class="row"><b>Month</b><span>${e.month}</span></div>

<div class="section">Earnings</div>

<div class="row"><span>Basic</span><span>${rupee(e.basic)}</span></div>
<div class="row"><span>HRA</span><span>${rupee(e.hra)}</span></div>
<div class="row"><span>Allowance</span><span>${rupee(e.allow)}</span></div>
<div class="row"><span>Bonus</span><span>${rupee(e.bonus)}</span></div>
<div class="row"><b>Gross</b><b>${rupee(e.gross)}</b></div>

<div class="section">Deductions</div>

<div class="row"><span>PF</span><span>${rupee(e.pf)}</span></div>
<div class="row"><span>ESI</span><span>${rupee(e.esi_d)}</span></div>
<div class="row"><span>LWF</span><span>${rupee(e.lwf)}</span></div>
<div class="row"><span>Advance</span><span>${rupee(e.advance)}</span></div>

<div class="row net"><span>Net Pay</span><span>${rupee(e.net)}</span></div>

`;

}

function closePS(){
document.getElementById("modal").style.display="none";
}

async function login(){

let role=document.getElementById("role").value;

let code=document.getElementById("empCode").value.trim();

let pwd=document.getElementById("password").value;

let ua=navigator.userAgent;

if(role==="admin"){

if(pwd!=="Rud@03"){
document.getElementById("msg").innerText="Invalid admin password";
return;
}

document.getElementById("loginPage").style.display="none";

document.getElementById("dashboard").style.display="block";

await loadExcelFiles();

}

else{

if(!/Android|iPhone|Mobile/i.test(ua)){
document.getElementById("msg").innerText="Employee login mobile only";
return;
}

if(code!==pwd){
document.getElementById("msg").innerText="Password must equal Emp Code";
return;
}

await loadExcelFiles();

let emp=employees.find(e=>e.code===code);

if(!emp){
alert("Payslip not found");
return;
}

showPS(emp);

document.getElementById("loginPage").style.display="none";

}

}

</script>

</body>
</html>
